<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI: Sand to Agents</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Work+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf9;--surface:#fff;--border:#e7e5e4;--border-subtle:#f5f5f4;
  --text:#1c1917;--text-2:#57534e;--text-3:#a8a29e;
  --accent:#2563eb;--accent-light:#dbeafe;--accent-dark:#1d4ed8;
  --green:#16a34a;--green-light:#dcfce7;
  --amber:#d97706;--amber-light:#fef3c7;
  --red:#dc2626;--red-light:#fee2e2;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --cyan:#0891b2;--cyan-light:#cffafe;
  --radius:12px;--radius-sm:8px;--radius-pill:100px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.05),0 2px 4px -2px rgba(0,0,0,.05);
}
html{scroll-behavior:smooth}
body{font-family:'Work Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.6}
h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif;line-height:1.2}
code{font-family:'JetBrains Mono',monospace;font-size:.85em;background:var(--border-subtle);padding:.15em .4em;border-radius:4px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── LAYOUT ── */
.container{max-width:720px;margin:0 auto;padding:0 1.25rem}

/* ── HEADER ── */
.header{padding:3rem 0 1.5rem;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem}
.header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.03em}
.header p{color:var(--text-2);font-size:.88rem;font-weight:300}
.header-badge{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:.25rem .6rem;border-radius:var(--radius-pill);border:1px solid var(--border);color:var(--text-3)}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(250,250,249,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.5rem 0}
.nav-inner{display:flex;gap:.25rem}
.nav-btn{font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;padding:.4rem .9rem;border-radius:var(--radius-pill);border:none;background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s ease}
.nav-btn:hover{color:var(--text);background:var(--border-subtle)}
.nav-btn.active{color:var(--accent);background:var(--accent-light)}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:1.25rem 0}
.stat-card{text-align:center;padding:.6rem .25rem}
.stat-val{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:700}
.stat-label{font-size:.65rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-top:.1rem}

/* Progress */
.progress{height:3px;background:var(--border-subtle);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .5s ease}

/* ── PAGES ── */
.page{display:none;padding-bottom:4rem}.page.active{display:block}

/* ── PHASE ── */
.phase{margin-bottom:.5rem}
.phase-head{display:flex;align-items:center;gap:.6rem;padding:.75rem 0;cursor:pointer;user-select:none}
.phase-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-meta{flex:1}
.phase-label{font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600}
.phase-sub{font-size:.75rem;color:var(--text-3);font-weight:300}
.phase-chevron{color:var(--text-3);transition:transform .2s ease;font-size:.8rem}
.phase.open .phase-chevron{transform:rotate(90deg)}
.phase-body{display:none;padding:0 0 .5rem 14px;border-left:1px solid var(--border-subtle);margin-left:3px}
.phase.open .phase-body{display:block}

/* ── PROJECT CARD ── */
.proj{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;transition:border-color .15s,box-shadow .15s;overflow:hidden}
.proj:hover{border-color:#d6d3d1;box-shadow:var(--shadow)}
.proj-head{display:flex;align-items:center;gap:.65rem;padding:.85rem 1rem;cursor:pointer;user-select:none}
.proj-num{font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:700;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-title{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600}
.proj-desc{font-size:.75rem;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-badge{font-size:.6rem;font-weight:500;padding:.15rem .45rem;border-radius:var(--radius-pill);white-space:nowrap}
.proj-badge.todo{background:var(--border-subtle);color:var(--text-3)}
.proj-badge.active{background:var(--amber-light);color:var(--amber)}
.proj-badge.done{background:var(--green-light);color:var(--green)}
.proj-expand{color:var(--text-3);transition:transform .2s;font-size:.7rem}
.proj.open .proj-expand{transform:rotate(90deg)}
.proj-content{display:none;padding:0 1rem 1rem;border-top:1px solid var(--border-subtle)}
.proj.open .proj-content{display:block}

/* ── CONCEPT GROUPS ── */
.cat{margin-top:.85rem}
.cat-label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.35rem}
.pills{display:flex;flex-wrap:wrap;gap:.3rem}
.pill{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .65rem;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-pill);font-size:.75rem;color:var(--text);cursor:pointer;transition:all .15s;user-select:none}
.pill:hover{background:var(--surface);border-color:#d6d3d1;box-shadow:var(--shadow)}
.pill:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.pill.key{font-weight:500;border-color:currentColor;border-width:1.5px}
.pill.learned{opacity:.35;text-decoration:line-through}
.pill .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ── ROADMAP TAB ── */
.road-group{margin-bottom:1.5rem}
.road-group-title{font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:600;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.road-group-title .dot{width:6px;height:6px;border-radius:50%}
.road-item{display:flex;align-items:center;gap:.65rem;padding:.65rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.35rem;transition:box-shadow .15s}
.road-item:hover{box-shadow:var(--shadow)}
.road-num{font-family:'Outfit',sans-serif;font-size:.6rem;font-weight:700;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.road-info{flex:1;min-width:0}
.road-title{font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:500}
.road-sub{font-size:.68rem;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.road-btns{display:flex;gap:.2rem;flex-shrink:0}
.road-btn{font-size:.6rem;font-weight:500;padding:.2rem .45rem;border-radius:var(--radius-pill);border:1px solid var(--border);background:var(--bg);color:var(--text-3);cursor:pointer;transition:all .15s}
.road-btn:hover{border-color:#d6d3d1;color:var(--text)}
.road-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ── STATS TAB ── */
.stats-big{display:grid;grid-template-columns:repeat(2,1fr);gap:.65rem;margin-bottom:1.5rem}
.stats-big-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
.stats-big-val{font-family:'Outfit',sans-serif;font-size:2rem;font-weight:800}
.stats-big-label{font-size:.72rem;color:var(--text-3);margin-top:.15rem}
.stats-big-bar{height:3px;background:var(--border-subtle);border-radius:2px;margin-top:.6rem;overflow:hidden}
.stats-big-bar div{height:100%;border-radius:2px;transition:width .5s}

.breakdown{margin-top:1rem}
.breakdown-title{font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;margin-bottom:.6rem}
.breakdown-row{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border-subtle)}
.breakdown-row:last-child{border-bottom:none}
.breakdown-label{font-size:.78rem;flex:1}
.breakdown-bar{width:100px;height:3px;background:var(--border-subtle);border-radius:2px;overflow:hidden;flex-shrink:0}
.breakdown-bar div{height:100%;border-radius:2px;transition:width .5s}
.breakdown-pct{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text-3);width:32px;text-align:right;flex-shrink:0}

/* ── CONNECTIONS ── */
.conn-section{margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.conn-section-title{font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.75rem;text-align:center}
.conn{padding:.7rem .85rem;border-left:2px solid;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:.5rem;background:var(--surface)}
.conn h4{font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600}
.conn p{font-size:.72rem;color:var(--text-2);margin-top:.15rem;line-height:1.5}

/* ── SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px)}
.overlay.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:80vh;background:var(--surface);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:1001;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;overscroll-behavior:contain;box-shadow:0 -4px 24px rgba(0,0,0,.08)}
.sheet.on{transform:translateY(0)}
.sheet-handle{width:32px;height:3px;background:var(--border);border-radius:2px;margin:8px auto 0}
.sheet-inner{padding:1.25rem 1.5rem 1.5rem;max-width:600px;margin:0 auto}
.sheet-label{font-size:.65rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.25rem}
.sheet-title{font-family:'Outfit',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:.75rem}
.sheet-body{font-size:.88rem;line-height:1.7;color:var(--text-2)}
.sheet-body strong{color:var(--text);font-weight:500}
.sheet-body code{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:var(--border-subtle);padding:.12em .35em;border-radius:4px}
.sheet-btns{display:flex;gap:.4rem;margin-top:1.25rem}
.sheet-btn{font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:500;padding:.45rem .9rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;transition:all .15s}
.sheet-btn:hover{border-color:#d6d3d1;box-shadow:var(--shadow)}
.sheet-btn.primary{background:var(--text);border-color:var(--text);color:var(--bg)}
.sheet-btn.primary:hover{opacity:.85}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stats-big{grid-template-columns:1fr}
  .road-item{flex-wrap:wrap}.road-btns{width:100%;justify-content:flex-end}
  .container{padding:0 1rem}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(prefers-color-scheme:dark){
  :root{--bg:#171717;--surface:#1c1c1c;--border:#2e2e2e;--border-subtle:#252525;--text:#e5e5e5;--text-2:#a3a3a3;--text-3:#636363;--accent-light:rgba(37,99,235,.15);--green-light:rgba(22,163,74,.15);--amber-light:rgba(217,119,6,.15);--red-light:rgba(220,38,38,.15);--purple-light:rgba(124,58,237,.15);--cyan-light:rgba(8,145,178,.15);--shadow:0 1px 3px rgba(0,0,0,.2)}
  .nav{background:rgba(23,23,23,.85)}
}
</style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="header-top">
      <h1>AI: Sand to Agents</h1>
      <span class="header-badge">18 projects</span>
    </div>
    <p>An interactive learning journey from semiconductors to agentic architecture.</p>
  </header>
</div>

<nav class="nav">
  <div class="container nav-inner">
    <button class="nav-btn active" onclick="showPage('map')" id="t-map">Map</button>
    <button class="nav-btn" onclick="showPage('roadmap')" id="t-roadmap">Roadmap</button>
    <button class="nav-btn" onclick="showPage('stats')" id="t-stats">Stats</button>
  </div>
</nav>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="stat-val" style="color:var(--accent)" id="sv-c">0</div><div class="stat-label">Learned</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)" id="sv-p">0/18</div><div class="stat-label">Projects</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--purple)" id="sv-ph">1</div><div class="stat-label">Phase</div></div>
    <div class="stat-card"><div class="stat-val" id="sv-pct">0%</div><div class="stat-label">Complete</div></div>
  </div>
  <div class="progress"><div class="progress-bar" id="pBar"></div></div>

  <div class="page active" id="p-map"></div>
  <div class="page" id="p-roadmap"></div>
  <div class="page" id="p-stats"></div>
</div>

<div class="overlay" id="ov"></div>
<div class="sheet" id="sh"><div class="sheet-handle"></div><div class="sheet-inner" id="shI"></div></div>

<script>
const P=[
{id:'f',l:'Phase 1',n:'Foundations',s:'Weeks 1–6',clr:'var(--accent)',hex:'#2563eb',pj:[
{n:1,sl:'neural-net-from-scratch',t:'Neural Net from Scratch',d:'Build a neural network library in pure NumPy',pp:['Rumelhart 1986','Kingma & Ba 2015'],cats:[
{l:'Linear Algebra',pills:[
{n:'Matrix Multiplication',k:1,c:'<strong>Matrix multiplication</strong> is the core operation of neural networks. Every forward pass computes <code>y = Wx + b</code>.\n\nThe weight matrix W transforms input x from one space to another. In a batch: <code>Y = XW^T + b</code>. Getting shapes right is 80% of debugging neural nets.'},
{n:'Vectors & Norms',c:'<strong>Norms</strong> measure vector magnitude:\n\n<strong>L1</strong>: sum of absolute values — Lasso regularization, induces sparsity.\n<strong>L2</strong>: sqrt of sum of squares — Ridge regularization, gradient clipping.\n<strong>L∞</strong>: max absolute value — adversarial robustness.\n\nL2 regularization adds λ||w||₂² to loss, shrinking weights. L1 drives weights to exactly zero.'},
{n:'Dot Product & Cosine Similarity',c:'<strong>Dot product</strong> measures alignment: <code>a·b = ||a|| ||b|| cos(θ)</code>\n\n<strong>Cosine similarity</strong> = cos(θ) between two vectors. Ranges from -1 to +1.\n\nThis is THE metric for semantic search. "Password reset" and "Can\'t log in" have high cosine similarity in embedding space despite sharing zero words.'},
{n:'Broadcasting',c:'NumPy\'s rule for operating on arrays of different shapes. Adding bias b (1×n) to batch Y (m×n) automatically expands b across all rows.\n\nMastering broadcasting eliminates 90% of explicit loops — essential since Python loops on arrays are ~100× slower than vectorized operations.'}
]},{l:'Calculus & Optimization',pills:[
{n:'Chain Rule',k:1,c:'The <strong>chain rule</strong> IS backpropagation — literally.\n\nIf <code>L = f(g(h(x)))</code>, then <code>dL/dx = dL/df · df/dg · dg/dh · dh/dx</code>\n\nEach function is a layer. Backprop computes how much each weight contributed to the loss by multiplying local gradients backward through the network.'},
{n:'Gradients',c:'The <strong>gradient</strong> ∇L is the vector of all partial derivatives — it points in the direction of steepest increase.\n\nTo minimize loss, walk opposite: <code>w ← w - η·∇L</code>\n\nThe gradient is perpendicular to loss contours. This geometric property makes gradient descent the natural optimization algorithm.'},
{n:'SGD',k:1,c:'<strong>Stochastic Gradient Descent</strong> estimates the gradient from a small batch:\n\n<code>w ← w - η · ∇L_batch(w)</code>\n\nThe noise from small batches helps escape shallow local minima and saddle points. Key hyperparameters: learning rate η (most important), batch size (affects noise and GPU utilization).'},
{n:'Adam Optimizer',k:1,c:'<strong>Adam</strong> combines momentum (direction) with RMSProp (scale):\n\n<code>m = β₁m + (1-β₁)∇L</code> — gradient direction\n<code>v = β₂v + (1-β₂)(∇L)²</code> — gradient magnitude\n<code>w ← w - η·m̂/(√v̂ + ε)</code>\n\nPer-parameter adaptive rates. Defaults: β₁=0.9, β₂=0.999, η=1e-3. The most widely used optimizer.'}
]},{l:'Neural Networks',pills:[
{n:'Perceptron → Deep Net',k:1,c:'A <strong>perceptron</strong>: <code>y = σ(w·x + b)</code>. Only learns linear boundaries.\n\nStack layers → <strong>MLP</strong>. With one hidden layer and enough neurons, it can approximate any continuous function (Universal Approximation Theorem).\n\nDepth > width: deep networks compose features hierarchically, expressing complex functions exponentially more efficiently.'},
{n:'Activation Functions',c:'Add <strong>nonlinearity</strong>. Without them, stacking linear layers = one linear layer.\n\n<strong>ReLU</strong>: max(0,x). Default for hidden layers. Fast, no saturation. "Dying ReLU" problem.\n<strong>GELU</strong>: smooth ReLU. Used in Transformers.\n<strong>Softmax</strong>: multi-class probabilities. Output layer.'},
{n:'Backpropagation',k:1,c:'<strong>Backprop</strong> = chain rule on a computational graph.\n\n1. <strong>Forward</strong>: compute output, save intermediates\n2. <strong>Backward</strong>: compute gradients in reverse\n\nComputes ALL gradients in O(forward pass) time. Without it, n gradients cost O(n × forward). This efficiency is why neural nets are trainable.'},
{n:'Loss Functions',c:'<strong>MSE</strong>: (ŷ-y)². Regression. Penalizes large errors quadratically.\n\n<strong>Cross-Entropy</strong>: -Σ yᵢ log(ŷᵢ). Classification. Derived from maximum likelihood estimation.\n\nWhy CE over MSE for classification? CE has better gradients through softmax — MSE vanishes when the model is confidently wrong.'},
{n:'Weight Initialization',c:'<strong>Xavier</strong>: Var(W) = 2/(fan_in + fan_out). For tanh/sigmoid.\n<strong>He</strong>: Var(W) = 2/fan_in. For ReLU.\n\nWrong init → activations collapse to zero or explode to NaN. Try training a 20-layer MLP with wrong init to see this.'},
{n:'Regularization',c:'<strong>L2</strong>: adds λ||w||² to loss. Shrinks weights. Gaussian prior.\n<strong>L1</strong>: adds λ||w|| to loss. Zeros out unimportant weights. Laplace prior.\n<strong>Dropout</strong>: randomly zero p% of neurons during training. Forces redundant representations.'},
{n:'MLE & Cross-Entropy',k:1,c:'<strong>MLE</strong>: maximize P(data|θ). Maximizing log-likelihood = minimizing negative log-likelihood = minimizing <strong>cross-entropy</strong>.\n\nThis is the deep reason CE is the "right" classification loss. L2 regularization = Gaussian prior. L1 = Laplace prior. Regularized training = MAP estimation.'}
]}
]},
{n:2,sl:'cnn-image-classifier',t:'CNN Image Classifier',d:'Convolutions from scratch, then PyTorch',pp:['He et al. 2016 (ResNet)'],cats:[
{l:'Convolution',pills:[
{n:'Kernels & Weight Sharing',k:1,c:'A 3×3 kernel has 9 parameters applied everywhere — <strong>weight sharing</strong>.\n\n<strong>Translation equivariance</strong>: detects the same feature regardless of position.\n<strong>Parameter efficiency</strong>: 9 params vs 2.4M for fully-connected on 224×224.'},
{n:'ResNet & Skip Connections',k:1,c:'<strong>ResNet</strong> learned F(x) + x instead of F(x). If the optimal transform ≈ identity, learning a small residual is easier.\n\nGradients flow directly through skips. Enabled 152+ layer networks. Used everywhere now: Transformers, LLMs, diffusion models.'}
]},{l:'PyTorch',pills:[
{n:'Autograd',k:1,c:'PyTorch tracks operations on tensors with <code>requires_grad=True</code>. <code>loss.backward()</code> computes all gradients via the chain rule.\n\nDynamic graph: rebuilt each forward pass. Python control flow works naturally.'},
{n:'Training Loop',c:'The 5-line heartbeat:\n<code>zero_grad → forward → loss → backward → step</code>\n\nEverything else is infrastructure around this.'},
{n:'Transfer Learning',c:'Pre-trained model → replace final head → fine-tune on your data.\n\nEarly layers learn universal features that transfer. Often 95%+ accuracy with 100 examples per class.'}
]},{l:'Hardware',pills:[
{n:'Why GPUs',c:'CPUs: optimize for single-thread latency. GPUs: throughput — thousands of simple cores.\n\nH100: 989 TFLOPS. CPU: ~1 TFLOPS. 1000× gap. Matrix multiply is embarrassingly parallel.'},
{n:'CUDA',c:'NVIDIA\'s programming model. <code>tensor.to("cuda")</code> moves data to GPU.\n\nTensor Cores: 16× faster matrix multiply. CUDA locked AI into NVIDIA — explains $30K prices and years-long waitlists.'}
]}
]}
]},
{id:'t',l:'Phase 2',n:'The Transformer Revolution',s:'Weeks 7–14',clr:'var(--purple)',hex:'#7c3aed',pj:[
{n:3,sl:'transformer-from-scratch',t:'Transformer from Scratch',d:'Attention, positional encoding, full architecture',pp:['Vaswani et al. 2017'],cats:[
{l:'Attention',pills:[
{n:'Scaled Dot-Product Attention',k:1,c:'<code>Attention(Q,K,V) = softmax(QKᵀ/√dₖ)V</code>\n\nQ: what am I looking for? K: what do I contain? V: what info do I provide?\n\n√dₖ scaling prevents softmax saturation. This is a soft database lookup — find relevant keys, return their values.'},
{n:'Multi-Head Attention',c:'Run h parallel heads in lower-dim subspaces. Different heads learn different patterns: syntax, coreference, position. Multiple simultaneous perspectives.'},
{n:'Self vs Cross Attention',c:'<strong>Self</strong>: Q,K,V from same sequence. <strong>Cross</strong>: Q from decoder, K,V from encoder.\n<strong>Causal mask</strong>: token i sees only tokens ≤ i.'},
{n:'Why Attention Beats RNNs',c:'RNNs: O(n) path length, sequential. Attention: O(1) path length, fully parallel.\n\nMore GPUs = more throughput = better models. This is why scaling laws work.'}
]},{l:'Architecture',pills:[
{n:'Residual Stream',k:1,c:'<code>output = LayerNorm(x + Sublayer(x))</code>\n\nThe transformer is a shared highway. Each layer reads/writes to the residual stream. Gradients flow directly — enables 100+ layers.'},
{n:'FFN Layers',c:'Each layer = attention + FFN. Hidden dim = 4× model dim. FFN stores factual knowledge — "Paris is the capital of France" lives in FFN weights.'},
{n:'Encoder vs Decoder',c:'<strong>Encoder</strong> (BERT): bidirectional, understanding.\n<strong>Decoder</strong> (GPT): causal, generation.\n\nDecoder-only won — simpler, universal via prompting. All frontier LLMs are decoder-only.'}
]},{l:'Position & Scale',pills:[
{n:'RoPE',k:1,c:'Encode position by rotating Q,K in complex space. Dot product depends on relative position.\n\nDominant in LLaMA, Mistral, Qwen. Context extension via frequency modification (YaRN).'},
{n:'Scaling Laws',k:1,c:'Loss ∝ N^(-α), D^(-β), C^(-γ). Chinchilla: scale model and data equally. ~20 tokens per parameter.\n\nGPT-3 was undertrained. LLaMA proved smaller + more data wins for inference cost.'}
]}
]},
{n:4,sl:'tokenizer-from-scratch',t:'Tokenizer from Scratch',d:'BPE algorithm, multilingual analysis',pp:['Sennrich et al. 2016'],cats:[
{l:'Tokenization',pills:[
{n:'BPE',k:1,c:'Start with characters, iteratively merge most frequent pair. Common words = single tokens. Rare words = subwords. Vocabulary: 32K-128K tokens.'},
{n:'Tokenization Impact',c:'Numbers split inconsistently → arithmetic is hard. English tokenizers 3-5× less efficient for Chinese/Hindi. LLaMA-3 expanded 32K→128K vocab — 30-40% multilingual improvement.'}
]}
]}
]},
{id:'l',l:'Phase 3',n:'LLMs — Training to Deployment',s:'Weeks 15–26',clr:'var(--cyan)',hex:'#0891b2',pj:[
{n:5,sl:'pretrain-small-lm',t:'Pre-train a Small LM',d:'125M parameter model on open data',pp:['Brown 2020','Hoffmann 2022'],cats:[
{l:'Pre-training',pills:[
{n:'Next Token Prediction',k:1,c:'Given tokens 1..n-1, predict token n. The model learns grammar, facts, reasoning, code — everything — from this single objective.'},
{n:'Data Quality',c:'Quality > quantity. Pipeline: language ID → quality filtering → deduplication (MinHash) → safety filtering.'},
{n:'Roofline Model',k:1,c:'Every operation is either compute-bound or memory-bound. Arithmetic intensity = FLOPs/bytes.\n\nLLM decode is almost always memory-bound. Quantization (fewer bytes) helps more than faster compute.'}
]}
]},
{n:6,sl:'finetune-llm',t:'Fine-tune an LLM',d:'LoRA/QLoRA on an open-source model',pp:['Hu et al. 2021 (LoRA)'],cats:[
{l:'Fine-tuning',pills:[
{n:'LoRA',k:1,c:'W\' = W + BA where B is d×r, A is r×d. With r=16: 128× parameter reduction. Fine-tuning updates are inherently low-rank. At inference: merge W+BA, zero overhead.'},
{n:'QLoRA',c:'4-bit quantized base + LoRA in BF16. Fine-tune 65B on one 48GB GPU. Made LLM fine-tuning accessible.'},
{n:'Quantization',c:'FP16: 2 bytes/param. INT8: 1 byte, ~2× speed. INT4: 0.5 bytes, fits consumer GPUs. GPTQ, AWQ are standard methods.'}
]}
]},
{n:7,sl:'alignment-lab',t:'Alignment Lab',d:'DPO, reward models, red-teaming',pp:['Ouyang 2022','Rafailov 2023'],cats:[
{l:'Alignment',pills:[
{n:'RLHF',k:1,c:'SFT → Reward Model (preferences) → PPO (optimize with KL penalty). Made ChatGPT "feel different."'},
{n:'DPO',k:1,c:'Skip reward model. Train directly on preference pairs. Simpler, more stable, cheaper. Dominant for open-source alignment.'}
]}
]},
{n:8,sl:'llm-inference-optimizer',t:'LLM Inference Optimizer',d:'KV cache, serving benchmarks, cost analysis',pp:['Kwon 2023 (vLLM)','Dao 2022'],cats:[
{l:'Inference',pills:[
{n:'KV Cache',k:1,c:'Store previously computed K,V. Each new token only computes its own. LLaMA-70B at 8K: ~8GB per request.'},
{n:'PagedAttention',k:1,c:'OS virtual memory for KV cache. Fixed-size pages, on-demand allocation. ~20× less memory waste. Prefix caching: 30-40% latency reduction.'},
{n:'Continuous Batching',c:'New requests join in-flight batches. 5-10× throughput vs static batching.'},
{n:'The Hardware Story',c:'Sand → silicon → transistors. TSMC: 90% of advanced chips. ASML: only EUV machines. NVIDIA + CUDA = software lock-in. TSMC in Taiwan = geopolitical risk.'}
]}
]}
]},
{id:'r',l:'Phase 4',n:'RAG & AI Applications',s:'Weeks 27–36',clr:'var(--amber)',hex:'#d97706',pj:[
{n:9,sl:'rag-pipeline',t:'RAG Pipeline',d:'Production retrieval augmented generation',pp:['Lewis et al. 2020'],cats:[
{l:'Core RAG',pills:[
{n:'Embeddings & Vector Search',k:1,c:'Map text to high-dim space. Similar texts → geometrically close. Vector DB enables fast ANN search. Pipeline: embed query → find nearest → pass to LLM → grounded answer.'},
{n:'BM25 & Hybrid Search',k:1,c:'BM25 excels at exact keywords. Dense excels at semantics. Hybrid (RRF fusion) almost always beats either alone.'},
{n:'Chunking',c:'Split docs into embedding-sized pieces. Recursive, semantic, or contextual (prepend summary per chunk). Tension: larger = more context, less precision.'},
{n:'Reranking',k:1,c:'Bi-encoder retrieves top-100 fast → cross-encoder reranks to top-10. Cross-encoders see query+doc together. 10-20% quality boost.'}
]}
]},
{n:10,sl:'advanced-rag',t:'Advanced RAG',d:'GraphRAG, Self-RAG, multi-modal',pp:['Microsoft 2024'],cats:[
{l:'Advanced',pills:[
{n:'HyDE',c:'Generate hypothetical answer → embed that → search. Bridges query-document distribution gap.'},
{n:'GraphRAG',k:1,c:'Index docs as knowledge graph. Entities + relationships → communities → summaries. Handles "what are the main themes?" — impossible for vector search.'},
{n:'Self-RAG & CRAG',c:'Self-RAG: model decides when to retrieve and critiques output. CRAG: evaluator grades docs, falls back to web search if irrelevant.'}
]}
]},
{n:11,sl:'enterprise-search-engine',t:'Enterprise Search Engine',d:'Multi-source hybrid search with ACL',pp:[],cats:[
{l:'Enterprise',pills:[
{n:'Multi-Tenancy',k:1,c:'Complete data isolation per org. Namespace isolation, metadata filters, or separate indexes. One cross-tenant leak = existential risk.'},
{n:'Access Control',c:'Pre-filter by permissions or post-filter results. ACL sync from source systems is the hard part.'},
{n:'Connectors',c:'Each source: auth, change detection, content extraction, schema normalization, incremental sync.'}
]}
]}
]},
{id:'a',l:'Phase 5',n:'Agentic AI',s:'Weeks 37–48',clr:'var(--red)',hex:'#dc2626',pj:[
{n:12,sl:'ai-agent-from-scratch',t:'AI Agent from Scratch',d:'Tool use, planning, memory — no frameworks',pp:['Yao et al. 2022'],cats:[
{l:'Core',pills:[
{n:'Chatbot vs Agent',k:1,c:'Chatbot answers questions. Agent accomplishes goals. Agent controls its own iteration — decides tools, info gathering, and when it\'s done.'},
{n:'Function Calling',k:1,c:'Define tools as JSON schemas. Model decides when to call and with what params. Tool quality > agent quality. Clear names, minimal parameters.'},
{n:'ReAct Loop',k:1,c:'Thought → Action → Observation → repeat. Interleaving reasoning with acting prevents hallucination.'}
]},{l:'Memory',pills:[
{n:'Short-Term',c:'Context window = working memory. When exceeded: summarize older turns, keep last N, retrieve relevant past.'},
{n:'Long-Term',c:'Store user facts in vector DB. Makes AI feel intelligent across sessions.'},
{n:'LangGraph',k:1,c:'Agents as stateful graphs: nodes (LLM/tools), edges (transitions), shared state. Built-in persistence, streaming, human-in-the-loop. The production choice.'}
]},{l:'Safety',pills:[
{n:'Reliability Math',k:1,c:'Per-step 95%, 10 steps = 60% end-to-end. Per-step 99% = 90%. Improving step reliability is THE highest-leverage work.'},
{n:'Evals',c:'Evals = unit tests for AI. 100+ golden examples. Run on every change. Block deployment if scores drop.'}
]}
]},
{n:13,sl:'multi-agent-system',t:'Multi-Agent System',d:'Specialized agents collaborating',pp:[],cats:[
{l:'Patterns',pills:[
{n:'Supervisor / Worker',c:'Supervisor decomposes → delegates to specialists → aggregates. "Onboard John Smith" → Okta + Slack + Jira agents.'},
{n:'Human-in-the-Loop',c:'Approval gates before high-impact actions. LangGraph interrupt nodes pause for human confirmation.'}
]}
]},
{n:14,sl:'ai-product-simulator',t:'AI Product Simulator',d:'Enterprise AI assistant prototype',pp:[],cats:[
{l:'Architecture',pills:[
{n:'Full Stack',c:'Intent → Retrieval → Agent Reasoning → API Actions → Safety → Streaming Response → Observability.'},
{n:'Observability',c:'Log everything: traces, tokens, cost, latency. Dashboard: cost/tenant, P50/P95/P99, error rate, quality over time.'}
]}
]}
]},
{id:'x',l:'Phase 6',n:'The Frontier',s:'Ongoing',clr:'var(--green)',hex:'#16a34a',pj:[
{n:15,sl:'diffusion-and-generation',t:'Diffusion & Generation',d:'Diffusion models from scratch',pp:['Ho et al. 2020'],cats:[{l:'Generative',pills:[{n:'Diffusion Process',c:'Forward: add noise → pure noise. Reverse: train to remove noise. Foundation of Stable Diffusion, DALL-E 2, Midjourney.'}]}]},
{n:16,sl:'mamba-and-alternatives',t:'Mamba & Alternatives',d:'State space models vs Transformers',pp:['Gu & Dao 2023'],cats:[{l:'Beyond Transformers',pills:[{n:'SSMs & Mamba',k:1,c:'Fixed-size state. O(n) time, O(1) memory/token. Input-dependent params for selective memory. Struggles with precise retrieval.'}]}]},
{n:17,sl:'reasoning-models',t:'Reasoning Models',d:'Chain-of-thought, test-time compute',pp:['Wei et al. 2022'],cats:[{l:'Reasoning',pills:[{n:'Test-Time Compute',k:1,c:'Train the model to natively reason before answering (o1/o3). Smaller model thinking longer matches larger model answering immediately.'}]}]},
{n:18,sl:'open-source-contribution',t:'Open Source Contribution',d:'Contribute to a major AI project',pp:[],cats:[{l:'Community',pills:[{n:'Why Contribute',c:'Forces reading production code. Builds credibility. Start with docs/bugs. Target: transformers, vLLM, LangChain.'}]}]}
]}
];

const CONN=[
{t:'Why CUDA → Why inference is expensive',b:'CUDA locked AI into NVIDIA GPUs. Transformers need massive matrix multiply — GPUs are the only hardware that scales. Inference costs dominate AI economics.',c:'var(--accent)'},
{t:'Why Transformers → Why Scaling Works',b:'RNNs were sequential. Transformers parallelize — more GPUs = better models directly.',c:'var(--purple)'},
{t:'Why RLHF → Why ChatGPT felt different',b:'RLHF injects human preferences — makes the model refuse harm, admit uncertainty, feel aligned.',c:'var(--cyan)'},
{t:'Why Embeddings → Why RAG works',b:'Similar meanings → close in vector space. Embed docs + query → find closest → give to model. No retraining needed.',c:'var(--amber)'},
{t:'Why Quantization → Why Edge AI works',b:'FP16 70B = 140GB. 4-bit = ~35GB. 7B at 4-bit runs on a phone. Same intelligence, fewer bits.',c:'var(--red)'},
{t:'Why CoT → Why o1/o3 exist',b:'Step-by-step reasoning improved results. OpenAI trained this natively. Test-time compute: think longer = better.',c:'var(--green)'}
];

// State
let S=JSON.parse(localStorage.getItem('aij2')||'{}');
if(!S.l)S.l={};if(!S.st)S.st={};
const save=()=>localStorage.setItem('aij2',JSON.stringify(S));
const cntPills=()=>{let c=0;P.forEach(ph=>ph.pj.forEach(p=>p.cats.forEach(cat=>c+=cat.pills.length)));return c};

// Map
function renderMap(){
  document.getElementById('p-map').innerHTML=P.map(ph=>`
<div class="phase${S._op===ph.id?' open':''}" data-ph="${ph.id}">
  <div class="phase-head" onclick="this.parentElement.classList.toggle('open')">
    <div class="phase-indicator" style="background:${ph.clr}"></div>
    <div class="phase-meta"><div class="phase-label">${ph.n}</div><div class="phase-sub">${ph.s}</div></div>
    <div class="phase-chevron">›</div>
  </div>
  <div class="phase-body">
  ${ph.pj.map(p=>{const st=S.st[p.sl]||'todo';return`
  <div class="proj" data-pj="${p.sl}">
    <div class="proj-head" onclick="this.parentElement.classList.toggle('open')">
      <div class="proj-num" style="background:${ph.hex}10;color:${ph.hex}">${p.n}</div>
      <div class="proj-info"><div class="proj-title">${p.t}</div><div class="proj-desc">${p.d}</div></div>
      <span class="proj-badge ${st}">${st==='active'?'Active':st==='done'?'Done':'Todo'}</span>
      <div class="proj-expand">›</div>
    </div>
    <div class="proj-content">
    ${p.cats.map(c=>`<div class="cat"><div class="cat-label">${c.l}</div><div class="pills">${c.pills.map(pill=>`<button class="pill${pill.k?' key':''}${S.l[pill.n]?' learned':''}" ${pill.k?`style="color:${ph.hex}"`:''} onclick="openSh('${ph.l}','${pill.n.replace(/'/g,"\\'")}',this,'${ph.hex}')" data-c="${encodeURIComponent(pill.c||'')}">${pill.k?`<span class="dot" style="background:${ph.hex}"></span>`:''}${pill.n}</button>`).join('')}</div></div>`).join('')}
    </div>
  </div>`;}).join('')}
  </div>
</div>`).join('')+`
<div class="conn-section"><div class="conn-section-title">How it all connects</div>
${CONN.map(c=>`<div class="conn" style="border-left-color:${c.c}"><h4 style="color:${c.c}">${c.t}</h4><p>${c.b}</p></div>`).join('')}
</div>`;
}

// Roadmap
function renderRoad(){
  document.getElementById('p-roadmap').innerHTML=P.map(ph=>`
<div class="road-group">
  <div class="road-group-title"><span class="dot" style="background:${ph.clr}"></span>${ph.n} <span style="color:var(--text-3);font-weight:300;font-size:.75rem">${ph.s}</span></div>
  ${ph.pj.map(p=>{const st=S.st[p.sl]||'todo';return`
  <div class="road-item">
    <div class="road-num" style="background:${ph.hex}10;color:${ph.hex}">${p.n}</div>
    <div class="road-info"><div class="road-title">${p.t}</div><div class="road-sub">${p.pp.join(' · ')||p.d}</div></div>
    <div class="road-btns">
      <button class="road-btn${st==='todo'?' on':''}" onclick="setSt('${p.sl}','todo')">Todo</button>
      <button class="road-btn${st==='active'?' on':''}" onclick="setSt('${p.sl}','active')">Active</button>
      <button class="road-btn${st==='done'?' on':''}" onclick="setSt('${p.sl}','done')">Done</button>
    </div>
  </div>`;}).join('')}
</div>`).join('');
}

// Stats
function renderStats(){
  const tot=cntPills(),lrn=Object.keys(S.l).length,done=Object.values(S.st).filter(s=>s==='done').length,act=Object.values(S.st).filter(s=>s==='active').length,pct=tot?Math.round(lrn/tot*100):0;
  const phs=P.map(ph=>{let t=0,l=0;ph.pj.forEach(p=>p.cats.forEach(c=>c.pills.forEach(pill=>{t++;if(S.l[pill.n])l++})));return{n:ph.n,hex:ph.hex,t,l,p:t?Math.round(l/t*100):0}});
  document.getElementById('p-stats').innerHTML=`
<div class="stats-big">
  <div class="stats-big-card"><div class="stats-big-val" style="color:var(--accent)">${lrn}</div><div class="stats-big-label">Concepts Learned</div><div class="stats-big-bar"><div style="width:${pct}%;background:var(--accent)"></div></div></div>
  <div class="stats-big-card"><div class="stats-big-val" style="color:var(--green)">${done}</div><div class="stats-big-label">Projects Complete</div><div class="stats-big-bar"><div style="width:${done/18*100}%;background:var(--green)"></div></div></div>
  <div class="stats-big-card"><div class="stats-big-val" style="color:var(--amber)">${act}</div><div class="stats-big-label">In Progress</div><div class="stats-big-bar"><div style="width:${act/18*100}%;background:var(--amber)"></div></div></div>
  <div class="stats-big-card"><div class="stats-big-val">${pct}%</div><div class="stats-big-label">Overall Progress</div><div class="stats-big-bar"><div style="width:${pct}%;background:var(--purple)"></div></div></div>
</div>
<div class="breakdown"><div class="breakdown-title">By Phase</div>
${phs.map(p=>`<div class="breakdown-row"><span class="breakdown-label">${p.n}</span><div class="breakdown-bar"><div style="width:${p.p}%;background:${p.hex}"></div></div><span class="breakdown-pct">${p.l}/${p.t}</span></div>`).join('')}
</div>`;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  document.getElementById('t-'+id).classList.add('active');
  if(id==='stats')renderStats();if(id==='roadmap')renderRoad();
}

function setSt(sl,st){S.st[sl]=st;save();renderRoad();renderMap();upTop()}

const ov=document.getElementById('ov'),sh=document.getElementById('sh'),shI=document.getElementById('shI');
let curPill=null;
function openSh(phase,name,el,color){
  const raw=decodeURIComponent(el.dataset.c);if(!raw)return;curPill=el;
  shI.innerHTML=`<div class="sheet-label">${phase}</div><div class="sheet-title">${name}</div><div class="sheet-body">${raw.replace(/\n/g,'<br>')}</div><div class="sheet-btns"><button class="sheet-btn primary" onclick="markL()">Got it</button><button class="sheet-btn" onclick="closeSh()">Close</button></div>`;
  ov.classList.add('on');sh.classList.add('on');
}
function closeSh(){ov.classList.remove('on');sh.classList.remove('on')}
function markL(){
  if(curPill){const n=curPill.textContent.trim();if(S.l[n]){delete S.l[n];curPill.classList.remove('learned')}else{S.l[n]=1;curPill.classList.add('learned')}save();upTop()}closeSh()
}
ov.onclick=closeSh;
document.onkeydown=e=>{if(e.key==='Escape')closeSh()};

function upTop(){
  const tot=cntPills(),lrn=Object.keys(S.l).length,done=Object.values(S.st).filter(s=>s==='done').length,pct=tot?Math.round(lrn/tot*100):0;
  let cph=1;P.forEach((ph,i)=>{if(ph.pj.some(p=>S.st[p.sl]==='active'||S.st[p.sl]==='done'))cph=i+1});
  document.getElementById('sv-c').textContent=lrn;
  document.getElementById('sv-p').textContent=done+'/18';
  document.getElementById('sv-ph').textContent=cph;
  document.getElementById('sv-pct').textContent=pct+'%';
  document.getElementById('pBar').style.width=pct+'%';
}

renderMap();renderRoad();upTop();
</script>
</body>
</html>
