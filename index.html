es increase diversity. Attention heatmaps show meaningful patterns (e.g., tokens attending to related tokens).", "time": "3-4 hours"}, {"name": "Architecture comparison write-up", "description": "Experiment with RoPE positional encoding. Write a comparison document: encoder-only vs decoder-only vs encoder-decoder, with concrete examples of when to use each.", "criteria": "RoPE implementation works. Document clearly explains the three architectures with real-world model examples.", "time": "3-4 hours"}], "connects_to": "This is the architecture underlying everything from Project 5 onward. Pre-training (Project 5) trains this exact architecture at scale. Understanding attention is required for KV caching (Project 8), RAG reranking (Project 9), and agent reasoning (Project 12). RoPE is used in every open-source LLM you'll fine-tune in Project 6."}, "tokenizer-from-scratch": {"title": "Tokenizer from Scratch", "phase": "The Transformer Revolution", "phaseNumber": 2, "projectNumber": 4, "status": "not-started", "elevator": "After this project, you'll understand why LLMs can't do arithmetic, why they're worse at Hindi than English, and why vocabulary size is a critical engineering decision — all because of tokenization.", "description": "Build a Byte-Pair Encoding (BPE) tokenizer from scratch. Then compare your implementation against OpenAI's tiktoken and Google's SentencePiece. Analyze how different tokenizers handle English text, Hindi text, code, and numbers to understand the real-world impact of tokenization choices.", "whyThisMatters": "Tokenization is the first and last thing that touches every LLM input and output. It silently determines what the model can and can't do well.", "prerequisites": {"projects": ["transformer-from-scratch"], "tools": ["Python 3.10+", "tiktoken", "sentencepiece", "NumPy", "Matplotlib", "Jupyter Notebook"], "hardware": "CPU only", "time": "1-2 weekends (8-15 hours)"}, "deliverables": ["A working BPE tokenizer built from scratch: training (merge learning) and encoding/decoding", "Comparison analysis: your BPE vs tiktoken (GPT-4) vs SentencePiece (LLaMA) on identical text", "Multilingual analysis: tokens per word in English, Hindi, Chinese, code — showing efficiency gaps", "Arithmetic analysis: how tokenizers split numbers and why this makes math hard for LLMs", "Vocabulary size experiment: train tokenizers at 1K, 8K, 32K, 100K vocab sizes and measure compression ratios"], "setup": {"steps": ["mkdir tokenizer-from-scratch && cd tokenizer-from-scratch", "python -m venv .venv && source .venv/bin/activate", "pip install tiktoken sentencepiece numpy matplotlib jupyter", "Download a text corpus for training: e.g., a Wikipedia dump subset or Project Gutenberg books", "Watch Karpathy's tokenizer video before starting"], "structure": "tokenizer-from-scratch/\n├── bpe/\n│   ├── __init__.py\n│   ├── tokenizer.py       # BPE: train, encode, decode\n│   ├── utils.py           # Byte-level helpers\n│   └── vocab.py           # Vocabulary management, merge rules\n├── analysis/\n│   ├── compare.py         # Side-by-side comparison script\n│   └── multilingual.py    # Cross-language analysis\n├── data/\n│   └── corpus.txt         # Training corpus\n├── notebooks/\n│   ├── 01_build_bpe.ipynb\n│   ├── 02_comparison.ipynb\n│   └── 03_tokenization_effects.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Sennrich, Haddow, Birch 2016 — Neural Machine Translation of Rare Words with Subword Units", "why": "The paper that introduced BPE for NLP. Read sections 2-3 for the algorithm."}, {"name": "Kudo & Richardson 2018 — SentencePiece: A simple and language independent subword tokenizer", "why": "How SentencePiece works and why it handles multilingual text differently than BPE."}], "videos": [{"name": "Andrej Karpathy: Let's build the GPT Tokenizer", "url": "https://www.youtube.com/watch?v=zduSFxRajkE", "why": "Builds exactly what you're building. The most relevant resource for this project."}], "code": [{"name": "karpathy/minbpe", "url": "https://github.com/karpathy/minbpe", "why": "Minimal BPE implementation in ~100 lines. Your reference implementation."}, {"name": "openai/tiktoken", "url": "https://github.com/openai/tiktoken", "why": "OpenAI's production tokenizer. Study the Python wrapper to understand the API design."}], "books": [{"name": "Natural Language Processing with Transformers — Tunstall, von Werra, Wolf", "chapters": "Ch. 2 (Text Classification) — tokenization section", "why": "Practical overview of tokenizer types and their tradeoffs in production"}]}, "milestones": [{"name": "BPE training works", "description": "Implement the BPE training algorithm: start with byte-level tokens, count pair frequencies, merge the most frequent pair, repeat for N merges. Save merge rules and vocabulary.", "criteria": "Can train a tokenizer on a text corpus. Vocabulary grows correctly with each merge. Merge rules are deterministic and reproducible.", "time": "3-5 hours"}, {"name": "Encode and decode", "description": "Implement encoding (text to token IDs) and decoding (token IDs to text). Handle edge cases: empty strings, unknown bytes, special tokens.", "criteria": "Round-trip: decode(encode(text)) == text for all test strings. Encoding produces the same output as the reference minbpe implementation.", "time": "2-3 hours"}, {"name": "Comparison analysis", "description": "Run the same text through your BPE, tiktoken (cl100k_base), and SentencePiece. Compare token counts, token boundaries, and compression ratios.", "criteria": "Comparison notebook with clear tables and visualizations. Can explain why each tokenizer makes different choices.", "time": "2-3 hours"}, {"name": "Impact analysis", "description": "Test multilingual efficiency (tokens per word across languages), arithmetic handling (how numbers are split), and code tokenization. Write analysis of how tokenization affects model behavior.", "criteria": "Quantified: Hindi uses N times more tokens than English for equivalent content. Clear explanation of why LLMs struggle with arithmetic due to tokenization.", "time": "2-3 hours"}], "connects_to": "Tokenization decisions directly affect pre-training cost (Project 5) — more tokens = more compute. When fine-tuning (Project 6), you need to understand tokenizer compatibility. Inference cost (Project 8) is measured in tokens, so tokenizer efficiency = cost efficiency. RAG chunking (Project 9) must respect token boundaries."}, "pretrain-small-lm": {"title": "Pre-train a Small LM", "phase": "LLMs — Training to Deployment", "phaseNumber": 3, "projectNumber": 5, "status": "not-started", "elevator": "After this project, you'll understand the full pre-training pipeline — data processing, training at scale, scaling laws, and why a 125M model trained right outperforms a 1B model trained wrong. You'll speak the language of LLM training engineers.", "description": "Pre-train a 125M parameter language model on a subset of open data (e.g., FineWeb, RedPajama). You'll build the full pipeline: data processing, tokenization, model architecture, training with mixed precision and gradient checkpointing, and evaluation. You'll measure perplexity, analyze scaling behavior, and understand compute-optimal training.", "whyThisMatters": "Pre-training is the most expensive and consequential step in building an LLM. Understanding it — even at small scale — separates PMs who can set realistic expectations from those who treat models as magic.", "prerequisites": {"projects": ["transformer-from-scratch", "tokenizer-from-scratch"], "tools": ["Python 3.10+", "PyTorch 2.0+", "Hugging Face Transformers and Datasets", "tiktoken or a custom tokenizer from Project 4", "wandb (experiment tracking)", "DeepSpeed or FSDP (for distributed training, optional)"], "hardware": "GPU required. Minimum: 1x A100 40GB (or 2x T4 16GB). Recommended: 1x A100 80GB. Cloud options: Lambda Labs ($1.10/hr A100), RunPod, Google Colab Pro+.", "time": "3-4 weekends (25-40 hours, including waiting for training runs)"}, "deliverables": ["A trained 125M parameter language model with measured perplexity on a held-out validation set", "Complete data pipeline: download, filter, deduplicate, tokenize, batch", "Training curves: loss vs tokens, loss vs compute, learning rate schedule", "Scaling analysis: train 10M, 50M, 125M models and plot loss vs model size (your own mini scaling law)", "Cost analysis: total GPU hours, $/token, extrapolation to larger models"], "setup": {"steps": ["mkdir pretrain-small-lm && cd pretrain-small-lm", "python -m venv .venv && source .venv/bin/activate", "pip install torch transformers datasets tiktoken wandb accelerate", "Set up GPU access: cloud provider account or local GPU", "Download a data subset: huggingface-cli download HuggingFaceFW/fineweb --include 'sample/10BT/*' (10B token sample)", "Read Hoffmann et al. 2022 (Chinchilla) before designing your training run"], "structure": "pretrain-small-lm/\n├── data/\n│   ├── download.py          # Data download and filtering\n│   ├── process.py           # Deduplication, quality filtering\n│   └── tokenize_data.py     # Tokenize and save as binary\n├── model/\n│   ├── config.py            # Model configs: 10M, 50M, 125M\n│   ├── gpt.py               # GPT architecture (from Project 3)\n│   └── schedule.py          # Learning rate schedules\n├── train.py                 # Main training loop\n├── evaluate.py              # Perplexity evaluation\n├── notebooks/\n│   ├── 01_data_exploration.ipynb\n│   ├── 02_training_analysis.ipynb\n│   └── 03_scaling_laws.ipynb\n├── configs/\n│   ├── train_10m.yaml\n│   ├── train_50m.yaml\n│   └── train_125m.yaml\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Brown et al. 2020 — Language Models are Few-Shot Learners (GPT-3)", "why": "The paper that showed scale is all you need. Read sections 2 (approach) and 4 (results) to understand the paradigm."}, {"name": "Hoffmann et al. 2022 — Training Compute-Optimal Large Language Models (Chinchilla)", "why": "The scaling laws paper. Proves GPT-3 was undertrained. Read section 3 for the compute-optimal ratio: ~20 tokens per parameter."}, {"name": "Touvron et al. 2023 — LLaMA: Open and Efficient Foundation Language Models", "why": "Shows that smaller models + more data = better inference efficiency. Read section 2 for architecture choices."}, {"name": "DeepSeek-AI 2024 — DeepSeek-V3 Technical Report", "why": "State-of-the-art efficient pre-training. Sections on MoE, training stability, and data processing."}], "videos": [{"name": "Andrej Karpathy: Let's reproduce GPT-2 (124M)", "url": "https://www.youtube.com/watch?v=l8pRSuU81PU", "why": "Exactly this project but done by Karpathy. Watch before or during your implementation."}, {"name": "Stanford CS149: Parallel Computing (Lectures on GPU architecture)", "url": "https://gfxcourses.stanford.edu/cs149/fall24", "why": "Understanding why training is compute-bound and how parallelism works"}], "code": [{"name": "karpathy/nanoGPT", "url": "https://github.com/karpathy/nanoGPT", "why": "Your starting point. Study train.py closely — it handles mixed precision, gradient accumulation, DDP."}, {"name": "karpathy/llm.c", "url": "https://github.com/karpathy/llm.c", "why": "GPT-2 training in pure C/CUDA. Read for understanding the low-level operations."}, {"name": "huggingface/datatrove", "url": "https://github.com/huggingface/datatrove", "why": "Production data processing pipeline. Study for data filtering and deduplication patterns."}], "books": [{"name": "Deep Learning — Goodfellow, Bengio, Courville", "chapters": "Ch. 8 (Optimization for Training Deep Models)", "why": "Learning rate schedules, batch size effects, gradient noise — all relevant to pre-training"}, {"name": "Computer Organization and Design — Patterson & Hennessy", "chapters": "Ch. 6 (Parallel Processors from Client to Cloud)", "why": "Understanding the memory hierarchy and compute bottlenecks that determine training speed"}]}, "milestones": [{"name": "Data pipeline ready", "description": "Download FineWeb sample, implement quality filtering (perplexity filter, language ID), deduplication (MinHash), and tokenization. Save as memory-mapped binary files for efficient loading.", "criteria": "Can load random batches of tokenized data instantly. Data statistics: total tokens, vocabulary coverage, average document length.", "time": "5-7 hours"}, {"name": "10M model trains successfully", "description": "Train a 10M parameter model as a sanity check. Verify: loss decreases, no NaN/Inf, learning rate schedule works, checkpointing works. This should be fast (minutes, not hours).", "criteria": "10M model training loss converges. Generated text is recognizable English. Validation perplexity is measured and logged.", "time": "3-4 hours"}, {"name": "Mixed precision and gradient checkpointing", "description": "Add BF16/FP16 mixed precision training. Implement gradient checkpointing to reduce memory. Add gradient accumulation for effective larger batch sizes.", "criteria": "Training speed increases ~2x with mixed precision. Memory usage decreases with gradient checkpointing. Training stability maintained (no loss spikes).", "time": "3-5 hours"}, {"name": "125M model training run", "description": "Launch the full 125M model training run. Monitor with wandb. Apply Chinchilla-optimal data ratio. Run for the full compute budget.", "criteria": "125M model reaches competitive perplexity (target: within 10% of nanoGPT reference). Training curves are smooth. Total training cost documented.", "time": "8-12 hours (including GPU time)"}, {"name": "Scaling analysis", "description": "Compare 10M, 50M, 125M models. Plot loss vs model size, loss vs tokens. Extrapolate to predict 350M and 1B model performance. Write up scaling insights.", "criteria": "Scaling plot shows expected power-law relationship. Chinchilla-optimal token counts match your observations. Cost extrapolation document completed.", "time": "3-4 hours"}], "connects_to": "Pre-training produces the base model that fine-tuning (Project 6) adapts. Understanding training dynamics helps you evaluate scaling decisions in the LLMs you'll use in Projects 9-14. The hardware concepts (memory hierarchy, roofline model) directly inform inference optimization (Project 8). Scaling laws are essential PM knowledge for evaluating model investment decisions."}, "finetune-llm": {"title": "Fine-tune an LLM", "phase": "LLMs — Training to Deployment", "phaseNumber": 3, "projectNumber": 6, "status": "not-started", "elevator": "After this project, you'll be able to take any open-source LLM and adapt it to a specific domain — understanding exactly which method to use (full fine-tune vs LoRA vs QLoRA), how much data you need, and what quality looks like.", "description": "Fine-tune an open-source LLM (LLaMA-3-8B or Mistral-7B) for a specific domain using LoRA and QLoRA. You'll prepare instruction data, apply parameter-efficient fine-tuning, evaluate against the base model, and understand when fine-tuning helps vs. when prompting is sufficient.", "whyThisMatters": "Fine-tuning is how companies make generic LLMs useful for their specific domain. As a PM, you need to know when to fine-tune vs prompt vs RAG — this project gives you that judgment.", "prerequisites": {"projects": ["pretrain-small-lm"], "tools": ["Python 3.10+", "PyTorch 2.0+", "Hugging Face Transformers, PEFT, TRL, Datasets", "bitsandbytes (for quantization)", "wandb", "Jupyter Notebook"], "hardware": "GPU required. QLoRA: 1x T4 16GB or A10 24GB. Full LoRA on 8B: 1x A100 40GB. Google Colab Pro works for QLoRA.", "time": "2-3 weekends (15-25 hours)"}, "deliverables": ["A domain-specific fine-tuned model using LoRA on LLaMA-3-8B or Mistral-7B", "Comparison: base model vs LoRA vs QLoRA on domain-specific evaluation set", "Data preparation pipeline: instruction formatting, chat template application, quality filtering", "Quantization comparison: FP16 vs INT8 vs INT4 quality metrics", "A decision framework: when to fine-tune vs prompt-engineer vs RAG"], "setup": {"steps": ["mkdir finetune-llm && cd finetune-llm", "python -m venv .venv && source .venv/bin/activate", "pip install torch transformers peft trl datasets bitsandbytes wandb accelerate", "huggingface-cli login (for model access)", "Request access to LLaMA-3-8B on huggingface.co/meta-llama", "Prepare your instruction dataset: minimum 500 high-quality examples"], "structure": "finetune-llm/\n├── data/\n│   ├── prepare.py           # Data formatting and cleaning\n│   ├── templates.py         # Chat template application\n│   └── evaluate_data.py     # Data quality checks\n├── train/\n│   ├── lora_config.py       # LoRA hyperparameters\n│   ├── train_lora.py        # LoRA fine-tuning script\n│   ├── train_qlora.py       # QLoRA fine-tuning script\n│   └── merge.py             # Merge LoRA weights into base model\n├── eval/\n│   ├── benchmark.py         # Evaluation on domain tasks\n│   └── compare.py           # Base vs fine-tuned comparison\n├── notebooks/\n│   ├── 01_data_prep.ipynb\n│   ├── 02_lora_training.ipynb\n│   └── 03_evaluation.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Hu et al. 2021 — LoRA: Low-Rank Adaptation of Large Language Models", "why": "The LoRA paper. Read sections 1-4 for the math (low-rank decomposition) and section 5 for which layers to target."}, {"name": "Dettmers et al. 2023 — QLoRA: Efficient Finetuning of Quantized Language Models", "why": "QLoRA made fine-tuning accessible on consumer GPUs. Read section 3 for NF4 quantization and double quantization."}, {"name": "Zhou et al. 2023 — LIMA: Less Is More for Alignment", "why": "Proves 1000 high-quality examples can outperform 50K mediocre ones. Read section 3 for data curation methodology."}], "videos": [{"name": "Sebastian Raschka: Fine-tuning LLMs (complete walkthrough)", "url": "https://www.youtube.com/watch?v=eC6Hd1hFvos", "why": "Practical end-to-end fine-tuning with clear explanations of each decision"}, {"name": "Hugging Face: PEFT Tutorial", "url": "https://huggingface.co/docs/peft/quicktour", "why": "Official tutorial for the PEFT library you'll use"}], "code": [{"name": "huggingface/peft", "url": "https://github.com/huggingface/peft", "why": "The library implementing LoRA, QLoRA, and other PEFT methods. Study examples/ for patterns."}, {"name": "huggingface/trl", "url": "https://github.com/huggingface/trl", "why": "Training library for SFT, DPO, and PPO. SFTTrainer is your main entry point."}, {"name": "artidoro/qlora", "url": "https://github.com/artidoro/qlora", "why": "Original QLoRA implementation. Study qlora.py for the full training setup."}], "books": [{"name": "Natural Language Processing with Transformers — Tunstall, von Werra, Wolf", "chapters": "Ch. 7 (Question Answering) — fine-tuning section", "why": "Practical patterns for domain adaptation with evaluation methodology"}, {"name": "Probabilistic Machine Learning Vol. 2 — Murphy", "chapters": "Ch. 19.4 (Transfer Learning)", "why": "Theoretical framework for understanding why fine-tuning works"}]}, "milestones": [{"name": "Data pipeline ready", "description": "Collect or curate 500-1000 high-quality instruction-response pairs for your chosen domain. Format using the model's chat template. Split into train/eval sets.", "criteria": "Dataset is clean, formatted correctly, and loadable by HuggingFace Datasets. Each example follows the correct chat template. Eval set has 50+ diverse examples.", "time": "4-6 hours"}, {"name": "LoRA training works", "description": "Configure LoRA (rank, alpha, target modules). Train with SFTTrainer. Monitor loss and learning rate in wandb.", "criteria": "Training loss decreases. Model generates domain-relevant responses. wandb dashboard shows smooth training curves.", "time": "4-5 hours"}, {"name": "QLoRA comparison", "description": "Retrain with QLoRA (4-bit base model). Compare training speed, memory usage, and output quality against full LoRA.", "criteria": "QLoRA uses <50% memory of LoRA. Quality difference is documented (should be minimal for rank >= 16).", "time": "3-4 hours"}, {"name": "Evaluation and merge", "description": "Evaluate base model vs fine-tuned model on your domain eval set. Merge LoRA weights into base model for serving. Test the merged model.", "criteria": "Fine-tuned model measurably outperforms base model on domain tasks. Merged model produces identical outputs to LoRA model. Evaluation metrics documented.", "time": "3-4 hours"}], "connects_to": "The fine-tuned model from this project becomes the input to alignment (Project 7). LoRA math appears in every model adaptation discussion. QLoRA's quantization concepts are directly relevant to inference optimization (Project 8). The decision framework — fine-tune vs prompt vs RAG — is essential PM knowledge for Projects 9-14."}, "alignment-lab": {"title": "Alignment Lab", "phase": "LLMs — Training to Deployment", "phaseNumber": 3, "projectNumber": 7, "status": "not-started", "elevator": "After this project, you'll understand what makes ChatGPT 'feel different' from a base model, how preference optimization works, and why alignment is both the most important and most fragile part of the LLM pipeline.", "description": "Implement DPO (Direct Preference Optimization) alignment training on the fine-tuned model from Project 6. Collect or curate preference data, train with DPO, and measure behavioral changes. Red-team your aligned model to find failure modes. Optionally implement a reward model + PPO pipeline for comparison.", "whyThisMatters": "Alignment is what turns a next-token predictor into a helpful assistant. Understanding its mechanics — and its failure modes — is critical for any PM shipping AI products.", "prerequisites": {"projects": ["finetune-llm"], "tools": ["Python 3.10+", "PyTorch 2.0+", "Hugging Face TRL (DPOTrainer)", "Hugging Face Transformers, PEFT", "wandb", "Jupyter Notebook"], "hardware": "GPU required. Same requirements as Project 6. QLoRA DPO: 1x T4 16GB. Full: 1x A100 40GB.", "time": "2-3 weekends (15-20 hours)"}, "deliverables": ["DPO-aligned model with measurable behavioral improvement over the SFT model from Project 6", "Preference dataset: 500+ chosen/rejected pairs for your domain", "Before/after comparison: same prompts, SFT vs DPO responses, rated by quality", "Red-teaming report: 20+ adversarial prompts testing for jailbreaks, hallucination, and reward hacking", "Optional: reward model trained on preferences, PPO pipeline for comparison with DPO"], "setup": {"steps": ["mkdir alignment-lab && cd alignment-lab", "python -m venv .venv && source .venv/bin/activate", "pip install torch transformers peft trl datasets bitsandbytes wandb accelerate", "Copy or reference the fine-tuned model from Project 6", "Prepare preference data: for each prompt, you need a 'chosen' and 'rejected' response"], "structure": "alignment-lab/\n├── data/\n│   ├── preferences.py       # Preference pair creation\n│   ├── red_team.py          # Adversarial prompt generation\n│   └── datasets/\n│       └── preferences.jsonl # Chosen/rejected pairs\n├── train/\n│   ├── dpo.py               # DPO training script\n│   ├── reward_model.py      # Optional: reward model training\n│   └── ppo.py               # Optional: PPO pipeline\n├── eval/\n│   ├── compare.py           # SFT vs DPO comparison\n│   ├── red_team_eval.py     # Red-teaming evaluation\n│   └── reward_analysis.py   # Implicit reward analysis\n├── notebooks/\n│   ├── 01_preference_data.ipynb\n│   ├── 02_dpo_training.ipynb\n│   └── 03_red_teaming.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Ouyang et al. 2022 — Training language models to follow instructions with human feedback (InstructGPT)", "why": "The RLHF paper that created ChatGPT. Read section 3 for the SFT -> RM -> PPO pipeline."}, {"name": "Rafailov et al. 2023 — Direct Preference Optimization: Your Language Model is Secretly a Reward Model", "why": "The DPO paper. Read sections 3-4 for the math that eliminates the reward model. Equation 7 is the key insight."}, {"name": "Bai et al. 2022 — Constitutional AI: Harmlessness from AI Feedback", "why": "Anthropic's approach to alignment without human labels. Read section 2 for the self-improvement loop."}], "videos": [{"name": "Nathan Lambert: RLHF explained (Interconnects blog + YouTube)", "url": "https://www.interconnects.ai/", "why": "The clearest explanation of RLHF/DPO differences, trade-offs, and practical considerations"}, {"name": "Hugging Face: DPO Training Tutorial", "url": "https://huggingface.co/docs/trl/dpo_trainer", "why": "Official tutorial for DPOTrainer — your implementation reference"}], "code": [{"name": "huggingface/trl (DPOTrainer)", "url": "https://github.com/huggingface/trl/tree/main/examples/dpo", "why": "Production DPO implementation. Study the examples closely."}, {"name": "anthropics/hh-rlhf", "url": "https://huggingface.co/datasets/Anthropic/hh-rlhf", "why": "Anthropic's open preference dataset. Use as a reference for preference data format."}], "books": [{"name": "Probabilistic Machine Learning Vol. 2 — Murphy", "chapters": "Ch. 5.4 (Bayesian Decision Theory)", "why": "The theoretical framework behind preference learning and reward optimization"}]}, "milestones": [{"name": "Preference data collected", "description": "Create 500+ preference pairs. For each prompt, generate two responses from your SFT model (with different temperatures), then label which is better and why. Format for DPOTrainer.", "criteria": "Dataset has 500+ pairs with chosen/rejected responses. Format matches TRL's expected schema. Inter-annotator agreement is reasonable if you had multiple labelers.", "time": "4-6 hours"}, {"name": "DPO training complete", "description": "Train with DPOTrainer. Tune beta (KL penalty strength). Monitor implicit reward margins in wandb.", "criteria": "Implicit reward margin (chosen reward - rejected reward) increases during training. Training is stable (no divergence). Model still generates coherent text.", "time": "4-5 hours"}, {"name": "Before/after evaluation", "description": "Run the same 50+ prompts through SFT and DPO models. Rate responses on helpfulness, harmlessness, and honesty. Calculate win rates.", "criteria": "DPO model wins >60% of head-to-head comparisons on domain-relevant prompts. Documented examples of improved behavior.", "time": "3-4 hours"}, {"name": "Red-teaming", "description": "Design 20+ adversarial prompts: jailbreak attempts, hallucination probes, out-of-domain requests, prompt injection. Test both SFT and DPO models.", "criteria": "Red-teaming report documents all attempts and results. At least 3 categories of adversarial testing. Identified weaknesses and potential mitigations documented.", "time": "3-4 hours"}], "connects_to": "Alignment understanding is essential for building safe AI agents (Projects 12-14). The red-teaming skills transfer directly to evaluating RAG systems (Project 9) and agent safety (Project 12). DPO/RLHF knowledge helps you evaluate when alignment interventions are needed in enterprise AI products (Project 14)."}, "llm-inference-optimizer": {"title": "LLM Inference Optimizer", "phase": "LLMs — Training to Deployment", "phaseNumber": 3, "projectNumber": 8, "status": "not-started", "elevator": "After this project, you'll be able to evaluate any LLM serving configuration — understanding the tradeoffs between cost, latency, throughput, and quality. You'll know why inference is memory-bound and how to make it cheaper.", "description": "Build a minimal LLM inference server with KV caching, quantization, and comprehensive benchmarking. Compare vLLM, TGI, and llama.cpp. Build a cost calculator for self-hosting vs API. Understand the hardware bottlenecks from transistors to tokens.", "whyThisMatters": "Inference cost is the dominant cost of deploying LLMs. Every penny per token matters at scale. This project teaches you the engineering that turns a $100K/month inference bill into a $10K/month one.", "prerequisites": {"projects": ["pretrain-small-lm", "finetune-llm"], "tools": ["Python 3.10+", "vLLM", "llama.cpp (llama-cpp-python bindings)", "Hugging Face Transformers", "GPTQ/AWQ quantization libraries", "locust or wrk (load testing)", "Docker (for serving frameworks)"], "hardware": "GPU required for benchmarking. Minimum 1x T4 16GB. Ideal: test on multiple GPU types (T4, A10, A100) for comparison. llama.cpp runs on CPU/Apple Silicon too.", "time": "2-3 weekends (15-25 hours)"}, "deliverables": ["Benchmark report comparing vLLM vs TGI vs llama.cpp: throughput (tokens/sec), latency (TTFT, TPS), memory usage", "Quantization comparison: FP16 vs INT8 vs INT4 (GPTQ/AWQ/GGUF) — quality vs speed vs memory", "KV cache implementation: from scratch in PyTorch showing memory growth and optimization", "Cost calculator: spreadsheet/script that estimates $/1M tokens for any model + hardware + framework combo", "The hardware story: a written walkthrough from sand to inference — semiconductors, GPU architecture, memory bandwidth, roofline model"], "setup": {"steps": ["mkdir llm-inference-optimizer && cd llm-inference-optimizer", "python -m venv .venv && source .venv/bin/activate", "pip install vllm transformers auto-gptq autoawq llama-cpp-python locust", "Download a model: huggingface-cli download mistralai/Mistral-7B-Instruct-v0.2", "Install Docker for containerized serving frameworks", "For llama.cpp: download a GGUF quantized model from TheBloke on HuggingFace"], "structure": "llm-inference-optimizer/\n├── benchmarks/\n│   ├── run_vllm.py          # vLLM benchmark\n│   ├── run_tgi.py           # TGI benchmark\n│   ├── run_llamacpp.py      # llama.cpp benchmark\n│   ├── run_all.py           # Automated comparison\n│   └── locustfile.py        # Load testing script\n├── kv_cache/\n│   ├── naive.py             # Naive KV cache implementation\n│   ├── memory_analysis.py   # Memory growth measurement\n│   └── paged.py             # Simplified PagedAttention concept\n├── quantize/\n│   ├── gptq_quantize.py     # GPTQ quantization script\n│   ├── awq_quantize.py      # AWQ quantization script\n│   └── compare_quality.py   # Quality evaluation across quantizations\n├── cost/\n│   ├── calculator.py        # Cost estimation tool\n│   └── analysis.ipynb       # Cost analysis notebook\n├── notebooks/\n│   ├── 01_kv_cache.ipynb\n│   ├── 02_benchmarks.ipynb\n│   └── 03_hardware_story.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Kwon et al. 2023 — Efficient Memory Management for Large Language Model Serving with PagedAttention", "why": "The vLLM paper. Read sections 3-4 for PagedAttention — the single most important inference optimization."}, {"name": "Dao et al. 2022 — FlashAttention: Fast and Memory-Efficient Exact Attention", "why": "Read section 2 (hardware model) to understand the memory hierarchy that makes inference bandwidth-bound."}, {"name": "Leviathan, Kalman, Matias 2023 — Fast Inference from Transformers via Speculative Decoding", "why": "Speculative decoding uses a small model to draft tokens verified by the large model. Read sections 1-3."}, {"name": "Frantar et al. 2022 — GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers", "why": "The GPTQ quantization method. Read section 3 for the layer-wise quantization algorithm."}], "videos": [{"name": "Efficient Inference for LLMs (Stanford MLSys Seminar)", "url": "https://www.youtube.com/results?search_query=stanford+mlsys+efficient+inference+llm", "why": "Academic treatment of inference optimization with hardware context"}, {"name": "SemiAnalysis blog posts on GPU economics", "url": "https://www.semianalysis.com/", "why": "Industry analysis of GPU costs, supply chains, and economics that drive inference pricing"}], "code": [{"name": "vllm-project/vllm", "url": "https://github.com/vllm-project/vllm", "why": "The leading serving framework. Study vllm/attention/ for PagedAttention implementation."}, {"name": "ggerganov/llama.cpp", "url": "https://github.com/ggerganov/llama.cpp", "why": "CPU/Apple Silicon inference. Study the quantization formats (GGUF) and how they achieve speed without GPUs."}], "books": [{"name": "Computer Organization and Design — Patterson & Hennessy", "chapters": "Ch. 4 (The Processor), Ch. 5 (Memory Hierarchy)", "why": "Understanding the hardware that determines inference speed — cache hierarchy, bandwidth, latency"}, {"name": "Chip War — Chris Miller", "chapters": "Part 3 onwards", "why": "The geopolitics of AI hardware. Why TSMC, ASML, and NVIDIA matter for AI deployment costs."}]}, "milestones": [{"name": "KV cache from scratch", "description": "Implement naive KV caching for a transformer model. Measure memory growth as sequence length increases. Visualize the memory bottleneck.", "criteria": "KV cache reduces redundant computation. Memory growth chart shows linear scaling with sequence length. Can explain why this is the inference bottleneck.", "time": "3-4 hours"}, {"name": "Quantization comparison", "description": "Quantize a 7B model with GPTQ (INT4), AWQ (INT4), and GGUF formats. Measure quality (perplexity, benchmark scores) and speed.", "criteria": "Quality comparison table across all quantizations. Memory usage documented. Perplexity degradation measured.", "time": "4-5 hours"}, {"name": "Serving framework benchmarks", "description": "Set up vLLM, TGI, and llama.cpp serving the same model. Run identical prompts and measure TTFT, tokens/sec, throughput under load.", "criteria": "Benchmark report with consistent methodology. Load testing with concurrent users. Clear winner for each use case (latency vs throughput vs cost).", "time": "4-6 hours"}, {"name": "Cost calculator", "description": "Build a cost estimation tool: input model size, quantization, hardware, expected traffic. Output $/1M tokens, monthly cost, and comparison with API pricing (OpenAI, Anthropic).", "criteria": "Calculator handles common configurations. Validated against real cloud pricing. Clear break-even analysis: when self-hosting beats API.", "time": "3-4 hours"}], "connects_to": "Inference optimization knowledge is essential for RAG system design (Project 9) — you need to know how much each LLM call costs. The cost calculator informs enterprise AI product decisions (Projects 11, 14). Understanding memory bandwidth and KV caching helps you design efficient agent loops (Project 12) that minimize wasted compute."}, "rag-pipeline": {"title": "RAG Pipeline", "phase": "RAG & AI Applications", "phaseNumber": 4, "projectNumber": 9, "status": "not-started", "elevator": "After this project, you'll be able to build a production-quality RAG system — the architecture behind every enterprise AI assistant including Moveworks. You'll know why naive RAG fails and how to make retrieval actually reliable.", "description": "Build a production-quality RAG system from scratch — not using LangChain as a black box. Implement the full pipeline: document ingestion, chunking, embedding, vector storage (Pinecone), retrieval (dense + sparse + hybrid), reranking, and LLM generation with citations. Evaluate rigorously with retrieval metrics and answer quality.", "whyThisMatters": "RAG is the dominant architecture for enterprise AI. Moveworks, every enterprise search product, and most production LLM applications use RAG. This is the project most directly relevant to your day job.", "prerequisites": {"projects": ["transformer-from-scratch", "llm-inference-optimizer"], "tools": ["Python 3.10+", "Pinecone (vector database)", "sentence-transformers (embedding models)", "rank_bm25 (sparse retrieval)", "Anthropic or OpenAI API (for generation)", "Jupyter Notebook", "FastAPI (optional, for serving)"], "hardware": "CPU sufficient for retrieval. GPU optional for local embedding and reranking models.", "time": "3-4 weekends (20-30 hours)"}, "deliverables": ["Complete RAG pipeline: ingest -> chunk -> embed -> store -> retrieve -> rerank -> generate -> cite", "Working system over a real document corpus (e.g., technical documentation, legal docs, or research papers)", "Retrieval evaluation: recall@5, recall@10, MRR, nDCG on a labeled test set", "Answer quality evaluation: factual accuracy, citation correctness, hallucination rate", "Chunking experiment: compare fixed-size, recursive, and semantic chunking on the same corpus"], "setup": {"steps": ["mkdir rag-pipeline && cd rag-pipeline", "python -m venv .venv && source .venv/bin/activate", "pip install pinecone-client sentence-transformers rank-bm25 anthropic openai fastapi uvicorn jupyter", "Set up Pinecone account and create an index (dimension=1024 for BGE-large, metric=cosine)", "Prepare document corpus: at least 100 documents, preferably a domain you know well", "Create a labeled evaluation set: 50+ questions with known correct answer passages"], "structure": "rag-pipeline/\n├── ingest/\n│   ├── loader.py            # Document loading (PDF, HTML, Markdown)\n│   ├── chunker.py           # Chunking strategies\n│   └── embedder.py          # Embedding with sentence-transformers\n├── index/\n│   ├── pinecone_store.py    # Pinecone upsert and query\n│   ├── bm25_store.py        # BM25 sparse index\n│   └── hybrid.py            # Hybrid search with RRF fusion\n├── retrieve/\n│   ├── retriever.py         # Top-K retrieval\n│   ├── reranker.py          # Cross-encoder reranking\n│   └── pipeline.py          # Full retrieval pipeline\n├── generate/\n│   ├── prompt.py            # Prompt construction with context\n│   ├── generator.py         # LLM call with citation\n│   └── postprocess.py       # Citation extraction, cleanup\n├── eval/\n│   ├── retrieval_metrics.py # recall@k, MRR, nDCG\n│   ├── answer_metrics.py    # Factual accuracy, hallucination\n│   └── run_eval.py          # Full evaluation pipeline\n├── notebooks/\n│   ├── 01_chunking_experiment.ipynb\n│   ├── 02_retrieval_tuning.ipynb\n│   └── 03_end_to_end_eval.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Lewis et al. 2020 — Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks", "why": "The original RAG paper. Read sections 1-3 for the architecture and section 4 for the training procedure."}, {"name": "Wang et al. 2022 — Text Embeddings by Weakly-Supervised Contrastive Pre-training (E5)", "why": "Modern embedding model design. Explains why E5/BGE embeddings work well for retrieval."}, {"name": "Nogueira & Cho 2019 — Passage Re-ranking with BERT", "why": "Cross-encoder reranking. Section 2 explains why bi-encoder retrieval + cross-encoder reranking is the optimal architecture."}], "videos": [{"name": "Jerry Liu: Building Production RAG (LlamaIndex creator)", "url": "https://www.youtube.com/results?search_query=jerry+liu+production+rag", "why": "Practical patterns and anti-patterns from the creator of LlamaIndex"}, {"name": "Pinecone: Vector Database Fundamentals", "url": "https://www.pinecone.io/learn/", "why": "Understanding HNSW, IVF, and vector search algorithms"}], "code": [{"name": "run-llama/llama_index", "url": "https://github.com/run-llama/llama_index", "why": "Study the retrieval patterns (not for direct use). Look at llama_index/core/retrievers/ for architecture patterns."}, {"name": "explodinggradients/ragas", "url": "https://github.com/explodinggradients/ragas", "why": "RAG evaluation framework. Study metrics like faithfulness, answer relevancy, context precision."}], "books": [{"name": "Natural Language Processing with Transformers — Tunstall, von Werra, Wolf", "chapters": "Ch. 7 (Question Answering)", "why": "The extractive QA pipeline that RAG evolved from"}]}, "milestones": [{"name": "Document ingestion pipeline", "description": "Build document loading, chunking, and embedding pipeline. Implement at least three chunking strategies (fixed, recursive, semantic). Store embeddings in Pinecone.", "criteria": "100+ documents chunked and embedded in Pinecone. Can query and get relevant results. Three chunking strategies compared on a test set.", "time": "5-7 hours"}, {"name": "Hybrid retrieval", "description": "Implement BM25 sparse retrieval alongside dense (vector) retrieval. Implement Reciprocal Rank Fusion (RRF) to combine results. Compare dense vs sparse vs hybrid.", "criteria": "Hybrid retrieval beats both dense-only and sparse-only on recall@10. RRF fusion working correctly.", "time": "4-5 hours"}, {"name": "Reranking", "description": "Add cross-encoder reranking (e.g., BAAI/bge-reranker-large). Retrieve top-50 with bi-encoder, rerank to top-5 with cross-encoder.", "criteria": "Reranking improves precision@5 by >10%. Latency overhead is documented and acceptable.", "time": "3-4 hours"}, {"name": "Generation with citations", "description": "Build the generation pipeline: construct prompts with retrieved context, generate answers, extract and verify citations.", "criteria": "Generated answers include citations. Citation accuracy measured. Hallucination rate documented.", "time": "4-5 hours"}, {"name": "End-to-end evaluation", "description": "Build evaluation pipeline with retrieval metrics (recall@k, MRR, nDCG) and answer quality metrics (faithfulness, relevancy). Run on 50+ test questions.", "criteria": "Full evaluation report. Baseline metrics established. Each component's contribution measured (ablation study).", "time": "4-5 hours"}], "connects_to": "This is the foundation for Advanced RAG (Project 10) and Enterprise Search (Project 11). The retrieval patterns you build here are used by AI agents (Project 12) for tool-augmented retrieval. Evaluation methodology transfers to agent evaluation (Project 12). The entire Moveworks product stack relies on RAG architecture."}, "advanced-rag": {"title": "Advanced RAG", "phase": "RAG & AI Applications", "phaseNumber": 4, "projectNumber": 10, "status": "not-started", "elevator": "After this project, you'll know when basic RAG fails and which advanced technique to reach for — GraphRAG for summarization queries, Self-RAG for reliability, HyDE for query-document mismatch, and long-context for simplicity.", "description": "Extend your RAG pipeline with advanced techniques: HyDE (hypothetical document embeddings), Self-RAG and Corrective RAG (CRAG), GraphRAG with knowledge graphs, and multi-modal RAG. Compare all approaches against basic RAG and long-context on the same benchmark.", "whyThisMatters": "Basic RAG fails in predictable ways. This project teaches you to diagnose failure modes and select the right technique for each situation — essential for building reliable AI products.", "prerequisites": {"projects": ["rag-pipeline"], "tools": ["Python 3.10+", "Everything from Project 9", "neo4j or networkx (for GraphRAG)", "LLM API (Anthropic/OpenAI) with long-context support", "CLIP or similar (for multi-modal, optional)"], "hardware": "CPU sufficient for most. GPU helpful for local embedding models. Long-context experiments need API access to 100K+ context models.", "time": "3-4 weekends (20-30 hours)"}, "deliverables": ["HyDE implementation with comparison against direct embedding search", "Self-RAG: model decides when to retrieve and critiques its own output", "GraphRAG: knowledge graph extraction, community detection, hierarchical summarization", "Side-by-side benchmark: basic RAG vs HyDE vs Self-RAG vs GraphRAG vs long-context on 50+ questions", "Decision framework: when to use which RAG technique, with concrete criteria"], "setup": {"steps": ["mkdir advanced-rag && cd advanced-rag", "python -m venv .venv && source .venv/bin/activate", "pip install pinecone-client sentence-transformers anthropic openai networkx pyvis jupyter", "Optional: pip install neo4j (for production-grade graph storage)", "Reuse document corpus and evaluation set from Project 9"], "structure": "advanced-rag/\n├── hyde/\n│   ├── generator.py         # Hypothetical document generation\n│   └── pipeline.py          # HyDE retrieval pipeline\n├── self_rag/\n│   ├── critic.py            # Relevance and support critics\n│   └── pipeline.py          # Self-RAG pipeline with adaptive retrieval\n├── graph_rag/\n│   ├── extract.py           # Entity and relation extraction\n│   ├── graph.py             # Knowledge graph construction\n│   ├── community.py         # Community detection (Louvain/Leiden)\n│   └── pipeline.py          # GraphRAG pipeline\n├── eval/\n│   ├── benchmark.py         # Unified benchmark across all techniques\n│   └── analysis.ipynb       # Comparison analysis\n├── notebooks/\n│   ├── 01_hyde.ipynb\n│   ├── 02_self_rag.ipynb\n│   ├── 03_graph_rag.ipynb\n│   └── 04_comparison.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Gao et al. 2022 — Precise Zero-Shot Dense Retrieval without Relevance Labels (HyDE)", "why": "The HyDE technique. Read section 3 for the key insight: generate a hypothetical document, then search for real ones similar to it."}, {"name": "Asai et al. 2023 — Self-RAG: Learning to Retrieve, Generate, and Critique through Self-Reflection", "why": "Self-RAG teaches the model when to retrieve and how to self-critique. Read sections 3-4."}, {"name": "Microsoft Research 2024 — From Local to Global: A Graph RAG Approach", "why": "The GraphRAG paper. Sections 2-3 explain the indexing pipeline, section 4 shows why it handles summarization queries."}, {"name": "Liu et al. 2023 — Lost in the Middle: How Language Models Use Long Contexts", "why": "Shows that LLMs struggle with information in the middle of long contexts. Essential for understanding long-context vs RAG tradeoffs."}], "videos": [{"name": "Microsoft Research: GraphRAG deep dive", "url": "https://www.youtube.com/results?search_query=microsoft+graphrag+deep+dive", "why": "Walkthrough of the GraphRAG architecture and when it outperforms traditional RAG"}], "code": [{"name": "microsoft/graphrag", "url": "https://github.com/microsoft/graphrag", "why": "Microsoft's official GraphRAG implementation. Study the indexing pipeline."}, {"name": "langchain-ai/langgraph (Self-RAG example)", "url": "https://github.com/langchain-ai/langgraph/tree/main/examples", "why": "Reference implementation of Self-RAG and CRAG patterns"}], "books": [{"name": "Natural Language Processing with Transformers — Tunstall, von Werra, Wolf", "chapters": "Ch. 7 (Question Answering) — advanced section", "why": "Context on multi-hop and complex QA that motivates advanced RAG techniques"}]}, "milestones": [{"name": "HyDE implementation", "description": "Implement HyDE: for a query, generate a hypothetical answer, embed that answer, and search for real documents similar to it. Compare against direct query embedding.", "criteria": "HyDE improves recall on queries where the query and document use different vocabulary. Documented comparison with direct embedding search.", "time": "4-5 hours"}, {"name": "Self-RAG / CRAG", "description": "Implement a system where the LLM decides whether to retrieve (based on query complexity), critiques retrieved documents for relevance, and evaluates its own output for support.", "criteria": "System skips retrieval for simple factual questions. Retrieves for knowledge-intensive questions. Self-critique catches at least some unsupported claims.", "time": "5-6 hours"}, {"name": "GraphRAG", "description": "Extract entities and relationships from documents using an LLM. Build a knowledge graph. Detect communities. Generate hierarchical summaries. Answer questions using the graph.", "criteria": "Knowledge graph has meaningful entities and relationships. GraphRAG answers summarization questions that basic RAG cannot.", "time": "6-8 hours"}, {"name": "Comprehensive benchmark", "description": "Run all techniques (basic RAG, HyDE, Self-RAG, GraphRAG, long-context stuffing) on the same 50+ question benchmark. Categorize questions by type (factual, summarization, multi-hop, comparison).", "criteria": "Clear comparison table. Each technique has documented strengths and weaknesses. Decision framework: which technique for which query type.", "time": "4-5 hours"}], "connects_to": "GraphRAG and advanced retrieval patterns are directly applicable to Enterprise Search (Project 11). Self-RAG's self-critique pattern is a precursor to agent self-reflection (Project 12). The decision framework — when to use which technique — is essential PM knowledge for evaluating AI product architectures (Project 14)."}, "enterprise-search-engine": {"title": "Enterprise Search Engine", "phase": "RAG & AI Applications", "phaseNumber": 4, "projectNumber": 11, "status": "not-started", "elevator": "After this project, you'll have built a working prototype of what Moveworks, Glean, and other enterprise search products do — multi-source ingestion, hybrid search, access control, and AI-powered answers. This is the project most relevant to your career.", "description": "Build a full enterprise search system: connectors that ingest from multiple data sources, hybrid search (BM25 + semantic), access control and multi-tenancy, and AI-powered answer generation. This ties together RAG, embeddings, and enterprise patterns into a production-like system.", "whyThisMatters": "This is your job. Building this from scratch gives you the deepest possible understanding of what Moveworks does, why certain architectural decisions are made, and what the hard problems actually are.", "prerequisites": {"projects": ["rag-pipeline", "advanced-rag"], "tools": ["Python 3.10+", "Pinecone (vector store)", "Elasticsearch or Meilisearch (for BM25)", "FastAPI (API layer)", "sentence-transformers", "Anthropic or OpenAI API", "SQLite or PostgreSQL (metadata store)", "Jupyter Notebook"], "hardware": "CPU sufficient. Local Elasticsearch or Meilisearch instance. Cloud vector DB (Pinecone).", "time": "4-5 weekends (30-40 hours)"}, "deliverables": ["Working enterprise search engine with at least 3 data source connectors (e.g., Confluence, Google Drive, Notion or local file system)", "Hybrid search: BM25 + semantic with RRF fusion, reranking, and AI-generated answers", "Access control: per-user and per-group permissions enforced at query time", "Multi-tenancy: complete data isolation between tenants", "Search quality evaluation: relevance metrics on a labeled test set", "Admin dashboard: connector status, index statistics, query analytics"], "setup": {"steps": ["mkdir enterprise-search-engine && cd enterprise-search-engine", "python -m venv .venv && source .venv/bin/activate", "pip install pinecone-client sentence-transformers fastapi uvicorn elasticsearch anthropic sqlalchemy pydantic jupyter", "Set up Elasticsearch locally: docker run -d -p 9200:9200 elasticsearch:8.11.0", "Set up Pinecone index for semantic search", "Design your data sources: pick 3 sources you can programmatically access"], "structure": "enterprise-search-engine/\n├── connectors/\n│   ├── base.py              # Abstract connector interface\n│   ├── filesystem.py        # Local filesystem connector\n│   ├── confluence.py        # Confluence connector\n│   ├── notion.py            # Notion connector\n│   └── scheduler.py         # Incremental sync scheduler\n├── index/\n│   ├── pipeline.py          # Chunking + embedding + storing\n│   ├── bm25.py              # Elasticsearch BM25 index\n│   ├── semantic.py          # Pinecone semantic index\n│   └── hybrid.py            # Hybrid search with RRF\n├── auth/\n│   ├── models.py            # User, Group, Permission models\n│   ├── acl.py               # Access control enforcement\n│   └── tenant.py            # Multi-tenancy isolation\n├── search/\n│   ├── query.py             # Query processing\n│   ├── retriever.py         # Multi-source retrieval\n│   ├── reranker.py          # Cross-encoder reranking\n│   └── generator.py         # AI answer generation\n├── api/\n│   ├── main.py              # FastAPI app\n│   ├── routes.py            # Search, admin, connector endpoints\n│   └── models.py            # Request/response schemas\n├── eval/\n│   ├── benchmark.py         # Search quality evaluation\n│   └── test_queries.json    # Labeled test queries\n├── notebooks/\n│   └── admin_analytics.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [], "videos": [{"name": "Glean engineering blog posts on enterprise search architecture", "url": "https://www.glean.com/blog", "why": "Practical insights from a leading enterprise search company"}, {"name": "Elasticsearch: The Definitive Guide (free online book)", "url": "https://www.elastic.co/guide/en/elasticsearch/guide/current/index.html", "why": "Understanding BM25, analyzers, and search infrastructure"}], "code": [{"name": "danswer-ai/danswer (now Onyx)", "url": "https://github.com/onyx-dot-app/onyx", "why": "Open-source enterprise search. Study the connector architecture and search pipeline."}, {"name": "qdrant/qdrant", "url": "https://github.com/qdrant/qdrant", "why": "Alternative vector DB with built-in filtering. Study the filtering architecture for ACL patterns."}], "books": [{"name": "Relevant Search — Doug Turnbull & John Berryman", "chapters": "Ch. 1-5", "why": "The definitive book on search relevance engineering. Practical patterns for ranking and evaluation."}]}, "milestones": [{"name": "Connector framework", "description": "Build the abstract connector interface and implement 2 connectors (e.g., local filesystem + one API-based source). Implement incremental sync: detect new/modified/deleted documents.", "criteria": "Connectors run, ingest documents, and store metadata. Incremental sync only processes changed documents. Connector status tracked in metadata DB.", "time": "6-8 hours"}, {"name": "Hybrid search works", "description": "Index documents in both Elasticsearch (BM25) and Pinecone (semantic). Implement hybrid retrieval with RRF fusion. Add cross-encoder reranking.", "criteria": "Hybrid search returns relevant results for both keyword and semantic queries. Hybrid beats either individual method on test queries.", "time": "5-7 hours"}, {"name": "Access control and multi-tenancy", "description": "Implement user/group permission model. Enforce ACLs at query time (pre-filtering). Implement tenant isolation using namespace separation.", "criteria": "User A cannot see User B's documents. Tenant isolation is complete — no cross-tenant leaks. ACL enforcement tested with multiple user scenarios.", "time": "5-7 hours"}, {"name": "API and AI answers", "description": "Build FastAPI endpoints for search, admin, and connector management. Add AI-generated answers with citations from retrieved documents.", "criteria": "Full API working: search endpoint returns results with AI-generated answer. Admin endpoints show connector status and index stats.", "time": "5-6 hours"}, {"name": "Evaluation and analytics", "description": "Create a labeled test set of 30+ queries with expected documents. Evaluate search quality. Build basic analytics: query volume, click-through rate simulation, result relevance.", "criteria": "Search quality metrics documented. Analytics dashboard shows query patterns. Areas for improvement identified.", "time": "4-5 hours"}], "connects_to": "This project is the most direct application of everything you've learned to your Moveworks work. The connector, search, and ACL patterns are exactly what enterprise AI products use. The architecture decisions transfer directly to understanding your product's technical stack. The evaluation patterns extend to Project 14 (AI Product Simulator)."}, "ai-agent-from-scratch": {"title": "AI Agent from Scratch", "phase": "Agentic AI", "phaseNumber": 5, "projectNumber": 12, "status": "not-started", "elevator": "After this project, you'll understand the difference between a chatbot and an agent, how to build reliable tool-using systems, and why agent reliability math is the single most important concept in agentic AI.", "description": "Build an AI agent with tool use, planning, and memory — without frameworks first, then reimplemented with LangGraph. The agent should research topics, use tools (search, calculator, code execution), maintain memory across sessions, and produce structured reports. Focus on reliability and error handling.", "whyThisMatters": "Agentic AI is the next frontier for enterprise products. Understanding how agents work at the implementation level — especially the reliability challenges — is essential for building and managing agent-based products.", "prerequisites": {"projects": ["rag-pipeline", "advanced-rag"], "tools": ["Python 3.10+", "Anthropic API (Claude) or OpenAI API", "LangGraph", "Pinecone (for agent memory)", "FastAPI (for tool serving)", "Docker (for sandboxed code execution)", "Jupyter Notebook"], "hardware": "CPU sufficient. LLM API access required. Docker for sandboxed execution.", "time": "3-4 weekends (25-35 hours)"}, "deliverables": ["A working AI agent built from scratch: ReAct loop, tool calling, error recovery", "Same agent reimplemented in LangGraph for comparison", "Tool suite: web search, calculator, code execution (sandboxed), file I/O", "Memory system: short-term (conversation), long-term (vector DB), working (scratchpad)", "Reliability analysis: measure success rate over 50+ tasks, identify failure modes", "Structured output: agent produces formatted reports with sources"], "setup": {"steps": ["mkdir ai-agent-from-scratch && cd ai-agent-from-scratch", "python -m venv .venv && source .venv/bin/activate", "pip install anthropic openai langgraph pinecone-client fastapi uvicorn docker jupyter", "Set up API keys for your LLM provider", "Set up Docker for sandboxed code execution: docker pull python:3.11-slim", "Set up Pinecone index for long-term memory"], "structure": "ai-agent-from-scratch/\n├── scratch/\n│   ├── agent.py             # From-scratch agent: ReAct loop\n│   ├── tools.py             # Tool definitions and execution\n│   ├── memory.py            # Memory management\n│   ├── planner.py           # Task decomposition\n│   └── main.py              # Agent entry point\n├── langgraph/\n│   ├── graph.py             # LangGraph agent definition\n│   ├── nodes.py             # Graph nodes: reason, act, observe\n│   ├── tools.py             # LangGraph tool integration\n│   └── main.py              # LangGraph entry point\n├── tools/\n│   ├── search.py            # Web search tool\n│   ├── calculator.py        # Math evaluation\n│   ├── code_runner.py       # Sandboxed Python execution\n│   └── file_io.py           # File read/write\n├── memory/\n│   ├── short_term.py        # Conversation history management\n│   ├── long_term.py         # Vector DB for cross-session memory\n│   └── working.py           # Scratchpad for current task\n├── eval/\n│   ├── tasks.json           # 50+ evaluation tasks\n│   ├── run_eval.py          # Automated evaluation\n│   └── reliability.py       # Success rate, failure mode analysis\n├── notebooks/\n│   ├── 01_scratch_agent.ipynb\n│   ├── 02_langgraph_agent.ipynb\n│   └── 03_reliability_analysis.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Yao et al. 2022 — ReAct: Synergizing Reasoning and Acting in Language Models", "why": "The ReAct paper that defined the agent loop. Read sections 1-3 for the Thought -> Action -> Observation pattern."}, {"name": "Schick et al. 2023 — Toolformer: Language Models Can Teach Themselves to Use Tools", "why": "How LLMs learn to use tools. Read section 2 for the tool learning approach."}, {"name": "Anthropic 2024 — Building effective agents", "why": "Practical patterns for building reliable agents. Read the full blog post."}], "videos": [{"name": "Harrison Chase: Building Agents with LangGraph", "url": "https://www.youtube.com/results?search_query=harrison+chase+langgraph+agents", "why": "LangGraph creator explains agent graph patterns"}, {"name": "Anthropic: Claude Agent SDK introduction", "url": "https://docs.anthropic.com/", "why": "Understanding the production agent SDK patterns"}], "code": [{"name": "langchain-ai/langgraph", "url": "https://github.com/langchain-ai/langgraph", "why": "Your framework for the second implementation. Study examples/agent_executor/ closely."}, {"name": "anthropics/anthropic-cookbook", "url": "https://github.com/anthropics/anthropic-cookbook", "why": "Official Claude examples including tool use and agent patterns"}], "books": [{"name": "Building LLM Apps — Valentino Gagliardi", "chapters": "Ch. on Agent Architectures", "why": "Practical patterns for agent construction and deployment"}]}, "milestones": [{"name": "ReAct loop from scratch", "description": "Build the core agent loop: parse the LLM's decision to think or act, execute tools, feed observations back. Handle tool errors gracefully. Implement max-step limits.", "criteria": "Agent can solve simple tasks (search + summarize) using the ReAct pattern. Tool errors don't crash the agent. Conversation history is maintained.", "time": "5-7 hours"}, {"name": "Tool suite", "description": "Build 4+ tools: web search (via API), calculator (safe math eval), sandboxed code execution (Docker), file I/O. Each tool has clear input/output schemas.", "criteria": "All tools work independently. Code execution is sandboxed (no filesystem or network access). Tools handle edge cases gracefully.", "time": "4-6 hours"}, {"name": "Memory system", "description": "Implement three memory tiers: short-term (recent messages with truncation), long-term (facts stored in Pinecone, retrieved by relevance), working memory (scratchpad for the current task).", "criteria": "Agent remembers facts across sessions using long-term memory. Working memory helps with multi-step reasoning. Context window management prevents overflow.", "time": "4-5 hours"}, {"name": "LangGraph reimplementation", "description": "Rebuild the same agent in LangGraph. Define the graph: nodes for reasoning, action, observation. Add human-in-the-loop approval for high-impact actions.", "criteria": "LangGraph agent produces equivalent outputs to the scratch agent. Human-in-the-loop works for designated actions. Persistence works across sessions.", "time": "5-6 hours"}, {"name": "Reliability evaluation", "description": "Create 50+ evaluation tasks across categories (research, calculation, code, multi-step). Run both agents. Measure success rate, failure modes, and cost per task.", "criteria": "Reliability report with success rates by task category. Failure mode taxonomy (tool errors, reasoning errors, hallucination). Cost analysis per task.", "time": "4-5 hours"}], "connects_to": "Agent architecture is the foundation for multi-agent systems (Project 13) and the full enterprise AI product (Project 14). The reliability math — understanding that per-step accuracy compounds exponentially — is the most important insight for any PM building agentic products. Memory patterns reappear in every agent-based system."}, "multi-agent-system": {"title": "Multi-Agent System", "phase": "Agentic AI", "phaseNumber": 5, "projectNumber": 13, "status": "not-started", "elevator": "After this project, you'll understand when to use a single agent vs. multiple specialized agents, how to orchestrate agent collaboration, and the safety patterns that prevent multi-agent systems from going off the rails.", "description": "Build a multi-agent system where specialized agents collaborate on complex tasks. Implement supervisor/worker patterns, agent delegation, shared state, and human-in-the-loop approval flows. Compare LangGraph, CrewAI, and the Claude Agent SDK as orchestration frameworks.", "whyThisMatters": "Enterprise AI products increasingly use multi-agent architectures. Understanding orchestration patterns — and their failure modes — is essential for designing reliable agent-based products like Moveworks.", "prerequisites": {"projects": ["ai-agent-from-scratch"], "tools": ["Python 3.10+", "LangGraph", "CrewAI", "Anthropic API (Claude Agent SDK)", "Pinecone (shared memory)", "FastAPI", "Jupyter Notebook"], "hardware": "CPU sufficient. LLM API access required. Budget ~$20-50 in API costs for multi-agent experiments.", "time": "3-4 weekends (20-30 hours)"}, "deliverables": ["A multi-agent system with supervisor + 3 specialized worker agents", "Concrete workflow: e.g., research -> analysis -> report generation, or code review pipeline", "Framework comparison: LangGraph vs CrewAI vs Claude Agent SDK on the same workflow", "Safety layer: approval gates, output validation, cost limits, timeout handling", "Evaluation: success rate, latency, cost, and quality compared to single-agent approach"], "setup": {"steps": ["mkdir multi-agent-system && cd multi-agent-system", "python -m venv .venv && source .venv/bin/activate", "pip install langgraph crewai anthropic openai pinecone-client fastapi uvicorn jupyter", "Design your workflow: pick a complex task that benefits from specialization", "Define 3-4 specialist roles with clear responsibilities and tools"], "structure": "multi-agent-system/\n├── workflow/\n│   ├── supervisor.py        # Supervisor agent: task decomposition + delegation\n│   ├── researcher.py        # Research specialist agent\n│   ├── analyst.py           # Analysis specialist agent\n│   ├── writer.py            # Report writing specialist agent\n│   └── shared_state.py      # Shared state management\n├── frameworks/\n│   ├── langgraph_impl.py    # LangGraph implementation\n│   ├── crewai_impl.py       # CrewAI implementation\n│   └── claude_sdk_impl.py   # Claude Agent SDK implementation\n├── safety/\n│   ├── guardrails.py        # Output validation, content filtering\n│   ├── approval.py          # Human-in-the-loop approval gates\n│   ├── cost_limiter.py      # Token budget and cost tracking\n│   └── timeout.py           # Agent timeout handling\n├── eval/\n│   ├── tasks.json           # Evaluation tasks\n│   ├── run_eval.py          # Multi-agent evaluation\n│   └── compare.py           # Single vs multi-agent comparison\n├── notebooks/\n│   ├── 01_multi_agent_design.ipynb\n│   ├── 02_framework_comparison.ipynb\n│   └── 03_safety_analysis.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Wu et al. 2023 — AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation", "why": "Multi-agent conversation patterns. Read sections 2-3 for the agent conversation framework."}, {"name": "Hong et al. 2023 — MetaGPT: Meta Programming for Multi-Agent Collaborative Framework", "why": "Software engineering analogy for multi-agent roles. Read section 3 for the role-based agent design."}], "videos": [{"name": "Harrison Chase: Multi-Agent Systems with LangGraph", "url": "https://www.youtube.com/results?search_query=harrison+chase+multi+agent+langgraph", "why": "LangGraph patterns for multi-agent orchestration"}, {"name": "CrewAI: Getting Started Tutorial", "url": "https://docs.crewai.com/", "why": "Alternative framework with different abstractions — useful for comparison"}], "code": [{"name": "langchain-ai/langgraph (multi-agent examples)", "url": "https://github.com/langchain-ai/langgraph/tree/main/examples", "why": "Official multi-agent examples: supervisor, hierarchical teams, handoffs"}, {"name": "joaomdmoura/crewAI", "url": "https://github.com/joaomdmoura/crewAI", "why": "Role-based multi-agent framework. Study the crew orchestration pattern."}, {"name": "microsoft/autogen", "url": "https://github.com/microsoft/autogen", "why": "Microsoft's multi-agent framework. Study the conversation patterns."}], "books": []}, "milestones": [{"name": "Supervisor + workers pattern", "description": "Build a supervisor agent that receives a complex task, decomposes it into subtasks, delegates to specialist workers, and aggregates results. Workers have distinct tools and prompts.", "criteria": "Supervisor successfully decomposes and delegates tasks. Workers produce specialist outputs. Final aggregated result is coherent.", "time": "6-8 hours"}, {"name": "Safety and approval gates", "description": "Add human-in-the-loop approval for high-impact actions. Implement cost limits, timeout handling, and output validation. Test failure recovery.", "criteria": "High-impact actions pause for human approval. Cost limits prevent runaway spending. Timeouts prevent infinite loops. Agent recovers gracefully from worker failures.", "time": "4-6 hours"}, {"name": "Framework comparison", "description": "Implement the same workflow in LangGraph, CrewAI, and Claude Agent SDK. Compare code complexity, flexibility, reliability, and observability.", "criteria": "Same workflow works in all three frameworks. Comparison document with clear trade-offs. Recommendation for when to use each.", "time": "6-8 hours"}, {"name": "Evaluation: single vs multi-agent", "description": "Run the same complex tasks with a single powerful agent and your multi-agent system. Compare success rate, quality, latency, and cost.", "criteria": "Quantified comparison across 20+ tasks. Clear analysis of when multi-agent adds value vs. overhead. Cost-per-task breakdown.", "time": "4-5 hours"}], "connects_to": "Multi-agent patterns are directly relevant to enterprise AI products (Project 14) where different agents handle different capabilities (IT support, HR queries, etc.). The safety patterns — approval gates, guardrails, cost limits — are essential for any production agent deployment. Framework evaluation knowledge helps you make build-vs-buy decisions as a PM."}, "ai-product-simulator": {"title": "AI Product Simulator", "phase": "Agentic AI", "phaseNumber": 5, "projectNumber": 14, "status": "not-started", "elevator": "After this project, you'll have built a working prototype of an enterprise AI assistant — tying together RAG, agents, tool use, observability, and cost management into a single system. This is the capstone that proves you understand the full AI product stack.", "description": "Build a simulation of an enterprise AI assistant (like Moveworks). This capstone project integrates everything: conversational AI, RAG for knowledge retrieval, agent-based workflow automation, tool use, observability, cost tracking, and A/B testing. Handle real enterprise use cases: IT support, HR queries, knowledge search.", "whyThisMatters": "This is the integration test for your entire learning journey. Every concept from the previous 13 projects comes together here. This is also the closest thing to building the actual product you manage at Moveworks.", "prerequisites": {"projects": ["enterprise-search-engine", "multi-agent-system"], "tools": ["Python 3.10+", "FastAPI", "LangGraph", "Pinecone", "Anthropic/OpenAI API", "PostgreSQL or SQLite", "Redis (for session management)", "Prometheus + Grafana (observability, optional)", "Streamlit or React (frontend, optional)"], "hardware": "CPU sufficient. LLM API access required. Budget ~$30-50 in API costs.", "time": "4-6 weekends (35-50 hours)"}, "deliverables": ["Working enterprise AI assistant handling IT support queries (password reset, software access, troubleshooting)", "RAG-powered knowledge search over enterprise documentation", "Agent-based workflow automation: classify intent -> retrieve -> reason -> execute -> respond", "Conversational interface with dialogue management and context tracking", "Observability dashboard: latency P50/P95/P99, cost per query, error rates, quality scores", "A/B testing framework: compare different prompts, models, or retrieval strategies", "Cost analysis: $/query breakdown by component (retrieval, LLM, tools)"], "setup": {"steps": ["mkdir ai-product-simulator && cd ai-product-simulator", "python -m venv .venv && source .venv/bin/activate", "pip install fastapi uvicorn langgraph anthropic pinecone-client sqlalchemy redis streamlit jupyter", "Set up PostgreSQL or SQLite for conversation history and analytics", "Set up Pinecone index (reuse from Project 11)", "Design your enterprise use cases: 3-5 categories with example queries"], "structure": "ai-product-simulator/\n├── assistant/\n│   ├── orchestrator.py      # Main conversation orchestrator\n│   ├── intent.py            # Intent classification\n│   ├── dialogue.py          # Dialogue state management\n│   └── response.py          # Response generation and formatting\n├── knowledge/\n│   ├── retriever.py         # RAG retrieval (from Projects 9-11)\n│   └── search.py            # Enterprise search integration\n├── agents/\n│   ├── it_support.py        # IT support agent\n│   ├── hr_agent.py          # HR queries agent\n│   ├── knowledge_agent.py   # Knowledge search agent\n│   └── router.py            # Agent routing logic\n├── tools/\n│   ├── ticket.py            # Create/update support tickets\n│   ├── directory.py         # Employee directory lookup\n│   ├── password.py          # Password reset (simulated)\n│   └── software.py          # Software provisioning (simulated)\n├── observability/\n│   ├── tracer.py            # Request tracing\n│   ├── metrics.py           # Latency, cost, quality metrics\n│   ├── logger.py            # Structured logging\n│   └── dashboard.py         # Streamlit analytics dashboard\n├── testing/\n│   ├── ab_test.py           # A/B testing framework\n│   ├── eval_suite.py        # Automated evaluation\n│   └── scenarios.json       # Test scenarios\n├── api/\n│   ├── main.py              # FastAPI app\n│   ├── routes.py            # API endpoints\n│   └── models.py            # Request/response schemas\n├── frontend/\n│   └── app.py               # Streamlit chat interface\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Anthropic 2024 — Building effective agents (blog post)", "why": "Production agent patterns directly applicable to enterprise AI assistants."}], "videos": [{"name": "AI Engineer Summit talks on production AI systems", "url": "https://www.youtube.com/results?search_query=ai+engineer+summit+production+agents", "why": "Real-world production patterns and lessons learned"}, {"name": "Moveworks engineering blog (internal reference)", "url": "https://www.moveworks.com/insights", "why": "Your company's approach to the exact problem you're building"}], "code": [{"name": "langchain-ai/chat-langchain", "url": "https://github.com/langchain-ai/chat-langchain", "why": "Production chat application with RAG + agents. Study the architecture patterns."}, {"name": "streamlit/streamlit", "url": "https://github.com/streamlit/streamlit", "why": "For building the chat UI and analytics dashboard quickly"}], "books": [{"name": "Designing Machine Learning Systems — Chip Huyen", "chapters": "Ch. 9 (Monitoring and Observability), Ch. 10 (Testing)", "why": "Production ML system patterns: monitoring, A/B testing, and deployment"}]}, "milestones": [{"name": "Intent classification and routing", "description": "Build intent classifier that categorizes queries (IT support, HR, knowledge search, general). Route to appropriate agent. Handle ambiguous queries with clarification.", "criteria": "Intent classification accuracy >90% on test set. Routing works for all categories. Ambiguous queries trigger clarification.", "time": "5-6 hours"}, {"name": "RAG + agent integration", "description": "Connect RAG retrieval from Project 11 to the agent framework from Project 12. Agent uses retrieved context to generate informed responses. Citations included.", "criteria": "Knowledge queries return accurate, cited answers. Agent combines retrieval with reasoning for complex queries.", "time": "6-8 hours"}, {"name": "Workflow automation", "description": "Build simulated tool actions: password reset, software provisioning, ticket creation. Agent executes multi-step workflows with confirmation.", "criteria": "Agent completes end-to-end workflows (e.g., 'reset my password' -> verify identity -> execute reset -> confirm). Human-in-the-loop for sensitive actions.", "time": "5-7 hours"}, {"name": "Observability and cost tracking", "description": "Instrument every component: request traces, token usage, latency, cost. Build a Streamlit dashboard showing real-time metrics.", "criteria": "Dashboard shows: queries/hour, P50/P95/P99 latency, cost/query, error rate, quality score distribution. Can drill into individual traces.", "time": "5-7 hours"}, {"name": "A/B testing and evaluation", "description": "Build A/B testing framework: compare different prompts, models, or retrieval strategies on the same query set. Run automated evaluation on 50+ scenarios.", "criteria": "A/B test shows statistically meaningful difference between two configurations. Automated evaluation produces quality scores. Full evaluation report.", "time": "5-6 hours"}], "connects_to": "This project is the capstone of your practical AI engineering journey. Every concept converges here: neural networks (Project 1) power the models, transformers (Project 3) are the architecture, fine-tuning (Project 6) adapts them, inference optimization (Project 8) makes them affordable, RAG (Projects 9-11) grounds them, and agents (Projects 12-13) make them useful. From here, you move to frontier research (Projects 15-18)."}, "diffusion-and-generation": {"title": "Diffusion & Generation", "phase": "The Frontier", "phaseNumber": 6, "projectNumber": 15, "status": "not-started", "elevator": "After this project, you'll understand how Stable Diffusion, DALL-E, and Midjourney work — from the mathematical foundations of diffusion processes to the U-Net architecture that powers image generation.", "description": "Build a diffusion model from scratch. Start with a simple 2D diffusion (denoising spirals), then scale to image generation. Implement the forward diffusion process (adding noise), the reverse process (denoising network), and the sampling procedure. Study the Stable Diffusion architecture.", "whyThisMatters": "Generative AI is not just text. Understanding diffusion models — the foundation of image generation — completes your understanding of the generative AI landscape.", "prerequisites": {"projects": ["transformer-from-scratch", "pretrain-small-lm"], "tools": ["Python 3.10+", "PyTorch 2.0+", "Hugging Face Diffusers", "torchvision", "Matplotlib", "Jupyter Notebook"], "hardware": "GPU required. Minimum 1x T4 16GB. A100 for full image diffusion. Colab Pro works.", "time": "3-4 weekends (20-30 hours)"}, "deliverables": ["2D diffusion model from scratch: denoise spiral data, visualize the forward and reverse process", "Image diffusion model: train a simple DDPM on MNIST or CIFAR-10", "Stable Diffusion exploration: use the Diffusers library to understand text-to-image, inpainting, and ControlNet", "Written comparison: diffusion vs GANs vs VAEs — strengths, weaknesses, use cases", "Visualizations: the denoising process at each timestep, latent space interpolation"], "setup": {"steps": ["mkdir diffusion-and-generation && cd diffusion-and-generation", "python -m venv .venv && source .venv/bin/activate", "pip install torch torchvision diffusers transformers accelerate matplotlib jupyter", "For full Stable Diffusion: need ~16GB GPU memory (Colab Pro with A100)", "Read Ho et al. 2020 sections 1-3 before starting"], "structure": "diffusion-and-generation/\n├── scratch/\n│   ├── noise_schedule.py    # Linear, cosine noise schedules\n│   ├── unet_simple.py       # Simple U-Net for 2D/MNIST\n│   ├── ddpm.py              # Denoising Diffusion Probabilistic Model\n│   └── sampler.py           # DDPM, DDIM sampling\n├── stable_diffusion/\n│   ├── explore.py           # Diffusers library exploration\n│   ├── latent_space.py      # Latent space analysis\n│   └── controlnet.py        # ControlNet experiments\n├── notebooks/\n│   ├── 01_2d_diffusion.ipynb\n│   ├── 02_image_diffusion.ipynb\n│   └── 03_stable_diffusion.ipynb\n├── .gitignore\n└── README.md"}, "resources": {"papers": [{"name": "Ho, Jain, Abbeel 2020 — Denoising Diffusion Probabilistic Models (DDPM)", "why": "The foundational diffusion paper. Read sections 1-4 for the full derivation."}, {"name": "Rombach et al. 2022 — High-Resolution Image Synthesis with Latent Diffusion Models", "why": "The Stable Diffusion paper. Read section 3 for the latent space trick that made high-res diffusion practical."}, {"name": "Song et al. 2020 — Denoising Diffusion Implicit Models (DDIM)", "why": "Faster sampling (50 steps vs 1000).
