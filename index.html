/* ═══════════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════════ */
const STATE_KEY = 'ai-journey-v2';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (!s.learned) s.learned = s.l || {};
      if (!s.statuses) s.statuses = s.st || {};
      if (!s.learnedAt) s.learnedAt = {};
      if (!s.milestones) s.milestones = {};
      return s;
    }
  } catch(e) {}
  try {
    const old = localStorage.getItem('aij2');
    if (old) {
      const s = JSON.parse(old);
      return { learned: s.l || {}, statuses: s.st || {}, learnedAt: {}, activeProject: null, milestones: {} };
    }
  } catch(e) {}
  return { learned: {}, statuses: {}, learnedAt: {}, activeProject: null, milestones: {} };
}

function saveState() {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function totalConcepts() {
  let c = 0;
  PHASES.forEach(ph => ph.projects.forEach(p => p.cats.forEach(cat => c += cat.pills.length)));
  return c;
}

function learnedCount() {
  return Object.keys(state.learned).length;
}

function projectConceptStats(proj) {
  let total = 0, learned = 0;
  proj.cats.forEach(cat => cat.pills.forEach(pill => {
    total++;
    if (state.learned[pill.name]) learned++;
  }));
  return { total, learned };
}

function doneProjects() {
  return Object.values(state.statuses).filter(s => s === 'done').length;
}

function currentPhaseNum() {
  let ph = 1;
  PHASES.forEach((p, i) => {
    if (p.projects.some(proj => state.statuses[proj.slug] === 'active' || state.statuses[proj.slug] === 'done')) ph = i + 1;
  });
  return ph;
}

function getActiveProject() {
  for (const ph of PHASES) {
    for (const proj of ph.projects) {
      if (state.statuses[proj.slug] === 'active') return { phase: ph, project: proj };
    }
  }
  return null;
}

function getPhaseForProject(slug) {
  for (const ph of PHASES) {
    for (const proj of ph.projects) {
      if (proj.slug === slug) return ph;
    }
  }
  return null;
}

function getProjectBySlug(slug) {
  for (const ph of PHASES) {
    for (const proj of ph.projects) {
      if (proj.slug === slug) return proj;
    }
  }
  return null;
}

function getProjectData(slug) {
  return PROJECTS_DATA[slug] || null;
}

function getAllProjectsList() {
  const list = [];
  PHASES.forEach(ph => ph.projects.forEach(proj => list.push({ phase: ph, project: proj })));
  return list;
}

  const h = new Date().getHours();
  if (h < 12) return 'Good morning, Indrashis';
  if (h < 17) return 'Good afternoon, Indrashis';
  if (h < 21) return 'Good evening, Indrashis';
  return 'Burning the midnight oil, Indrashis?';
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function getRecentLearned() {
  return Object.entries(state.learnedAt)
    .filter(([name]) => state.learned[name])
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5);
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function getFirstSentence(html) {
  const text = stripHtml(html);
  const match = text.match(/^[^.!?]*[.!?]/);
  return match ? match[0] : text.substring(0, 120);
}

function getRecommendedNext(proj) {
  for (const cat of proj.cats) {
    for (const pill of cat.pills) {
      if (pill.key && !state.learned[pill.name]) return pill;
    }
  }
  for (const cat of proj.cats) {
    for (const pill of cat.pills) {
      if (!state.learned[pill.name]) return pill;
    }
  }
  return null;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════
   TOAST

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

/* ═══════════════════════════════════════════════════
   SVG PROGRESS RING
   ═══════════════════════════════════════════════════ */
function progressRingSvg(pct, color, size) {
  size = size || 80;
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border-subtle)" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 400ms ease-out"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════
   VIEW ROUTING
   ═══════════════════════════════════════════════════ */
let currentView = 'dashboard';
let currentProjectSlug = null;
let expandedConcept = null;

function showView(view, projectSlug) {
  currentView = view;
  expandedConcept = null;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.header-nav button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false') });

  if (view === 'dashboard') {
    document.getElementById('view-dashboard').classList.add('active');
    document.getElementById('tab-dashboard').classList.add('active');
    document.getElementById('tab-dashboard').setAttribute('aria-selected', 'true');
    renderDashboard();
  } else if (view === 'projects') {
    document.getElementById('view-projects').classList.add('active');
    document.getElementById('tab-projects').classList.add('active');
    document.getElementById('tab-projects').setAttribute('aria-selected', 'true');
    if (projectSlug) {
      currentProjectSlug = projectSlug;
      renderProjectView(projectSlug);
    } else {
      const active = getActiveProject();
      if (active) {
        currentProjectSlug = active.project.slug;
        renderProjectView(active.project.slug);
      } else {
        currentProjectSlug = PHASES[0].projects[0].slug;
        renderProjectView(currentProjectSlug);
      }
    }
  }
  window.scrollTo(0, 0);
}

function navigateToProject(slug) {
  showView('projects', slug);
}

/* Finds the seqNum of a concept by name within the currently rendered project */
function getConceptSeqNum(proj, conceptName) {
  let seq = 0;
  for (const cat of proj.cats) {
    for (const pill of cat.pills) {
      seq++;
      if (pill.name === conceptName) return seq;
    }
  }
  return null;
}

/* Opens and smoothly scrolls to a concept accordion by name */
function openAndScrollToConcept(conceptName) {
  const proj = PHASES.flatMap(ph => ph.projects).find(p => p.slug === currentProjectSlug);
  if (!proj) return;
  const seqNum = getConceptSeqNum(proj, conceptName);
  if (!seqNum) return;

  // Close any currently open concept
  if (expandedConcept && expandedConcept !== conceptName) {
    document.querySelectorAll('.concept-card-body.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.concept-card-expand.open').forEach(el => el.classList.remove('open'));
  }
  expandedConcept = conceptName;

  const body = document.getElementById('concept-body-' + seqNum);
  if (body) {
    body.classList.add('open');
    const header = body.previousElementSibling;
    if (header) {
      const chevron = header.querySelector('.concept-card-expand');
      if (chevron) chevron.classList.add('open');
      header.setAttribute('aria-expanded', 'true');
    }
  }

  // Trigger diagram rendering
  if (DIAGRAM_CONCEPTS[conceptName]) {
    triggerDiagram(conceptName, seqNum);
  }

  const card = document.getElementById('concept-' + seqNum);
  if (card) {
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

/* Navigate to a project and auto-open the next unlearned concept */
function navigateToProjectAndResume(slug) {
  showView('projects', slug);
  // After render, open the next concept
  const proj = PHASES.flatMap(ph => ph.projects).find(p => p.slug === slug);
  if (!proj) return;
  const next = getNextConceptInOrder(proj);
  if (next) {
    setTimeout(() => openAndScrollToConcept(next.name), 80);
  }
}

/* Returns the first unlearned concept in strict order (no key-concept priority) */
function getNextConceptInOrder(proj) {
  for (const cat of proj.cats) {
    for (const pill of cat.pills) {
      if (!state.learned[pill.name]) return pill;
    }
  }
  return null;
}

    });
  }

  /* Getting Started — Prerequisites + Setup merged, collapsed by default */
  const hasPrereqs = pdata && pdata.prerequisites;
  const hasSetup = pdata && pdata.setup;
  if (hasPrereqs || hasSetup) {
    html += `<div class="setup-section">
      <button class="setup-toggle" onclick="toggleSetup(this)" aria-expanded="false">
        <span>${ICONS.rocket} Getting Started <span style="font-weight:400;opacity:0.7;font-size:.85em">— Prerequisites, tools, and environment setup</span></span>
        <span class="setup-toggle-icon">${ICONS.chevDown}</span>
      </button>
      <div class="setup-content">
        <div class="setup-inner">`;
    if (hasPrereqs) {
      const prereq = pdata.prerequisites;
      html += `<div style="margin-bottom:1.25rem"><div class="prereq-grid">`;
      if (prereq.projects && prereq.projects.length > 0) {
        html += '<div class="prereq-card"><div class="prereq-card-label">Required Projects</div><ul>';
        prereq.projects.forEach(p => {
          const pd = PROJECTS_DATA[p];
          const title = pd ? pd.title : p;
          html += `<li><span class="prereq-project-link" onclick="navigateToProject('${p}')">${title}</span></li>`;
        });
        html += '</ul></div>';
      }
      if (prereq.tools && prereq.tools.length > 0) {
        html += '<div class="prereq-card"><div class="prereq-card-label">Tools Needed</div><ul>';
        prereq.tools.forEach(t => { html += `<li>${t}</li>` });
        html += '</ul></div>';
      }
      if (prereq.hardware) {
        html += `<div class="prereq-card"><div class="prereq-card-label">Hardware</div><ul><li>${prereq.hardware}</li></ul></div>`;
      }
      if (prereq.time) {
        html += `<div class="prereq-card"><div class="prereq-card-label">Time Estimate</div><ul><li>${prereq.time}</li></ul></div>`;
      }
      html += '</div></div>';
    }
    if (hasSetup) {
      if (pdata.setup.steps) {
        html += '<ol class="setup-steps">';
        pdata.setup.steps.forEach(s => { html += `<li>${s}</li>` });
        html += '</ol>';
      }
      if (pdata.setup.structure) {
        html += `<pre>${escapeHtml(pdata.setup.structure)}</pre>`;
      }
    }
    html += '</div></div></div>';
  }

  /* Build Guide — moved up before Resources */
  const buildGuide = BUILD_GUIDES[proj.slug];
  if (buildGuide) {
    html += renderBuildGuideSection(proj.slug, buildGuide, phase.color);
  }

  if (pdata && pdata.resources) {
    const res = pdata.resources;
    const hasResources = (res.papers && res.papers.length) || (res.videos && res.videos.length) || (res.code && res.code.length) || (res.books && res.books.length);
    if (hasResources) {
      html += `<div class="section-heading">${ICONS.book} Resources</div>`;
      html += '<div class="resources-grid">';
      if (res.papers && res.papers.length > 0) {
        html += '<div class="resource-card"><div class="resource-card-type">' + ICONS.paper + ' Papers</div>';
        res.papers.forEach(p => {
          html += `<div class="resource-item"><div class="resource-name">${p.name}</div><div class="resource-why">${p.why}</div></div>`;
        });
        html += '</div>';
      }
      if (res.videos && res.videos.length > 0) {
        html += '<div class="resource-card"><div class="resource-card-type">' + ICONS.video + ' Videos</div>';
        res.videos.forEach(v => {
          html += `<div class="resource-item"><div class="resource-name">${v.url ? `<a href="${v.url}" target="_blank" rel="noopener">${v.name}</a>` : v.name}</div><div class="resource-why">${v.why}</div></div>`;
        });
        html += '</div>';
      }
      if (res.code && res.code.length > 0) {
        html += '<div class="resource-card"><div class="resource-card-type">' + ICONS.code + ' Code</div>';
        res.code.forEach(c => {
          html += `<div class="resource-item"><div class="resource-name">${c.url ? `<a href="${c.url}" target="_blank" rel="noopener">${c.name}</a>` : c.name}</div><div class="resource-why">${c.why}</div></div>`;
        });
        html += '</div>';
      }
      if (res.books && res.books.length > 0) {
        html += '<div class="resource-card"><div class="resource-card-type">' + ICONS.book + ' Books</div>';
        res.books.forEach(b => {
          let bookHtml = b.url ? `<a href="${b.url}" target="_blank" rel="noopener">${b.name}</a>` : b.name;
          if (b.chapters) bookHtml += ` <span style="color:var(--text-3);font-size:.75rem">(${b.chapters})</span>`;
          html += `<div class="resource-item"><div class="resource-name">${bookHtml}</div><div class="resource-why">${b.why}</div></div>`;
        });
        html += '</div>';
      }
      html += '</div>';
    }
  }

  if (pdata && pdata.connects_to) {
    html += `<div class="section-heading">${ICONS.link} How It Connects</div>`;
    html += `<div class="connects-card"><div class="connects-text">${pdata.connects_to}</div></div>`;
  }

  html += '<div class="project-nav-footer">';
  if (idx > 0) {
    const prev = allProjects[idx - 1];
    html += `<button class="project-nav-btn" onclick="navigateToProject('${prev.project.slug}')">
      <div class="project-nav-dir">${ICONS.back} Previous</div>
      <div class="project-nav-name">${prev.project.title}</div>
      <div class="project-nav-phase">${prev.phase.label} &middot; Project ${prev.project.n}</div>
    </button>`;
  } else {
    html += '<div></div>';
  }
  if (idx < allProjects.length - 1) {
    const next = allProjects[idx + 1];
    html += `<button class="project-nav-btn next" onclick="navigateToProject('${next.project.slug}')">
      <div class="project-nav-dir">Next ${ICONS.arrow}</div>
      <div class="project-nav-name">${next.project.title}</div>
      <div class="project-nav-phase">${next.phase.label} &middot; Project ${next.project.n}</div>
    </button>`;
  }
  html += '</div>';

  document.getElementById('view-projects').innerHTML = '<div class="project-view">' + html + '</div>';

  // If a concept is already expanded (e.g., via resume), trigger its diagram
  if (expandedConcept && DIAGRAM_CONCEPTS && DIAGRAM_CONCEPTS[expandedConcept]) {
    const proj = PHASES.flatMap(ph => ph.projects).find(p => p.slug === slug);
    if (proj) {
      const seq = getConceptSeqNum(proj, expandedConcept);
      if (seq) triggerDiagram(expandedConcept, seq);
    }
  }
}

/* ═══════════════════════════════════════════════════
   INTERACTIONS
   ═══════════════════════════════════════════════════ */
function toggleConcept(name, seqNum) {
  if (expandedConcept === name) {
    expandedConcept = null;
  } else {
    if (expandedConcept) {
      document.querySelectorAll('.concept-card-body.open').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.concept-card-expand.open').forEach(el => el.classList.remove('open'));
    }
    expandedConcept = name;
  }
  const body = document.getElementById('concept-body-' + seqNum);
  if (body) body.classList.toggle('open');
  const header = body?.previousElementSibling;
  if (header) {
    const chevron = header.querySelector('.concept-card-expand');
    if (chevron) chevron.classList.toggle('open');
    header.setAttribute('aria-expanded', body.classList.contains('open'));
  }
  // Trigger diagram rendering when concept is expanded
  if (body && body.classList.contains('open') && DIAGRAM_CONCEPTS[name]) {
    triggerDiagram(name, seqNum);
  }
}

function toggleConceptLearned(name) {
  const wasLearned = !!state.learned[name];
  if (wasLearned) {
    delete state.learned[name];
    delete state.learnedAt[name];
  } else {
    state.learned[name] = 1;
    state.learnedAt[name] = Date.now();
    checkMilestone(learnedCount());
  }
  saveState();
  if (currentProjectSlug) renderProjectView(currentProjectSlug);
}

function markConceptLearned(name) {
  if (!state.learned[name]) {
    state.learned[name] = 1;
    state.learnedAt[name] = Date.now();
    checkMilestone(learnedCount());
    saveState();
    if (currentProjectSlug) renderProjectView(currentProjectSlug);
  }
}

function handleStatusClick(slug, targetStatus, targetIdx, currentIdx) {
  if (targetStatus === 'done' && currentIdx === 0) {
    if (!confirm('Skip to complete? You can always revisit concepts.')) return;
  }
  state.statuses[slug] = targetStatus;
  saveState();
  if (currentProjectSlug === slug) renderProjectView(slug);
  if (currentView === 'dashboard') renderDashboard();
}

function setProjectStatus(slug, status) {
  state.statuses[slug] = status;
  saveState();
  if (currentProjectSlug === slug) renderProjectView(slug);
  if (currentView === 'dashboard') renderDashboard();
}

function toggleSetup(btn) {
  const content = btn.nextElementSibling;
  const icon = btn.querySelector('.setup-toggle-icon');
  content.classList.toggle('open');
  icon.classList.toggle('open');
  btn.setAttribute('aria-expanded', content.classList.contains('open'));
}

/* ═══════════════════════════════════════════════════
   EVENT LISTENERS
   ═══════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && expandedConcept) {
    document.querySelectorAll('.concept-card-body.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.concept-card-expand.open').forEach(el => el.classList.remove('open'));
    expandedConcept = null;
  }
  if (e.key === 'Enter' && e.target.classList.contains('journey-node')) {
    e.target.click();
  }
  if (e.key === 'Enter' && e.target.classList.contains('status-step')) {
    e.target.click();
  }
});

/* ═══════════════════════════════════════════════════
   INTERACTIVE DIAGRAMS — Lazy-loaded per concept
   ═══════════════════════════════════════════════════ */
const _diagramLibCache = {};
const _renderedDiagrams = new Set();

function loadLib(name, url, type) {
  if (_diagramLibCache[name]) return _diagramLibCache[name];
  _diagramLibCache[name] = new Promise((resolve, reject) => {
    if (type === 'css') {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = url;
      link.onload = resolve;
      link.onerror = reject;
      document.head.appendChild(link);
    } else {
      const script = document.createElement('script');
      script.src = url;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    }
  });
  return _diagramLibCache[name];
}

async function ensureLib(libName) {
  if (libName === 'chartjs') {
    if (window.Chart) return;
    await loadLib('chartjs', 'https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js');
  } else if (libName === 'mermaid') {
    if (window.mermaid) return;
    await loadLib('mermaid', 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js');
    window.mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: isDark() ? '#3d3530' : '#f5e6d3',
        primaryTextColor: isDark() ? '#f5f0eb' : '#2d2d2d',
        primaryBorderColor: isDark() ? '#6b6560' : '#c4956a',
        lineColor: isDark() ? '#a8a29e' : '#8b6f47',
        secondaryColor: isDark() ? '#2c2622' : '#fff9f4',
        tertiaryColor: isDark() ? '#231f1d' : '#fdf3e7',
        edgeLabelBackground: isDark() ? '#231f1d' : '#fdf8f2',
        fontFamily: 'Outfit, sans-serif'
      }
    });
  } else if (libName === 'roughjs') {
    if (window.rough) return;
    await loadLib('roughjs', 'https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js');
  } else if (libName === 'katex') {
    if (window.katex) return;
    await loadLib('katex-css', 'https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css', 'css');
    await loadLib('katex-js', 'https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js');
  }
}

function isDark() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function diagramColors() {
  const dark = isDark();
  return {
    stroke: dark ? '#a8a29e' : '#78716c',
    fill: dark ? 'rgba(168,162,158,0.12)' : 'rgba(120,113,108,0.08)',
    text: dark ? '#f5f0eb' : '#1a1615',
    text2: dark ? '#a8a29e' : '#78716c',
    bg: dark ? '#1c1917' : '#faf8f5',
    surface: dark ? '#231f1d' : '#ffffff',
    accent: '#f97316',
    phase1: '#059669',
    phase1Fill: dark ? 'rgba(5,150,105,0.2)' : 'rgba(5,150,105,0.1)',
    gridLine: dark ? 'rgba(168,162,158,0.15)' : 'rgba(120,113,108,0.1)',
    blue: dark ? '#60a5fa' : '#2563eb',
    red: dark ? '#f87171' : '#dc2626',
    green: dark ? '#34d399' : '#059669',
    purple: dark ? '#a78bfa' : '#7c3aed',
    amber: dark ? '#fbbf24' : '#d97706',
    cyan: dark ? '#22d3ee' : '#0891b2',
  };
}

function chartDefaults() {
  const c = diagramColors();
  return {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { labels: { color: c.text2, font: { family: 'Outfit', size: 12 } } } },
    scales: {
      x: { ticks: { color: c.text2, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: c.gridLine } },
      y: { ticks: { color: c.text2, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: c.gridLine } }
    }
  };
}

async function triggerDiagram(conceptName, seqNum) {
  const key = conceptName + '-' + seqNum;
  if (_renderedDiagrams.has(key)) return;
  const libName = DIAGRAM_CONCEPTS[conceptName];
  if (!libName) return;
  const container = document.getElementById('diagram-' + seqNum);
  if (!container) return;
  container.innerHTML = '<div class="diagram-loading">Loading diagram...</div>';
  _renderedDiagrams.add(key);
  try {
    await ensureLib(libName);
    if (libName === 'chartjs' && conceptName !== 'Vectors & Norms') {
      // also need katex for some labels — skip for now, just render chart
    }
    renderDiagram(conceptName, container);
  } catch (e) {
    container.innerHTML = '';
    _renderedDiagrams.delete(key);
    console.warn('Diagram load failed for', conceptName, e);
  }
}

function renderDiagram(conceptName, container) {
  container.innerHTML = '';
  const c = diagramColors();

  switch (conceptName) {

  case 'Matrix Multiplication': {
    const wrapper = document.createElement('div');
    wrapper.className = 'roughjs-container';
    wrapper.style.cssText = 'width:100%;overflow-x:auto;padding:8px 0';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    const w = 460, h = 200;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', '100%');
    svg.style.maxWidth = w + 'px';
    wrapper.appendChild(svg);
    container.appendChild(wrapper);
    const rc = rough.svg(svg);

    const matA = [[1,2,3],[4,5,6]];
    const matB = [[7,10],[8,11],[9,12]];
    const matC = [[50,68],[122,167]];
    const cs = 28, gap = 4;

    function drawMatrix(ox, oy, mat, label, highlightRow, highlightCol) {
      const rows = mat.length, cols = mat[0].length;
      for (let r = 0; r < rows; r++) {
        for (let cl = 0; cl < cols; cl++) {
          const x = ox + cl * (cs + gap), y = oy + r * (cs + gap);
          let fill = c.fill;
          if (highlightRow !== undefined && r === highlightRow) fill = c.phase1Fill;
          if (highlightCol !== undefined && cl === highlightCol) fill = c.phase1Fill;
          svg.appendChild(rc.rectangle(x, y, cs, cs, { stroke: c.stroke, fill, fillStyle: 'solid', roughness: 0.8, strokeWidth: 1 }));
          const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          txt.setAttribute('x', x + cs/2);
          txt.setAttribute('y', y + cs/2 + 4);
          txt.setAttribute('text-anchor', 'middle');
          txt.setAttribute('font-size', '11');
          txt.setAttribute('font-family', 'JetBrains Mono, monospace');
          txt.setAttribute('fill', c.text);
          txt.textContent = mat[r][cl];
          svg.appendChild(txt);
        }
      }
      const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', ox + (cols * (cs + gap) - gap) / 2);
      lbl.setAttribute('y', oy - 10);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('font-size', '13');
      lbl.setAttribute('font-family', 'Outfit, sans-serif');
      lbl.setAttribute('font-weight', '600');
      lbl.setAttribute('fill', c.text2);
      lbl.textContent = label;
      svg.appendChild(lbl);
    }

    drawMatrix(20, 50, matA, 'A (2×3)', 0, undefined);
    // multiply sign
    const times = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    times.setAttribute('x', 130); times.setAttribute('y', 100);
    times.setAttribute('text-anchor', 'middle');
    times.setAttribute('font-size', '20'); times.setAttribute('fill', c.text2);
    times.textContent = '×';
    svg.appendChild(times);

    drawMatrix(155, 30, matB, 'B (3×2)', undefined, 0);

    // equals sign
    const eq = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    eq.setAttribute('x', 275); eq.setAttribute('y', 100);
    eq.setAttribute('text-anchor', 'middle');
    eq.setAttribute('font-size', '20'); eq.setAttribute('fill', c.text2);
    eq.textContent = '=';
    svg.appendChild(eq);

    drawMatrix(300, 50, matC, 'C (2×2)');

    // arrow from A row 0 to C[0][0]
    svg.appendChild(rc.line(116, 68, 298, 68, { stroke: c.phase1, strokeWidth: 1.5, roughness: 0.5 }));
    // arrow from B col 0 to C[0][0]
    svg.appendChild(rc.line(169, 120, 298, 68, { stroke: c.phase1, strokeWidth: 1.5, roughness: 0.5 }));

    // annotation
    const ann = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    ann.setAttribute('x', w/2); ann.setAttribute('y', h - 10);
    ann.setAttribute('text-anchor', 'middle');
    ann.setAttribute('font-size', '11');
    ann.setAttribute('font-family', 'Outfit, sans-serif');
    ann.setAttribute('fill', c.text2);
    ann.textContent = 'Row × Column → Output cell: (1×7)+(2×8)+(3×9) = 50';
    svg.appendChild(ann);
    break;
  }

  case 'Vectors & Norms': {
    const wrapper = document.createElement('div');
    wrapper.className = 'chartjs-container';
    const canvas = document.createElement('canvas');
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
    // Draw L1 and L2 unit circles
    const l1Points = [], l2Points = [];
    for (let i = 0; i <= 200; i++) {
      const t = (i / 200) * 2 * Math.PI;
      l2Points.push({ x: Math.cos(t), y: Math.sin(t) });
      // L1 unit circle: |x|+|y|=1 parametrically
      const ct = Math.cos(t), st = Math.sin(t);
      const scale = 1 / (Math.abs(ct) + Math.abs(st));
      l1Points.push({ x: ct * scale, y: st * scale });
    }
    new Chart(canvas, {
      type: 'scatter',
      data: {
        datasets: [
          { label: 'L2 norm (circle)', data: l2Points, borderColor: c.blue, backgroundColor: 'transparent', showLine: true, pointRadius: 0, borderWidth: 2 },
          { label: 'L1 norm (diamond)', data: l1Points, borderColor: c.accent, backgroundColor: 'transparent', showLine: true, pointRadius: 0, borderWidth: 2, borderDash: [6,3] }
        ]
      },
      options: {
        ...chartDefaults(),
        aspectRatio: 1,
        plugins: {
          legend: { labels: { color: c.text2, font: { family: 'Outfit', size: 12 } } },
          title: { display: true, text: 'Unit Circles: L1 vs L2 Norm', color: c.text2, font: { family: 'Outfit', size: 14, weight: '600' } }
        },
        scales: {
          x: { min: -1.3, max: 1.3, ticks: { color: c.text2, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: c.gridLine }, title: { display: false } },
          y: { min: -1.3, max: 1.3, ticks: { color: c.text2, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: c.gridLine }, title: { display: false } }
        }
      }
    });
    break;
  }

  case 'Dot Product & Cosine Similarity': {
    const wrapper = document.createElement('div');
    wrapper.className = 'roughjs-container';
    wrapper.style.cssText = 'width:100%;overflow-x:auto;padding:8px 0';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    const w = 360, h = 240;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', '100%');
    svg.style.maxWidth = w + 'px';
    wrapper.appendChild(svg);
    container.appendChild(wrapper);
    const rc = rough.svg(svg);
    const ox = 80, oy = 180;

    // axes
    svg.appendChild(rc.line(30, oy, w - 20, oy, { stroke: c.stroke, strokeWidth: 1, roughness: 0.3 }));
    svg.appendChild(rc.line(ox, h - 10, ox, 20, { stroke: c.stroke, strokeWidth: 1, roughness: 0.3 }));

    // vector A: (3, 1) scaled
    const scale = 30;
    const ax = 3 * scale, ay = 1 * scale;
    const bx = 1 * scale, by = 3 * scale;
    svg.appendChild(rc.line(ox, oy, ox + ax, oy - ay, { stroke: c.blue, strokeWidth: 2.5, roughness: 0.5 }));
    svg.appendChild(rc.line(ox, oy, ox + bx, oy - by, { stroke: c.accent, strokeWidth: 2.5, roughness: 0.5 }));

    // arrowheads (simple triangles)
    function addLabel(x, y, text, color, size) {
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', x); t.setAttribute('y', y);
      t.setAttribute('font-size', size || '12');
      t.setAttribute('font-family', 'Outfit, sans-serif');
      t.setAttribute('fill', color || c.text);
      t.textContent = text;
      svg.appendChild(t);
    }
    addLabel(ox + ax + 5, oy - ay - 2, 'a = (3, 1)', c.blue, '11');
    addLabel(ox + bx + 5, oy - by - 2, 'b = (1, 3)', c.accent, '11');

    // angle arc
    const arcR = 35;
    const angA = Math.atan2(ay, ax), angB = Math.atan2(by, bx);
    svg.appendChild(rc.arc(ox, oy, arcR * 2, arcR * 2, -angB, -angA, false, { stroke: c.green, strokeWidth: 1.5, roughness: 0.3, fill: 'none' }));
    addLabel(ox + 38, oy - 22, 'θ', c.green, '13');

    // cosine similarity annotation
    addLabel(w/2 - 80, h - 2, 'cos(θ) = 0.6  →  moderate similarity', c.text2, '11');
    break;
  }

  case 'Chain Rule': {
    const wrapper = document.createElement('div');
    wrapper.className = 'mermaid-container';
    const mermaidId = 'mermaid-chain-rule-' + Date.now();
    wrapper.innerHTML = `<div class="mermaid" id="${mermaidId}">
graph LR
  x["x (input)"] -->|"forward"| L1["Linear: z = Wx+b"]
  L1 -->|"forward"| R["ReLU: a = max(0,z)"]
  R -->|"forward"| Loss["Loss: L"]
  Loss -.->|"∂L/∂a"| R

    for (let i = 0; i < 30; i++) {
      sgd.push({ x: sgdX, y: sgdY });
      adam.push({ x: adamX, y: adamY });
      // SGD oscillates (high curvature in y, low in x)
      const gx = 0.2 * sgdX, gy = 2 * sgdY;
      sgdX -= 0.3 * gx;
      sgdY -= 0.3 * gy;
      // Adam with momentum
      const agx = 0.2 * adamX, agy = 2 * adamY;
      mX = 0.9 * mX + 0.1 * agx; mY = 0.9 * mY + 0.1 * agy;
      vX = 0.999 * vX + 0.001 * agx * agx; vY = 0.999 * vY + 0.001 * agy * agy;
      adamX -= 0.5 * mX / (Math.sqrt(vX) + 1e-8);
      adamY -= 0.5 * mY / (Math.sqrt(vY) + 1e-8);
    }
    new Chart(canvas, {

    const kRow = 1, kCol = 1; // kernel position
    const ox = 20, oy = 40;
    for (let r = 0; r < 5; r++) {
      for (let cl = 0; cl < 5; cl++) {
        const x = ox + cl * (cs + gap), y = oy + r * (cs + gap);
        const isKernel = r >= kRow && r < kRow + 3 && cl >= kCol && cl < kCol + 3;

        txt.setAttribute('text-anchor', 'middle');

    const outVals = [['','',''],['',dotProd,''],['','','']];
    for (let r = 0; r < 3; r++) {
      for (let cl = 0; cl < 3; cl++) {

/* ═══════════════════════════════════════════════════
   BUILD GUIDE — RENDER & INTERACTION
   ═══════════════════════════════════════════════════ */
function getMilestoneState(slug) {
  if (!state.milestones) state.milestones = {};
  if (!state.milestones[slug]) state.milestones[slug] = [];
  return state.milestones[slug];
}

function toggleBuildMilestone(slug, idx) {
  const ms = getMilestoneState(slug);
  ms[idx] = !ms[idx];
  saveState();
  /* re-render the project page in-place */
  const guide = BUILD_GUIDES[slug];
  if (!guide) return;
  const el = document.getElementById('build-guide-section-' + slug);
  if (el) el.outerHTML = renderBuildGuideSection(slug, guide, null);
  /* re-attach hint toggle listeners (they're onclick so nothing extra needed) */
}

function toggleBuildHints(milestoneId) {
  const body = document.getElementById('bg-hints-body-' + milestoneId);
  const btn  = document.getElementById('bg-hints-btn-' + milestoneId);
  if (!body || !btn) return;
  const open = body.classList.contains('open');
  if (open) {
    body.classList.remove('open');
    btn.classList.remove('open');
  } else {
    body.classList.add('open');
    btn.classList.add('open');
  }
}

function scrollToConceptByName(name) {
  /* find the concept card in the DOM and scroll to it */
  const cards = document.querySelectorAll('.concept-card');
  for (const card of cards) {
    const nameEl = card.querySelector('.concept-card-name');
    if (nameEl && nameEl.textContent.trim() === name) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.outline = '2px solid var(--accent)';
      setTimeout(() => { card.style.outline = ''; }, 1400);
      return;
    }
  }
}

function renderBuildGuideSection(slug, guide, phaseColor) {
  const milestoneState = getMilestoneState(slug);
  /* find phase color from PHASES data */
  let pColor = phaseColor;
  let pColorFaint = '';
  if (!pColor) {
    PHASES.forEach(ph => {
      ph.projects.forEach(proj => {
        if (proj.slug === slug) { pColor = ph.color; pColorFaint = ph.bg; }
      });
    });
  }
  const cssColor = pColor || 'var(--accent)';
  const cssFaint = pColorFaint || 'var(--accent-light)';

  /* find first incomplete milestone index */
  let currentIdx = -1;
  for (let i = 0; i < guide.milestones.length; i++) {
    if (!milestoneState[i]) { currentIdx = i; break; }
  }

  let html = `<div id="build-guide-section-${escapeHtml(slug)}">`;
  html += `<div class="section-heading">${ICONS.tools} Build Guide</div>`;
  html += `<p class="build-guide-subtitle">Follow these milestones to build the project step by step</p>`;
  html += `<div class="build-guide-timeline">`;

  guide.milestones.forEach((m, i) => {
    const done = !!milestoneState[i];
    const isCurrent = i === currentIdx;
    const isLast = i === guide.milestones.length - 1;
    const milestoneId = escapeHtml(slug) + '-' + i;

    let rowCls = 'bg-milestone';
    if (done) rowCls += ' completed';
    else if (isCurrent) rowCls += ' current';

    html += `<div class="${rowCls}" style="--phase-color:${cssColor};--phase-color-faint:${cssFaint}">`;

    /* Left timeline column */
    html += `<div class="bg-timeline-col">
      <div class="bg-number-badge">${done ? ICONS.check : (i + 1)}</div>
      ${!isLast ? '<div class="bg-timeline-line"></div>' : ''}
    </div>`;

    /* Card */
    html += `<div class="bg-card" style="--phase-color:${cssColor};--phase-color-faint:${cssFaint}">`;
    html += `<div class="bg-card-top">`;

    /* Header row */
    html += `<div class="bg-card-header">
      <div class="bg-card-title-row">
        <div class="bg-card-title">${escapeHtml(m.title)}</div>
        ${done ? `<span class="bg-completed-badge">${ICONS.check} Done</span>` : ''}
      </div>
      <div class="bg-checkbox-wrap">
        <input
          type="checkbox"
          class="bg-checkbox"
          id="bg-cb-${milestoneId}"
          ${done ? 'checked' : ''}
          onchange="toggleBuildMilestone('${escapeHtml(slug)}', ${i})"
          title="Mark as complete"
        >
        <label class="bg-checkbox-label" for="bg-cb-${milestoneId}">Done</label>
      </div>
    </div>`;

    /* Description */
    html += `<p class="bg-desc">${escapeHtml(m.description)}</p>`;

    /* Concepts used pills */
    if (m.concepts_used && m.concepts_used.length > 0) {
      html += `<div class="bg-concepts-row">`;
      m.concepts_used.forEach(c => {
        html += `<button class="bg-concept-pill" onclick="scrollToConceptByName('${escapeHtml(c)}')" title="Scroll to concept">${escapeHtml(c)}</button>`;
      });
      html += `</div>`;
    }

    /* Acceptance criteria */
    if (m.acceptance && m.acceptance.length > 0) {
      html += `<div class="bg-acceptance">
        <div class="bg-acceptance-label">Acceptance criteria</div>
        <ul>`;
      m.acceptance.forEach(a => {
        html += `<li>${escapeHtml(a)}</li>`;
      });
      html += `</ul></div>`;
    }

    /* Show me how button */
    if (m.hints && m.hints.length > 0) {
      html += `<button class="bg-hints-toggle" id="bg-hints-btn-${milestoneId}" onclick="toggleBuildHints('${milestoneId}')">
        <span class="bg-hints-toggle-arrow">${ICONS.arrow}</span>
        Show me how
      </button>`;
      html += `</div>`; /* close bg-card-top */

      /* Hints expandable */
      html += `<div class="bg-hints-body" id="bg-hints-body-${milestoneId}">
        <div class="bg-hints-inner">
          <div class="bg-hints-inner-title">Step-by-step hints</div>`;
      m.hints.forEach((hint, hi) => {
        html += `<div class="bg-hint-step">
          <div class="bg-hint-num">${hi + 1}</div>
          <div class="bg-hint-body">
            <div class="bg-hint-title">${escapeHtml(hint.step)}</div>
            <div class="bg-hint-detail">${escapeHtml(hint.detail)}</div>`;
        if (hint.code) {
          html += `<div class="bg-code-block">${escapeHtml(hint.code)}</div>`;
        }
        if (hint.pitfall) {
          html += `<div class="bg-pitfall">
            <span class="bg-pitfall-icon">⚠</span>
            <span class="bg-pitfall-text"><strong>Pitfall:</strong> ${escapeHtml(hint.pitfall)}</span>
          </div>`;
        }
        html += `</div></div>`;
      });
      html += `</div></div>`;
    } else {
      html += `</div>`; /* close bg-card-top */
    }

    html += `</div>`; /* close bg-card */
    html += `</div>`; /* close bg-milestone */
  });

  html += `</div>`; /* close build-guide-timeline */
  html += `</div>`; /* close build-guide-section */
  return html;
}

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
renderDashboard();
</script>
