<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI: Sand to Agents — Indrashis's Learning Journey</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =======================================================
   RESET & VARIABLES
   ======================================================= */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e7e0d8;
  --border-subtle: #f2ede8;
  --text: #1a1615;
  --text-2: #78716c;
  --text-3: #a8a29e;
  --accent: #f97316;
  --accent-light: rgba(249,115,22,.1);
  --accent-hover: #ea680c;
  --phase1: #059669;
  --phase2: #7c3aed;
  --phase3: #2563eb;
  --phase4: #d97706;
  --phase5: #dc2626;
  --phase6: #0891b2;
  --phase1-bg: rgba(5,150,105,.08);
  --phase2-bg: rgba(124,58,237,.08);
  --phase3-bg: rgba(37,99,235,.08);
  --phase4-bg: rgba(217,119,6,.08);
  --phase5-bg: rgba(220,38,38,.08);
  --phase6-bg: rgba(8,145,178,.08);
  --radius: 16px;
  --radius-inner: 12px;
  --shadow: 0 1px 3px rgba(120,100,80,.06), 0 1px 2px rgba(120,100,80,.04);
  --shadow-md: 0 4px 12px rgba(120,100,80,.08), 0 2px 4px rgba(120,100,80,.04);
  --shadow-lg: 0 8px 24px rgba(120,100,80,.1), 0 4px 8px rgba(120,100,80,.06);
  --transition: 200ms ease;
  --transition-slow: 300ms cubic-bezier(.32,.72,0,1);
}

@media(prefers-color-scheme: dark) {
  :root {
    --bg: #1c1917;
    --surface: #231f1d;
    --border: #3d3530;
    --border-subtle: #2c2622;
    --text: #f5f0eb;
    --text-2: #a8a29e;
    --text-3: #6b6560;
    --accent-light: rgba(249,115,22,.15);
    --phase1-bg: rgba(5,150,105,.12);
    --phase2-bg: rgba(124,58,237,.12);
    --phase3-bg: rgba(37,99,235,.12);
    --phase4-bg: rgba(217,119,6,.12);
    --phase5-bg: rgba(220,38,38,.12);
    --phase6-bg: rgba(8,145,178,.12);
    --shadow: 0 1px 3px rgba(0,0,0,.2);
    --shadow-md: 0 4px 12px rgba(0,0,0,.25);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.3);
  }
}

html { scroll-behavior: smooth }

body {
  font-family: 'Work Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.6;
}

h1,h2,h3,h4,h5 { font-family: 'Outfit', sans-serif; line-height: 1.2 }
code { font-family: 'JetBrains Mono', monospace; font-size: .82em; background: var(--border-subtle); padding: .15em .4em; border-radius: 6px }
pre { font-family: 'JetBrains Mono', monospace; font-size: .82em; background: #292524; color: #e7e5e4; padding: 16px; border-radius: var(--radius-inner); overflow-x: auto; line-height: 1.5; margin: 12px 0; white-space: pre-wrap; word-break: break-word }
@media(prefers-color-scheme: dark) {
  pre { background: #1a1614 }
}

::-webkit-scrollbar { width: 6px; height: 6px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px }

button { font-family: inherit; cursor: pointer; border: none; background: none }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px }
a { color: var(--accent); text-decoration: none }
a:hover { text-decoration: underline }

@media(prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
}

/* =======================================================
   LAYOUT
   ======================================================= */
.app { max-width: 1200px; margin: 0 auto; padding: 0 24px }

/* =======================================================
   HEADER
   ======================================================= */
.header {
  padding: 40px 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-left h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -.03em;
}
.header-left p {
  color: var(--text-2);
  font-size: .88rem;
  font-weight: 300;
  margin-top: 2px;
}
.header-nav {
  display: flex;
  gap: 4px;
  background: var(--border-subtle);
  padding: 4px;
  border-radius: 12px;
}
.header-nav button {
  font-family: 'Outfit', sans-serif;
  font-size: .82rem;
  font-weight: 500;
  padding: 8px 16px;
  border-radius: 8px;
  color: var(--text-3);
  transition: all var(--transition);
}
.header-nav button:hover { color: var(--text) }
.header-nav button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
}

/* =======================================================
   VIEWS
   ======================================================= */
.view { display: none }
.view.active { display: block }

/* =======================================================
   DASHBOARD — BENTO GRID
   ======================================================= */
.bento {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto auto;
  gap: 16px;
  padding-bottom: 60px;
}
.bento-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: box-shadow var(--transition);
}
.bento-card:hover { box-shadow: var(--shadow-md) }

.bento-progress { grid-column: 1 }
.bento-current { grid-column: 2 }
.bento-recent { grid-column: 1; grid-row: 2 }
.bento-stats-row { grid-column: 2; grid-row: 2 }
.bento-journey { grid-column: 1 / -1; grid-row: 3 }

.bento-card-label {
  font-family: 'Outfit', sans-serif;
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-3);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bento-card-label svg { opacity: .5 }

/* Progress Card */
.progress-big-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 3.5rem;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 12px;
}
.progress-bar-wrap {
  height: 8px;
  background: var(--border-subtle);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 16px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #fb923c);
  border-radius: 4px;
  transition: width 500ms ease;
}
.progress-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.progress-stat {
  font-size: .82rem;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress-stat strong {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: var(--text);
}

/* Current Project Card */
.current-phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .72rem;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 100px;
  margin-bottom: 12px;
}
.current-proj-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.current-proj-desc {
  font-size: .82rem;
  color: var(--text-2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.current-concept-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.current-concept-track {
  flex: 1;
  height: 6px;
  background: var(--border-subtle);
  border-radius: 3px;
  overflow: hidden;
}
.current-concept-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 400ms ease;
}
.current-concept-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem;
  color: var(--text-2);
  white-space: nowrap;
}
.current-btn {
  font-family: 'Outfit', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: var(--radius-inner);
  background: var(--accent);
  color: #fff;
  transition: all var(--transition);
  width: 100%;
}
.current-btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md) }
.current-empty {
  color: var(--text-3);
  font-size: .85rem;
  text-align: center;
  padding: 30px 0;
}

/* Recently Learned */
.recent-list { display: flex; flex-direction: column; gap: 8px }
.recent-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--border-subtle);
  border-radius: var(--radius-inner);
  font-size: .82rem;
}
.recent-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.recent-check svg { color: var(--accent) }
.recent-name { flex: 1; font-weight: 400 }
.recent-time { font-family: 'JetBrains Mono', monospace; font-size: .68rem; color: var(--text-3) }
.recent-empty { color: var(--text-3); font-size: .82rem; text-align: center; padding: 20px 0 }

/* Quick Stats Row */
.quick-stats { display: flex; flex-direction: column; gap: 12px }
.quick-stat-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--border-subtle);
  border-radius: var(--radius-inner);
}
.quick-stat-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.quick-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 500;
}
.quick-stat-label {
  font-size: .72rem;
  color: var(--text-3);
}

/* Journey Path */
.journey-scroll {
  overflow-x: auto;
  scroll-snap-type: x proximity;
  padding: 8px 0 16px;
  -webkit-overflow-scrolling: touch;
}
.journey-track {
  display: flex;
  align-items: center;
  min-width: max-content;
  gap: 0;
  position: relative;
  padding: 20px 0;
}
.journey-phase {
  display: flex;
  align-items: center;
  gap: 0;
  scroll-snap-align: start;
}
.journey-node {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 0 8px;
  transition: transform var(--transition);
}
.journey-node:hover { transform: translateY(-2px) }
.journey-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  position: relative;
  z-index: 2;
}
.journey-node.done .journey-dot {
  border-color: currentColor;
  background: currentColor;
}
.journey-node.active .journey-dot {
  width: 36px;
  height: 36px;
  border-color: currentColor;
  box-shadow: 0 0 0 4px var(--accent-light);
}
.journey-node.future .journey-dot {
  border-color: var(--border);
  opacity: .5;
}
.journey-node-label {
  font-size: .65rem;
  color: var(--text-3);
  margin-top: 8px;
  max-width: 80px;
  text-align: center;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.journey-node.active .journey-node-label { color: var(--text); font-weight: 500 }
.journey-line {
  width: 32px;
  height: 2.5px;
  background: var(--border);
  flex-shrink: 0;
  z-index: 1;
}
.journey-line.done { background: var(--text-3) }
.journey-phase-sep {
  width: 48px;
  height: 2.5px;
  background: var(--border-subtle);
  flex-shrink: 0;
  position: relative;
}
.journey-check { color: #fff; width: 14px; height: 14px }
.journey-num { font-family: 'Outfit', sans-serif; font-size: .65rem; font-weight: 700 }

/* =======================================================
   PROJECT VIEW
   ======================================================= */
.project-view { max-width: 900px; margin: 0 auto; padding-bottom: 60px }
.project-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .82rem;
  color: var(--text-2);
  padding: 8px 0;
  margin-bottom: 16px;
  transition: color var(--transition);
}
.project-back:hover { color: var(--text) }

/* Hero Card */
.project-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
}
.project-hero-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.project-phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .72rem;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 100px;
}
.project-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  color: var(--text-3);
}
.project-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -.02em;
  margin-bottom: 8px;
}
.project-elevator {
  font-size: .92rem;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 12px;
}
.project-why {
  font-size: .88rem;
  font-style: italic;
  color: var(--text-3);
  margin-bottom: 16px;
}

/* Status Stepper */
.status-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  margin-top: 20px;
}
.status-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: var(--radius-inner);
  transition: background var(--transition);
  position: relative;
  z-index: 2;
}
.status-step:hover { background: var(--border-subtle) }
.status-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.status-step.active .status-dot {
  border-color: var(--accent);
  background: var(--accent);
}
.status-step.done .status-dot {
  border-color: var(--accent);
  background: var(--accent);
}
.status-step-label {
  font-family: 'Outfit', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  color: var(--text-3);
}
.status-step.active .status-step-label,
.status-step.done .status-step-label { color: var(--text) }
.status-connector {
  flex: 1;
  height: 2.5px;
  background: var(--border);
  min-width: 40px;
  z-index: 1;
}
.status-connector.filled { background: var(--accent) }

/* Progress Row */
.progress-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.progress-ring-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.progress-ring-wrap { position: relative; flex-shrink: 0 }
.progress-ring-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 500;
}
.progress-ring-stats { display: flex; flex-direction: column; gap: 4px }
.progress-ring-stat {
  font-size: .85rem;
  color: var(--text-2);
}
.progress-ring-stat strong {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: var(--text);
}

/* Resume / Start Learning Card */
.rec-next-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
}
/* Accent stripe on the left edge */
.rec-next-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--resume-accent, var(--accent));
  border-radius: var(--radius) 0 0 var(--radius);
}
.rec-next-label {
  font-family: 'Outfit', sans-serif;
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-3);
  margin-bottom: 10px;
}
.rec-next-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.rec-next-progress-bar-wrap {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
}
.rec-next-progress-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width .4s ease;
}
.rec-next-progress-text {
  font-size: .75rem;
  color: var(--text-3);
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}
.rec-next-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .68rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
  margin-bottom: 8px;
}
.rec-next-concept-preview {
  margin-bottom: 16px;
}
.rec-next-name {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 5px;
}
.rec-next-preview {
  font-size: .82rem;
  color: var(--text-2);
  line-height: 1.5;
}
.rec-next-btn {
  font-family: 'Outfit', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  padding: 13px 24px;
  border-radius: var(--radius-inner);
  background: var(--resume-accent, var(--accent));
  color: #fff;
  transition: all var(--transition);
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  letter-spacing: .01em;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--resume-accent, var(--accent)) 35%, transparent);
}
.rec-next-btn:hover {
  filter: brightness(1.1);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px color-mix(in srgb, var(--resume-accent, var(--accent)) 45%, transparent);
}
.rec-next-btn-sub {
  font-size: .72rem;
  font-weight: 400;
  opacity: .85;
  margin-top: 2px;
}
.rec-next-btn-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.rec-next-complete {
  text-align: center;
  padding: 16px 0;
  color: var(--text-2);
  font-size: .95rem;
}
.rec-next-complete-icon {
  font-size: 1.8rem;
  margin-bottom: 6px;
}

/* Dashboard resume button enhancement */
.current-resume-sub {
  font-size: .72rem;
  font-weight: 400;
  opacity: .85;
  margin-top: 2px;
}
.current-btn-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Section headings */
.section-heading {
  font-family: 'Outfit', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  margin: 32px 0 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-heading svg { opacity: .5 }

/* Deliverables */
.deliverables-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}
.deliverables-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: var(--border-subtle);
  border-radius: var(--radius-inner);
  font-size: .85rem;
  line-height: 1.5;
}
.deliverables-list li::before {
  content: '\2192';
  color: var(--accent);
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
}

/* Prerequisites */
.prereq-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.prereq-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-inner);
  padding: 16px;
}
.prereq-card-label {
  font-family: 'Outfit', sans-serif;
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 8px;
}
.prereq-card ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.prereq-card li {
  font-size: .82rem;
  color: var(--text-2);
  padding-left: 12px;
  position: relative;
}
.prereq-card li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--text-3);
}
.prereq-project-link {
  cursor: pointer;
  color: var(--accent);
  font-weight: 500;
}
.prereq-project-link:hover { text-decoration: underline }

/* Setup Guide */
.setup-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 24px;
  overflow: hidden;
}
.setup-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  color: var(--text);
  transition: background var(--transition);
}
.setup-toggle:hover { background: var(--border-subtle) }
.setup-toggle-icon { transition: transform var(--transition); color: var(--text-3) }
.setup-toggle-icon.open { transform: rotate(180deg) }
.setup-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height var(--transition-slow);
}
.setup-content.open { max-height: 2000px }
.setup-inner { padding: 0 20px 20px }
.setup-steps {
  list-style: none;
  counter-reset: step;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.setup-steps li {
  counter-increment: step;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: .85rem;
  color: var(--text-2);
  line-height: 1.5;
}
.setup-steps li::before {
  content: counter(step);
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  font-weight: 500;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--border-subtle);
  color: var(--text-3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Milestones */
.milestones-track {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 24px;
  position: relative;
}
.milestone-item {
  display: flex;
  gap: 16px;
  position: relative;
}
.milestone-line {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 24px;
  flex-shrink: 0;
}
.milestone-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  z-index: 2;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  font-weight: 500;
  color: var(--text-3);
}
.milestone-connector {
  width: 2.5px;
  flex: 1;
  background: var(--border);
  min-height: 12px;
}
.milestone-content {
  padding-bottom: 20px;
  flex: 1;
}
.milestone-name {
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.milestone-desc {
  font-size: .82rem;
  color: var(--text-2);
  line-height: 1.5;
  margin-bottom: 6px;
}
.milestone-criteria {
  font-size: .78rem;
  color: var(--text-3);
  font-style: italic;
  line-height: 1.5;
  margin-bottom: 4px;
}
.milestone-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  color: var(--text-3);
}

/* Concept Categories */
.concept-category {
  margin-bottom: 28px;
}
.concept-cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.concept-cat-label {
  font-family: 'Outfit', sans-serif;
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-2);
}
.concept-cat-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: .72rem;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.concept-cat-desc {
  font-size: .78rem;
  font-style: italic;
  color: var(--text-3);
  margin-bottom: 12px;
  line-height: 1.4;
}
.concept-cat-cards {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Concept Accordion Card */
.concept-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  border-radius: var(--radius-inner);
  overflow: hidden;
  transition: all var(--transition);
}
.concept-card.key-concept {
  border-left-width: 3px;
}
.concept-card.learned {
  background: var(--border-subtle);
  border-color: var(--border-subtle);
}
.concept-card-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background var(--transition);
  width: 100%;
  text-align: left;
}
.concept-card-header:hover { background: var(--border-subtle) }
.concept-seq {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: .68rem;
  font-weight: 500;
  background: var(--border-subtle);
  color: var(--text-3);
  margin-top: 1px;
}
.concept-card.learned .concept-seq {
  background: var(--accent-light);
  color: var(--accent);
}
.concept-card-info { flex: 1; min-width: 0 }
.concept-card-name-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.concept-card-name {
  font-family: 'Work Sans', sans-serif;
  font-size: .88rem;
  font-weight: 500;
  color: var(--text);
}
.concept-card.learned .concept-card-name { color: var(--text-2); font-weight: 400 }
.concept-key-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: .62rem;
  font-weight: 500;
  padding: 1px 6px;
  border-radius: 100px;
}
.concept-card-summary {
  font-size: .78rem;
  color: var(--text-3);
  font-style: italic;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.concept-card-expand {
  flex-shrink: 0;
  color: var(--text-3);
  transition: transform var(--transition);
  margin-top: 4px;
}
.concept-card-expand.open { transform: rotate(180deg) }
.concept-card-learned-badge {
  flex-shrink: 0;
  font-size: .68rem;
  font-weight: 500;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 3px;
  margin-top: 4px;
}

/* Concept expanded content */
.concept-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height var(--transition-slow);
}
.concept-card-body.open { max-height: 5000px }
.concept-card-body-inner {
  padding: 0 14px 14px 48px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.concept-diagram {
  padding-top: 14px;
  display: flex;
  justify-content: center;
}
.concept-diagram canvas,
.concept-diagram svg,
.concept-diagram .mermaid-container,
.concept-diagram .chartjs-container,
.concept-diagram .katex-container {
  max-width: 100%;
  border-radius: var(--radius-inner);
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  padding: 16px;
}
.concept-diagram .diagram-loading {
  font-size: .82rem;
  color: var(--text-3);
  padding: 24px;
  text-align: center;
}
.concept-diagram canvas { background: transparent; border: none; padding: 0 }
.concept-diagram .mermaid-container { background: transparent; border: none; padding: 8px 0; width: 100%; overflow-x: auto }
.concept-diagram .mermaid-container svg { border: none; padding: 0; background: transparent; max-width: 100% }
.concept-diagram .chartjs-container { width: 100%; max-width: 500px; padding: 12px }
.concept-diagram .roughjs-container { border: none; padding: 0; background: transparent }

.concept-content {
  font-size: .88rem;
  color: var(--text-2);
  line-height: 1.7;
  padding-top: 14px;
}
.concept-content strong { color: var(--text); font-weight: 500 }
.concept-content code { font-size: .82em }
.concept-gotit-wrap { margin-top: 14px; display: flex; justify-content: flex-end }
.concept-gotit {
  font-family: 'Outfit', sans-serif;
  font-size: .82rem;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: var(--radius-inner);
  background: var(--accent);
  color: #fff;
  transition: all var(--transition);
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.concept-gotit:hover { background: var(--accent-hover) }
.concept-gotit.is-learned {
  background: var(--border-subtle);
  color: var(--text-2);
}
.concept-gotit.is-learned:hover { background: var(--border) }

/* Resources */
.resources-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.resource-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-inner);
  padding: 14px 16px;
}
.resource-card-type {
  font-family: 'Outfit', sans-serif;
  font-size: .68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.resource-item {
  margin-bottom: 10px;
}
.resource-item:last-child { margin-bottom: 0 }
.resource-name {
  font-size: .82rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.resource-name a { color: var(--accent) }
.resource-why {
  font-size: .75rem;
  color: var(--text-3);
  line-height: 1.4;
}

/* Connects To */
.connects-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
}
.connects-text {
  font-size: .88rem;
  color: var(--text-2);
  line-height: 1.7;
}

/* Navigation Footer */
.project-nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  gap: 16px;
}
.project-nav-btn {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-inner);
  transition: all var(--transition);
  text-align: left;
  max-width: 45%;
}
.project-nav-btn:hover { box-shadow: var(--shadow-md); border-color: var(--text-3) }
.project-nav-btn.next { text-align: right; margin-left: auto }
.project-nav-dir {
  font-size: .72rem;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 4px;
}
.project-nav-btn.next .project-nav-dir { justify-content: flex-end }
.project-nav-name {
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  color: var(--text);
}
.project-nav-phase {
  font-size: .72rem;
  color: var(--text-3);
}

/* =======================================================
   BUILD GUIDE
   ======================================================= */
.build-guide-subtitle {
  font-size: .82rem;
  color: var(--text-3);
  margin-top: -10px;
  margin-bottom: 20px;
  font-style: italic;
}

/* Timeline container */
.build-guide-timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 24px;
}

/* Each milestone row */
.bg-milestone {
  display: flex;
  gap: 16px;
  position: relative;
}
.bg-milestone.completed .bg-card { opacity: .72 }
.bg-milestone.current .bg-card {
  border-color: var(--phase-color, var(--accent));
  box-shadow: 0 0 0 3px var(--phase-color-faint, var(--accent-light));
}

/* Left timeline column */
.bg-timeline-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 32px;
  flex-shrink: 0;
}
.bg-number-badge {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--phase-color, var(--accent));
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: .75rem;
  font-weight: 700;
  color: var(--phase-color, var(--accent));
  z-index: 2;
  flex-shrink: 0;
  transition: all var(--transition);
}
.bg-milestone.completed .bg-number-badge {
  background: var(--phase-color, var(--accent));
  color: #fff;
}
.bg-milestone.current .bg-number-badge {
  background: var(--phase-color, var(--accent));
  color: #fff;
  box-shadow: 0 0 0 4px var(--phase-color-faint, var(--accent-light));
}
.bg-timeline-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  min-height: 16px;
  margin-top: 2px;
  margin-bottom: 2px;
}
.bg-milestone.completed .bg-timeline-line {
  background: var(--phase-color, var(--accent));
  opacity: .35;
}

/* Milestone card */
.bg-card {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-inner);
  margin-bottom: 16px;
  overflow: hidden;
  transition: all var(--transition);
}
.bg-card-top {
  padding: 16px 18px 14px;
}
.bg-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}
.bg-card-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.bg-card-title {
  font-family: 'Outfit', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.bg-completed-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .68rem;
  font-weight: 600;
  color: #059669;
  background: rgba(5,150,105,.1);
  padding: 2px 8px;
  border-radius: 100px;
  white-space: nowrap;
}

/* Milestone checkbox */
.bg-checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.bg-checkbox {
  appearance: none;
  -webkit-appearance: none;
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  transition: all var(--transition);
  flex-shrink: 0;
  background: var(--surface);
}
.bg-checkbox:checked {
  background: #059669;
  border-color: #059669;
}
.bg-checkbox:checked::after {
  content: '';
  position: absolute;
  left: 3px;
  top: 0px;
  width: 8px;
  height: 12px;
  border: 2.5px solid #fff;
  border-top: none;
  border-left: none;
  transform: rotate(40deg);
}
.bg-checkbox:hover:not(:checked) { border-color: var(--text-3) }
.bg-checkbox-label {
  font-size: .72rem;
  color: var(--text-3);
  white-space: nowrap;
}

/* Description */
.bg-desc {
  font-size: .83rem;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 12px;
}

/* Concepts used pills */
.bg-concepts-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.bg-concept-pill {
  font-size: .68rem;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 100px;
  background: var(--border-subtle);
  color: var(--text-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
  font-family: 'Outfit', sans-serif;
  text-decoration: none;
}
.bg-concept-pill:hover {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}

/* Acceptance criteria */
.bg-acceptance {
  background: var(--border-subtle);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
}
.bg-acceptance-label {
  font-family: 'Outfit', sans-serif;
  font-size: .65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  margin-bottom: 6px;
}
.bg-acceptance ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.bg-acceptance li {
  font-size: .8rem;
  color: var(--text-2);
  padding-left: 14px;
  position: relative;
  line-height: 1.4;
}
.bg-acceptance li::before {
  content: '✓';
  position: absolute;
  left: 0;
  color: #059669;
  font-size: .7rem;
  font-weight: 700;
  top: 1px;
}

/* Show me how button */
.bg-hints-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .78rem;
  font-weight: 500;
  color: var(--text-3);
  padding: 6px 0 2px;
  transition: color var(--transition);
  font-family: 'Outfit', sans-serif;
}
.bg-hints-toggle:hover { color: var(--accent) }
.bg-hints-toggle-arrow {
  display: inline-flex;
  transition: transform var(--transition);
  color: var(--text-3);
}
.bg-hints-toggle.open .bg-hints-toggle-arrow { transform: rotate(90deg) }
.bg-hints-toggle.open { color: var(--accent) }

/* Hints expandable area */
.bg-hints-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 400ms cubic-bezier(.32,.72,0,1);
}
.bg-hints-body.open {
  max-height: 4000px;
}
.bg-hints-inner {
  padding: 0 18px 16px;
  border-top: 1px solid var(--border-subtle);
}
.bg-hints-inner-title {
  font-family: 'Outfit', sans-serif;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-3);
  padding-top: 14px;
  margin-bottom: 12px;
}

/* Individual hint step */
.bg-hint-step {
  display: flex;
  gap: 14px;
  margin-bottom: 16px;
}
.bg-hint-step:last-child { margin-bottom: 0 }
.bg-hint-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--border-subtle);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: .65rem;
  font-weight: 700;
  color: var(--text-3);
  flex-shrink: 0;
  margin-top: 1px;
}
.bg-hint-body { flex: 1; min-width: 0 }
.bg-hint-title {
  font-family: 'Outfit', sans-serif;
  font-size: .85rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.bg-hint-detail {
  font-size: .8rem;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 8px;
}

/* Hint code block */
.bg-code-block {
  background: #292524;
  color: #e7e5e4;
  font-family: 'JetBrains Mono', monospace;
  font-size: .78rem;
  line-height: 1.6;
  padding: 12px 14px;
  border-radius: 8px;
  overflow-x: auto;
  margin-bottom: 8px;
  white-space: pre;
}
@media(prefers-color-scheme: dark) {
  .bg-code-block { background: #1e1e1e }
}

/* Pitfall callout */
.bg-pitfall {
  display: flex;
  gap: 8px;
  background: rgba(217,119,6,.08);
  border-left: 3px solid #d97706;
  border-radius: 0 8px 8px 0;
  padding: 8px 12px;
  margin-top: 6px;
}
@media(prefers-color-scheme: dark) {
  .bg-pitfall { background: rgba(217,119,6,.12) }
}
.bg-pitfall-icon {
  font-size: .85rem;
  flex-shrink: 0;
  margin-top: 1px;
}
.bg-pitfall-text {
  font-size: .78rem;
  color: #92400e;
  line-height: 1.5;
}
@media(prefers-color-scheme: dark) {
  .bg-pitfall-text { color: #fbbf24 }
}

/* =======================================================
   MOTIVATIONAL TOAST
   ======================================================= */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: var(--bg);
  font-family: 'Outfit', sans-serif;
  font-size: .88rem;
  font-weight: 500;
  padding: 12px 24px;
  border-radius: 100px;
  box-shadow: var(--shadow-lg);
  z-index: 2000;
  opacity: 0;
  transition: all var(--transition-slow);
  pointer-events: none;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* =======================================================
   RESPONSIVE
   ======================================================= */
@media(max-width: 768px) {
  .app { padding: 0 16px }
  .header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 24px 0 16px }
  .bento {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
  }
  .bento-progress { grid-column: 1 }
  .bento-current { grid-column: 1 }

<script>
/* ═══════════════════════════════════════════════════

const CONCEPTS = {
  "Matrix Multiplication": { summary: "The fundamental operation of neural networks — every layer transforms data by multiplying matrices.", content: "<strong>Matrix multiplication</strong> is the single most important mathematical operation in all of deep learning. When a neural network processes your input, every single layer is performing some variant of <code>y = Wx + b</code>, where W is a weight matrix, x is your input vector, and b is a bias. If W is a 256\u00d7784 matrix and x is a 784-dimensional vector (say, a flattened 28\u00d728 image), the result y is a 256-dimensional vector — the network has transformed your input from one representational space to another.<br><br>The mechanics are straightforward but worth internalizing: to compute one element of the output, you take the <strong>dot product</strong> of one row of W with the entire input vector x. So a 256\u00d7784 matrix times a 784\u00d71 vector means 256 separate dot products, each involving 784 multiply-and-add operations. That's roughly 200,000 floating-point operations for a single layer of a small network. Scale this to GPT-4 with billions of parameters and you begin to see why specialized hardware matters.<br><br>In practice, you rarely process one input at a time. <strong>Batching</strong> means stacking multiple inputs into a matrix X of shape (batch_size \u00d7 784), and computing <code>Y = XW^T + b</code>. This is a matrix-matrix multiplication, which is where GPUs truly shine — they can perform thousands of these multiply-add operations simultaneously. The shape rule to remember: if X is (m \u00d7 n) and W^T is (n \u00d7 k), the output Y is (m \u00d7 k). Getting shapes right is genuinely 80% of debugging neural networks.<br><br>Why does this matter for the bigger picture? Because the <strong>entire history of AI hardware</strong> — from GPUs to TPUs to custom accelerators — is fundamentally about making matrix multiplication faster. NVIDIA's Tensor Cores, Google's TPU systolic arrays, and Apple's Neural Engine are all specialized circuits for multiplying matrices. When someone says a chip does '989 TFLOPS,' they mean it can perform 989 trillion of these multiply-add operations per second. Understanding matmul is understanding the computational heartbeat of AI." },
  "Vectors & Norms": { summary: "Norms measure vector magnitude — used everywhere from regularization to gradient clipping.", content: "<strong>Vectors</strong> are the basic unit of data in neural networks. An image is a vector of pixel values. A word embedding is a vector in 768-dimensional space. A gradient is a vector pointing toward steeper loss. Understanding how to measure and compare vectors is fundamental to everything that follows.<br><br>A <strong>norm</strong> is simply a way to measure the 'size' or magnitude of a vector. The three norms you'll encounter constantly are: <strong>L1 norm</strong> (sum of absolute values: <code>||x||\u2081 = |x\u2081| + |x\u2082| + ... + |x\u2099|</code>), <strong>L2 norm</strong> (Euclidean distance: <code>||x||\u2082 = sqrt(x\u2081\u00b2 + x\u2082\u00b2 + ... + x\u2099\u00b2)</code>), and <strong>L\u221e norm</strong> (maximum absolute value: <code>||x||\u221e = max(|x\u2081|, |x\u2082|, ..., |x\u2099|)</code>). Think of L2 as the straight-line distance, L1 as the 'Manhattan distance' (walking along grid streets), and L\u221e as the single largest step you'd need to take in any direction.<br><br>These norms show up in <strong>regularization</strong>, which prevents overfitting by penalizing large weights. L2 regularization adds <code>\u03bb||w||\u2082\u00b2</code> to the loss function, which gently shrinks all weights toward zero — like adding friction to the optimization. L1 regularization adds <code>\u03bb||w||\u2081</code>, which has a remarkable property: it drives unimportant weights to <strong>exactly zero</strong>, effectively performing automatic feature selection. This is why L1 is called 'Lasso' regression — it lassos a sparse subset of features.<br><br>Norms also appear in <strong>gradient clipping</strong> (cap <code>||\u2207L||\u2082</code> to prevent exploding gradients), <strong>weight normalization</strong>, and <strong>adversarial robustness</strong> (L\u221e bounds the maximum perturbation to any single pixel). When you see a paper mention 'the L2 ball of radius \u03b5,' they mean all vectors within Euclidean distance \u03b5 of the origin. This geometric intuition — thinking of norms as defining shapes in high-dimensional space — is essential for understanding modern AI." },
  "Dot Product & Cosine Similarity": { summary: "The dot product measures vector alignment — cosine similarity is the foundation of semantic search.", content: "The <strong>dot product</strong> of two vectors is the simplest yet most powerful operation in machine learning: <code>a\u00b7b = a\u2081b\u2081 + a\u2082b\u2082 + ... + a\u2099b\u2099</code>. Geometrically, it equals <code>||a|| ||b|| cos(\u03b8)</code> where \u03b8 is the angle between the vectors. This formula reveals that the dot product captures two things simultaneously: the magnitudes of the vectors and how aligned they are. If two vectors point in the same direction (\u03b8 = 0), the dot product is maximally positive. If perpendicular (\u03b8 = 90\u00b0), it's zero. If opposite (\u03b8 = 180\u00b0), it's maximally negative.<br><br><strong>Cosine similarity</strong> strips away the magnitude and keeps only the alignment: <code>cos(\u03b8) = (a\u00b7b) / (||a|| ||b||)</code>. It ranges from -1 (opposite) to +1 (identical direction). This is <strong>THE metric</strong> for semantic search and embedding comparisons. When you ask 'find documents similar to this query,' you're computing cosine similarity between the query embedding and every document embedding in your vector database.<br><br>Here's a concrete example that shows why this matters: the sentences 'I can't log into my account' and 'Password reset not working' share zero words in common, yet a good embedding model maps them to vectors with cosine similarity around 0.85 — because they capture the same <strong>semantic meaning</strong>. Meanwhile, 'The bank of the river' and 'I went to the bank' might have high word overlap but lower cosine similarity in a good embedding space, because the model understands 'bank' means different things.<br><br>The dot product is also the core of <strong>attention</strong> in Transformers. When computing <code>QK^T</code>, each element is a dot product between a query vector and a key vector — measuring 'how relevant is this token to that token?' The entire revolution of modern AI, from search engines to ChatGPT, rests on this simple operation of measuring how well two vectors align." },
  "Broadcasting": { summary: "NumPy's rule for operating on arrays of different shapes — eliminates slow Python loops.", content: "<strong>Broadcasting</strong> is NumPy's elegant mechanism for performing arithmetic on arrays of different shapes without explicit copying or looping. The classic example: you have a batch of data <code>Y</code> with shape (32, 128) — 32 samples, each with 128 features — and a bias vector <code>b</code> with shape (1, 128) or just (128,). When you write <code>Y + b</code>, NumPy automatically 'broadcasts' b across all 32 rows, adding the same bias to every sample. No loop needed, no manual replication of b into a 32\u00d7128 matrix.<br><br>The broadcasting rules are precise: NumPy aligns shapes from the <strong>right</strong>, and two dimensions are compatible if they are equal or one of them is 1. A dimension of size 1 is 'stretched' to match the other. For example, (32, 256, 1) and (1, 256, 128) broadcast to (32, 256, 128). If the arrays have different numbers of dimensions, the smaller one is padded with 1s on the left. So a vector of shape (128,) becomes (1, 128) when added to a (32, 128) matrix.<br><br>Why does this matter so much in practice? Because <strong>Python loops over arrays are roughly 100\u00d7 slower than vectorized NumPy operations</strong>. NumPy's C backend processes entire arrays in tight, optimized loops. When you write <code>for i in range(batch_size): Y[i] += b</code>, Python's interpreter overhead dominates. Broadcasting lets you express the same operation as <code>Y += b</code> — one line, 100\u00d7 faster. In neural network code, mastering broadcasting is the difference between training in minutes versus hours.<br><br>Broadcasting shows up everywhere in deep learning: adding biases to batched outputs, applying masks in attention (<code>scores + mask</code> where mask is broadcasted), normalizing features (<code>(X - mean) / std</code> where mean and std are computed per-feature). When you encounter a shape mismatch error in PyTorch or NumPy, the fix almost always involves understanding broadcasting rules — specifically, which dimensions should be 1 and which should match." },
  "Chain Rule": { summary: "The chain rule IS backpropagation — it's how neural networks learn by propagating gradients backward.", content: "The <strong>chain rule</strong> from calculus is not merely 'used in' backpropagation — it literally <strong>is</strong> backpropagation. If you understand the chain rule, you understand how every neural network on Earth learns. The rule says: if you have a composition of functions <code>L = f(g(h(x)))</code>, then <code>dL/dx = (dL/df) \u00b7 (df/dg) \u00b7 (dg/dh) \u00b7 (dh/dx)</code>. Each derivative in this chain is a 'local gradient' — how sensitive each function's output is to its input.<br><br>Map this directly to a neural network: each function (f, g, h) is a <strong>layer</strong>. The input x flows forward through h, then g, then f, producing loss L. Now we need to know: how should we adjust the parameters inside h to reduce L? The chain rule says: multiply the local gradients backward from the loss. Layer f computes <code>dL/df</code>. Layer g uses that to compute <code>dL/dg = (dL/df) \u00b7 (df/dg)</code>. Layer h uses that to get <code>dL/dh</code>. This backward cascade is exactly what <code>loss.backward()</code> does in PyTorch.<br><br>Here's a concrete numerical example. Suppose <code>h(x) = 2x</code>, <code>g(z) = z + 3</code>, <code>f(w) = w\u00b2</code>. If x = 1: h(1) = 2, g(2) = 5, f(5) = 25. Now backwards: <code>df/dw = 2w = 10</code>, <code>dg/dz = 1</code>, <code>dh/dx = 2</code>. So <code>dL/dx = 10 \u00b7 1 \u00b7 2 = 20</code>. You can verify: changing x from 1 to 1.001, the output changes from 25 to 25.020004 — a ratio of about 20. The chain rule gives exact gradients efficiently.<br><br>The deep insight is about <strong>computational efficiency</strong>. Without the chain rule's backward pass structure, computing the gradient with respect to N parameters would require N separate forward passes (numerical differentiation). With it, you compute <strong>all</strong> gradients in a single backward pass that costs roughly the same as one forward pass. This O(1) per-parameter gradient computation is the reason neural networks with billions of parameters are trainable at all. It's the most important algorithm in AI." },
  "Gradients": { summary: "The gradient vector points toward steepest ascent — gradient descent walks the opposite direction to minimize loss.", content: "The <strong>gradient</strong> of a function at a point is the vector of all partial derivatives: <code>\u2207L = [\u2202L/\u2202w\u2081, \u2202L/\u2202w\u2082, ..., \u2202L/\u2202w\u2099]</code>. Each component tells you how much the loss would change if you nudged that particular weight by a tiny amount. Together, the gradient vector points in the direction of <strong>steepest increase</strong> of the loss function. To minimize loss, you walk in the opposite direction: <code>w \u2190 w - \u03b7\u00b7\u2207L</code>, where \u03b7 (eta) is the learning rate.<br><br>Visualize a hilly landscape where altitude represents loss. You're standing somewhere on this terrain, blindfolded, trying to reach the lowest valley. The gradient is like feeling the slope beneath your feet — it tells you which direction is steepest uphill. You step in the opposite direction (downhill). The learning rate \u03b7 determines your step size: too large and you overshoot valleys, oscillating wildly; too small and you crawl toward the minimum over thousands of unnecessary steps.<br><br>A crucial geometric property: the gradient is always <strong>perpendicular to the contour lines</strong> (lines of equal loss). Imagine topographic map contours — the gradient always cuts straight across them, pointing uphill. This means gradient descent always takes the locally steepest path, but not necessarily the globally best path. In high-dimensional spaces (millions of weights), the loss landscape has saddle points, ridges, and flat plateaus that make optimization challenging.<br><br>In neural networks, the gradient is computed via backpropagation (the chain rule applied to the computational graph). For a model with 7 billion parameters, the gradient is a 7-billion-dimensional vector computed in one backward pass. <strong>The entire training process</strong> is just: compute predictions, measure loss, compute gradient, take a step, repeat millions of times. Every optimizer (SGD, Adam, AdaGrad) is a different strategy for how to use the gradient information to choose the step direction and size." },
  "SGD": { summary: "Stochastic Gradient Descent estimates gradients from small batches — noise helps escape bad minima.", content: "<strong>Stochastic Gradient Descent</strong> is the foundational optimization algorithm of deep learning. The update rule is simple: <code>w \u2190 w - \u03b7 \u00b7 \u2207L_batch(w)</code>. Instead of computing the gradient over the entire dataset (which could be millions of examples), you estimate it from a small random <strong>mini-batch</strong> — typically 32 to 512 examples. This estimate is noisy but unbiased: on average, it points in the same direction as the true gradient.<br><br>The 'stochastic' (random) part isn't a bug — it's a feature. The noise from small batches acts as a form of <strong>implicit regularization</strong>. It helps the optimizer escape shallow local minima and saddle points that would trap a deterministic optimizer. Think of it like shaking a ball on a bumpy surface — small vibrations help it roll past tiny dips and find deeper valleys. Research has shown that the noise in SGD biases training toward 'flat' minima (regions where the loss doesn't change much if weights shift slightly), which tend to generalize better to new data.<br><br>The two most important hyperparameters are <strong>learning rate \u03b7</strong> and <strong>batch size</strong>. Learning rate is universally considered the single most important hyperparameter in all of deep learning. Too high: the loss diverges to infinity. Too low: training takes forever and may get stuck. Common practice: start with \u03b7=0.01 or 0.001, use a <strong>learning rate schedule</strong> that decays \u03b7 over training (cosine annealing, step decay, or warmup-then-decay). Batch size affects the noise level and GPU utilization — larger batches give smoother gradients but less regularization.<br><br>Pure SGD has a limitation: it treats all directions equally. If the loss landscape is elongated (like a narrow valley), SGD oscillates across the short axis while making slow progress along the long axis. This motivates <strong>momentum</strong> — keeping a running average of past gradients to smooth out oscillations — and eventually leads to adaptive optimizers like Adam. But understanding vanilla SGD is essential because it's the conceptual foundation: every optimizer is a modification of 'compute gradient, take a step.'" },
  "Adam Optimizer": { summary: "Adam combines momentum with adaptive learning rates — the default optimizer for most deep learning.", content: "<strong>Adam</strong> (Adaptive Moment Estimation) is the most widely used optimizer in deep learning, and for good reason: it works well out of the box for almost any architecture. It combines two ideas: <strong>momentum</strong> (remembering past gradient directions) and <strong>RMSProp</strong> (adapting the step size per parameter based on gradient magnitude). The update equations are:<br><code>m = \u03b2\u2081\u00b7m + (1-\u03b2\u2081)\u00b7\u2207L</code> — exponential moving average of gradients (first moment, captures direction)<br><code>v = \u03b2\u2082\u00b7v + (1-\u03b2\u2082)\u00b7(\u2207L)\u00b2</code> — exponential moving average of squared gradients (second moment, captures scale)<br><code>w \u2190 w - \u03b7\u00b7m\u0302/(\u221av\u0302 + \u03b5)</code> — the actual update, with bias correction applied to both m and v.<br><br>What makes Adam special is the <strong>per-parameter adaptive learning rate</strong>. Dividing by <code>\u221av\u0302</code> means that parameters with consistently large gradients get smaller effective learning rates, and parameters with small gradients get larger effective rates. This automatically handles the elongated valley problem that plagues SGD. Imagine some weights need tiny, precise adjustments while others need big moves — Adam handles both simultaneously without manual tuning.<br><br>The default hyperparameters are nearly universal: <code>\u03b2\u2081 = 0.9</code> (gradient momentum — average over ~10 steps), <code>\u03b2\u2082 = 0.999</code> (squared gradient average — over ~1000 steps), <code>\u03b7 = 1e-3</code> (base learning rate), and <code>\u03b5 = 1e-8</code> (numerical stability). The bias correction terms (<code>m\u0302 = m/(1-\u03b2\u2081\u1d57)</code> and <code>v\u0302 = v/(1-\u03b2\u2082\u1d57)</code>) fix the initial bias toward zero when m and v are initialized to zero vectors. Without this correction, the first few updates would be inappropriately small.<br><br>Adam isn't perfect. For some tasks (especially vision with ResNets), well-tuned SGD with momentum still achieves better final accuracy. AdamW fixes a subtle bug in Adam's weight decay implementation, and is the standard for training Transformers and LLMs. But Adam's greatest strength is <strong>robustness</strong>: it rarely diverges, converges fast in early training, and requires minimal hyperparameter tuning. When starting any new project, Adam with the defaults is almost always your first choice." },
  "Perceptron → Deep Net": { summary: "From single neuron to deep network — depth enables hierarchical feature composition.", content: "A <strong>perceptron</strong> is the simplest possible neural network: <code>y = \u03c3(w\u00b7x + b)</code>. It takes an input vector x, computes a weighted sum, adds a bias, and passes the result through an activation function \u03c3. Geometrically, a perceptron learns a single <strong>hyperplane</strong> that divides the input space in two. It can learn AND, OR, but famously cannot learn XOR — because XOR requires a nonlinear decision boundary that a single hyperplane cannot express.<br><br>Stack multiple perceptrons into layers and you get a <strong>multilayer perceptron (MLP)</strong> — the first true 'deep' network. The key insight is that each layer creates a new <strong>representation</strong> of the input. The first hidden layer might learn simple features (edges, basic patterns). The second combines those into more complex features (corners, textures). The third combines those into even higher-level concepts (object parts). This hierarchical composition is why depth matters more than width.<br><br>The <strong>Universal Approximation Theorem</strong> proves that an MLP with a single hidden layer and enough neurons can approximate any continuous function to arbitrary precision. But 'enough neurons' can mean exponentially many. In contrast, <strong>deep</strong> networks can represent the same functions with exponentially fewer parameters. A function that requires 2\u207f neurons in one hidden layer might need only O(n) neurons across O(n) layers. This is because deep networks compose features: 10 layers of 100 neurons each can represent far more complex functions than 1 layer of 1000 neurons.<br><br>The progression from perceptron to deep net mirrors the history of AI itself. Rosenblatt's perceptron (1958) sparked initial excitement. Minsky and Papert showed its XOR limitation (1969), killing funding for a decade. Backpropagation (1986) made training deep nets possible in theory, but vanishing gradients limited practical depth. ResNets (2015) solved that with skip connections, enabling networks with 100+ layers. Today's GPT-4 has ~120 Transformer layers — each one conceptually a sophisticated version of the perceptron stack, processing information through hierarchical representations." },
  "Activation Functions": { summary: "Nonlinear functions between layers — without them, any deep network collapses to a single linear layer.", content: "<strong>Activation functions</strong> introduce nonlinearity into neural networks, and this is not optional — it's existential. Without activation functions, stacking any number of linear layers <code>y = W\u2082(W\u2081x + b\u2081) + b\u2082</code> simplifies to a single linear transformation <code>y = W'x + b'</code> (since the product of matrices is a matrix). No matter how many layers you stack, the network can only learn linear relationships. Activation functions break this limitation and unlock the ability to approximate any function.<br><br><strong>ReLU</strong> (Rectified Linear Unit): <code>f(x) = max(0, x)</code>. This is the default activation for hidden layers in most architectures. It's dead simple, fast to compute, and its gradient is either 0 (for negative inputs) or 1 (for positive inputs) — no vanishing gradient problem for positive activations. The catch is the 'dying ReLU' problem: if a neuron's weights shift such that its input is always negative, the gradient is permanently zero and it never updates again. Variants like LeakyReLU (<code>f(x) = max(0.01x, x)</code>) address this by allowing a small gradient for negative inputs.<br><br><strong>GELU</strong> (Gaussian Error Linear Unit): <code>f(x) = x \u00b7 \u03a6(x)</code> where \u03a6 is the standard normal CDF. This is a smooth approximation to ReLU that has become the default in Transformers (BERT, GPT). Unlike ReLU's hard cutoff at zero, GELU gradually transitions, allowing small negative values through with small probability. This smoothness seems to help optimization in deep Transformer stacks.<br><br><strong>Softmax</strong> is the standard output activation for multi-class classification: <code>softmax(z\u1d62) = exp(z\u1d62) / \u03a3\u2c7c exp(z\u2c7c)</code>. It converts a vector of arbitrary real numbers (logits) into a probability distribution — all values between 0 and 1 that sum to 1. It also amplifies differences: the largest logit gets a disproportionately large probability. In Transformers, softmax appears in attention to create attention weights, and in the output layer to predict the next token. Sigmoid (<code>\u03c3(x) = 1/(1+e\u207b\u02e3)</code>) is the binary-class version, squashing a single value to (0, 1)." },
  "Backpropagation": { summary: "Chain rule applied to a computational graph — computes all gradients in one backward pass.", content: "<strong>Backpropagation</strong> is the algorithm that makes deep learning possible. It computes the gradient of the loss with respect to every parameter in the network in a single backward pass — an operation whose cost is roughly equivalent to one forward pass. Without backprop, computing gradients for N parameters would require N separate forward passes (perturbing each parameter individually), making training billion-parameter models computationally impossible.<br><br>The algorithm has two phases. <strong>Forward pass</strong>: input flows through the network layer by layer, and each layer saves its intermediate values (the 'activations'). For example, if a layer computes <code>z = Wx + b</code> then <code>a = ReLU(z)</code>, it saves x, z, and a. These cached values are essential for the backward pass. <strong>Backward pass</strong>: starting from the loss, gradients flow backward through the network. Each layer receives the gradient of the loss with respect to its output (<code>\u2202L/\u2202a</code>) and computes three things: the gradient with respect to its input (<code>\u2202L/\u2202x</code>, passed to the previous layer), and the gradients with respect to its parameters (<code>\u2202L/\u2202W</code> and <code>\u2202L/\u2202b</code>, used for weight updates).<br><br>Consider a concrete two-layer network: <code>z\u2081 = W\u2081x + b\u2081</code>, <code>a\u2081 = ReLU(z\u2081)</code>, <code>z\u2082 = W\u2082a\u2081 + b\u2082</code>, <code>L = MSE(z\u2082, y)</code>. Backward: <code>\u2202L/\u2202z\u2082 = 2(z\u2082 - y)</code>, then <code>\u2202L/\u2202W\u2082 = (\u2202L/\u2202z\u2082) \u00b7 a\u2081\u1d40</code>, <code>\u2202L/\u2202a\u2081 = W\u2082\u1d40 \u00b7 (\u2202L/\u2202z\u2082)</code>, <code>\u2202L/\u2202z\u2081 = (\u2202L/\u2202a\u2081) \u2299 ReLU'(z\u2081)</code>, <code>\u2202L/\u2202W\u2081 = (\u2202L/\u2202z\u2081) \u00b7 x\u1d40</code>. Each step is a local application of the chain rule using the saved forward-pass values.<br><br>The memory trade-off is significant: backprop requires storing all intermediate activations, which can consume enormous GPU memory. For a 7B parameter LLM, activation memory during training can exceed 100GB. Techniques like <strong>gradient checkpointing</strong> trade computation for memory — recompute activations during the backward pass instead of storing them, roughly doubling compute time but drastically reducing memory. This trade-off is why training requires much more memory than inference." },
  "Loss Functions": { summary: "Loss functions measure how wrong the model is — the choice of loss shapes what the model learns.", content: "A <strong>loss function</strong> (or cost function, or objective function) quantifies the discrepancy between the model's predictions and the true values. Training a neural network means minimizing this function. The choice of loss isn't arbitrary — it encodes your assumptions about the problem and directly shapes what the model learns.<br><br><strong>Mean Squared Error (MSE)</strong>: <code>L = (1/n) \u03a3(\u0177\u1d62 - y\u1d62)\u00b2</code>. The default for regression tasks. The squaring means large errors are penalized quadratically — an error of 10 costs 100\u00d7 more than an error of 1. This makes MSE sensitive to outliers. If you predict house prices and one data point is a $50M mansion in your $500K dataset, MSE will disproportionately try to fit that outlier. Mean Absolute Error (MAE = <code>|\u0177 - y|</code>) is more robust to outliers but has a non-smooth gradient at zero.<br><br><strong>Cross-Entropy Loss</strong>: <code>L = -\u03a3 y\u1d62 log(\u0177\u1d62)</code> where y is the one-hot true label and \u0177 is the predicted probability. For binary classification: <code>L = -[y\u00b7log(\u0177) + (1-y)\u00b7log(1-\u0177)]</code>. This is THE loss for classification tasks. Its genius is in the logarithm: when the model predicts 0.99 for the correct class, the loss is tiny (<code>-log(0.99) \u2248 0.01</code>). When it predicts 0.01 for the correct class, the loss is enormous (<code>-log(0.01) \u2248 4.6</code>). The gradient through cross-entropy + softmax simplifies to <code>\u0177 - y</code>, which is large when the model is wrong and small when it's right — perfect optimization behavior.<br><br>Why not use MSE for classification? When the model is confidently wrong (predicting 0.01 when the answer is 1), MSE's gradient through softmax <strong>vanishes</strong>. The softmax saturates, and the gradient signal becomes too small to learn from. Cross-entropy maintains a strong gradient precisely when the model needs the most correction. This is why the 'right' loss function matters — it's not just about measuring error, it's about providing useful gradients for learning. The deep theoretical connection: minimizing cross-entropy is equivalent to <strong>maximum likelihood estimation</strong>, which means training with cross-entropy finds the model parameters that make the training data most probable." },
  "Weight Initialization": { summary: "How you initialize weights determines whether training succeeds or fails — wrong init means zero gradients or NaN.", content: "<strong>Weight initialization</strong> seems like a minor detail but is actually a make-or-break decision for training deep networks. If weights start too large, activations explode exponentially through the layers — you get NaN within the first batch. If weights start too small, activations shrink to zero — gradients vanish, and the network doesn't learn. The goal is to keep activations and gradients at a reasonable scale across all layers.<br><br><strong>Xavier initialization</strong> (Glorot, 2010) sets <code>Var(W) = 2 / (fan_in + fan_out)</code>, where fan_in is the number of input neurons and fan_out is the number of output neurons. This was derived by requiring that the variance of activations stays constant across layers when using tanh or sigmoid activations. For a layer with 512 inputs and 256 outputs, weights are drawn from a normal distribution with std \u2248 <code>sqrt(2/768) \u2248 0.051</code>. <strong>He initialization</strong> (Kaiming, 2015) sets <code>Var(W) = 2 / fan_in</code>, which accounts for the fact that ReLU zeros out half the activations (effectively halving the variance).<br><br>To understand why this matters, consider a 20-layer network where each layer multiplies by a weight matrix. If the average singular value of each weight matrix is 1.1 (slightly too large), after 20 layers the signal is amplified by <code>1.1\u00b2\u2070 \u2248 6.7</code>. If it's 0.9 (slightly too small), the signal decays to <code>0.9\u00b2\u2070 \u2248 0.12</code>. With 100 layers: <code>1.1\u00b9\u2070\u2070 \u2248 13,780</code> (explosion) or <code>0.9\u00b9\u2070\u2070 \u2248 0.0000265</code> (vanishing). Proper initialization keeps this multiplier close to 1.0 on average.<br><br>Modern architectures use additional tricks: <strong>LayerNorm</strong> and <strong>BatchNorm</strong> re-normalize activations at each layer, making training less sensitive to initialization. Residual connections help by providing an additive identity path. Many Transformer implementations use a scaled initialization for residual layers: <code>Var(W) = 2 / (fan_in \u00b7 num_layers)</code>, ensuring that the residual stream doesn't grow unboundedly. The practical advice: use He init for ReLU networks, Xavier for tanh/sigmoid, and whatever the framework default is for Transformers (it's usually been carefully tuned)." },
  "Regularization": { summary: "Techniques to prevent overfitting — constraining the model to learn general patterns, not memorize training data.", content: "<strong>Regularization</strong> is any technique that prevents a model from memorizing the training data (overfitting) and instead encourages it to learn generalizable patterns. A model with millions of parameters has the capacity to perfectly fit any training set, including its noise and idiosyncrasies. Regularization constrains the model so that it finds simpler solutions that transfer to unseen data.<br><br><strong>L2 regularization</strong> (weight decay) adds <code>\u03bb||w||\u00b2</code> to the loss. This penalizes large weights, effectively saying 'prefer solutions where weights are small.' The gradient becomes <code>\u2207L + 2\u03bbw</code>, which continuously pulls weights toward zero. From a Bayesian perspective, L2 regularization is equivalent to placing a <strong>Gaussian prior</strong> on the weights — you're saying 'I believe weights should be normally distributed around zero.' The strength \u03bb controls how strongly you enforce this belief vs. fitting the data.<br><br><strong>L1 regularization</strong> adds <code>\u03bb||w||</code> to the loss. Unlike L2, which smoothly shrinks weights, L1 has a discontinuous gradient at zero that drives weights to <strong>exactly zero</strong>. This performs automatic feature selection — the model learns which connections are unnecessary and removes them. Bayesian interpretation: L1 is a <strong>Laplace prior</strong>. In practice, L1 produces sparse models, which can be smaller and faster.<br><br><strong>Dropout</strong> takes a completely different approach: during training, randomly set p% of neurons to zero on each forward pass (typically p=0.1 to 0.5). This forces the network to build <strong>redundant representations</strong> — no single neuron can be solely responsible for any feature, because it might be dropped. At inference time, all neurons are active but outputs are scaled by (1-p) to compensate. Dropout is especially effective for fully-connected layers and was revolutionary when introduced (2012). Modern Transformers use dropout sparingly (0.1 or less) because they rely more on other regularization: data augmentation, weight decay, and the implicit regularization of large batch SGD." },
  "MLE & Cross-Entropy": { summary: "Maximum Likelihood Estimation connects probability theory to loss functions — cross-entropy IS negative log-likelihood.", content: "<strong>Maximum Likelihood Estimation (MLE)</strong> is the theoretical foundation that explains why we use the loss functions we do. The principle: given observed data, find the model parameters \u03b8 that make the data most probable. Formally: <code>\u03b8* = argmax P(data | \u03b8)</code>. For independent samples: <code>P(data | \u03b8) = \u03a0 P(x\u1d62 | \u03b8)</code>. Since products of small probabilities underflow to zero, we take the log: <code>log P(data | \u03b8) = \u03a3 log P(x\u1d62 | \u03b8)</code>. Maximizing log-likelihood = minimizing <strong>negative log-likelihood (NLL)</strong>.<br><br>Here's the crucial connection: for classification, if your model outputs probability \u0177\u1d62 for the true class, then NLL = <code>-\u03a3 log(\u0177\u1d62)</code>. This is exactly <strong>cross-entropy loss</strong>. So when you train a classifier with cross-entropy, you are doing MLE — finding the parameters that make the training labels most probable under your model. This isn't a coincidence or a heuristic; it's a deep mathematical equivalence. Cross-entropy is the 'right' classification loss because it has an information-theoretic justification via MLE.<br><br>The connection extends to regularization. <strong>Maximum A Posteriori (MAP) estimation</strong> adds a prior: <code>\u03b8* = argmax P(\u03b8 | data) = argmax P(data | \u03b8) \u00b7 P(\u03b8)</code>. Taking the negative log: <code>-log P(data | \u03b8) - log P(\u03b8)</code>. If the prior P(\u03b8) is Gaussian (mean 0, variance 1/(2\u03bb)), then <code>-log P(\u03b8) = \u03bb||\u03b8||\u00b2</code> — this is L2 regularization! If the prior is Laplacian, you get L1 regularization. So regularized training is Bayesian MAP estimation. Every training detail maps to a principled statistical concept.<br><br>For regression, MLE under a Gaussian noise model (assuming <code>y = f(x) + \u03b5</code> where \u03b5 ~ N(0,\u03c3\u00b2)) yields NLL = <code>(1/2\u03c3\u00b2)\u03a3(\u0177\u1d62 - y\u1d62)\u00b2</code> — which is MSE loss (up to a constant). So MSE is the MLE loss when you assume Gaussian noise. This framework helps you choose the right loss: <strong>what distribution do you assume your errors follow?</strong> Gaussian → MSE. Laplacian → MAE. Categorical → Cross-Entropy. Understanding MLE transforms loss function selection from guesswork into principled statistical modeling." },
  "Kernels & Weight Sharing": { summary: "Convolutional kernels share weights across spatial positions — detecting features regardless of where they appear.", content: "A <strong>convolutional kernel</strong> (or filter) is a small matrix of learnable weights — typically 3\u00d73 or 5\u00d75 — that slides across the entire input image, computing a dot product at each position. The revolutionary insight is <strong>weight sharing</strong>: the same 9 parameters (for a 3\u00d73 kernel) are used at every spatial location. This single idea reduces a fully-connected layer's parameters by orders of magnitude: on a 224\u00d7224 image, a fully-connected layer with 64 outputs would need <code>224 \u00d7 224 \u00d7 3 \u00d7 64 \u2248 9.6 million</code> parameters. A convolutional layer with 64 3\u00d73 kernels needs only <code>3 \u00d7 3 \u00d7 3 \u00d7 64 = 1,728</code> parameters — a 5,500\u00d7 reduction.<br><br>Weight sharing encodes a powerful prior: <strong>translation equivariance</strong>. If a kernel detects a vertical edge, it detects it in the top-left corner, the center, or the bottom-right equally well. The feature map (output of sliding the kernel over the image) tells you <strong>where</strong> each feature was detected. This makes perfect sense for images — a cat's ear has the same local structure whether it appears on the left or right side of the photo. You don't need separate weights to detect 'ear at position (50,50)' vs 'ear at position (100,150).'<br><br>The convolution operation at each position is a dot product: place the 3\u00d73 kernel over a 3\u00d73 patch of the input, multiply element-wise, and sum. Slide one pixel right, repeat. The output is a 2D feature map showing how strongly each location matches the kernel pattern. With 64 kernels, you get 64 feature maps — one might detect horizontal edges, another vertical edges, another corners. Stack convolutional layers and the features become increasingly abstract: edges → textures → object parts → objects.<br><br>Beyond parameter efficiency, weight sharing provides <strong>statistical efficiency</strong>. Every pixel in the training images provides a learning signal for the same shared kernel, rather than for a unique weight. A 3\u00d73 kernel sliding over a 224\u00d7224 image gets <code>222 \u00d7 222 \u2248 49,000</code> gradient signals per image. This means CNNs learn robust features from much less data than fully-connected networks. This combination of parameter efficiency, translation equivariance, and statistical efficiency is why CNNs dominated computer vision from 2012 until Vision Transformers arrived around 2020." },
  "ResNet & Skip Connections": { summary: "Skip connections let gradients flow directly through the network — enabling training of 100+ layer networks.", content: "<strong>ResNet</strong> (Residual Network, He et al. 2015) solved the degradation problem that had blocked progress in deep learning for years. Counterintuitively, researchers found that simply adding more layers to a network <strong>increased</strong> training error beyond a certain depth — not because of overfitting, but because optimization itself failed. Gradients vanishing or distorting through dozens of multiplicative layers made it impossible for deep networks to learn effectively.<br><br>The solution was elegant: instead of learning a desired mapping <code>H(x)</code>, let the layer learn the <strong>residual</strong> <code>F(x) = H(x) - x</code>, and add a skip connection: <code>output = F(x) + x</code>. If the optimal transformation is close to the identity (which it often is in deep networks), learning a small residual near zero is much easier than learning the full identity mapping from scratch. The skip connection provides a 'default' of doing nothing — the layer only needs to learn what to <strong>change</strong>.<br><br>The gradient flow perspective is even more important. During backpropagation through <code>output = F(x) + x</code>, the gradient is <code>\u2202L/\u2202x = \u2202L/\u2202output \u00b7 (\u2202F/\u2202x + 1)</code>. That '+1' term means the gradient has a direct path through the skip connection, unattenuated by any weights. In a 100-layer network, gradients can flow from the loss all the way back to the first layer through these skip connections without being multiplied by weight matrices that might shrink them. This is the mechanism that enables training of very deep networks.<br><br>The impact of ResNet extends far beyond image classification. Skip connections (residual connections) are now used in virtually <strong>every</strong> deep architecture: every Transformer layer has them (<code>x + Attention(x)</code> and <code>x + FFN(x)</code>), diffusion models use them, and so do modern RNNs. The residual stream view of Transformers — where layers read from and write to a shared representation highway — is directly descended from ResNet. When He et al. trained a 152-layer ResNet and won ImageNet 2015, they didn't just build a better image classifier; they established the architectural pattern that enables all modern deep learning." },
